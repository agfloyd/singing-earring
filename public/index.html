<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Singing Earring</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  h1 { font-size: 1.8rem; color: #e94560; margin-bottom: 6px; }
  .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 24px; }

  /* Join screen */
  #joinScreen { width: 100%; max-width: 360px; text-align: center; }
  .code-input { background: #16213e; border: 2px solid #0f3460; color: #eee; font-size: 2rem; letter-spacing: 0.3em; text-align: center; padding: 12px; border-radius: 12px; width: 100%; text-transform: uppercase; outline: none; }
  .code-input:focus { border-color: #e94560; }
  .code-input::placeholder { color: #555; letter-spacing: 0.15em; font-size: 1.2rem; }
  .parts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .part-btn { padding: 20px; border-radius: 12px; border: 3px solid transparent; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.15s; }
  .part-btn.bass { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .part-btn.tenor { background: rgba(255,200,87,0.15); color: #ffc857; }
  .part-btn.alto { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .part-btn.soprano { background: rgba(192,132,252,0.15); color: #c084fc; }
  .part-btn.selected { border-color: currentColor; transform: scale(1.05); }
  .join-btn { background: #e94560; color: white; border: none; padding: 16px 32px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; opacity: 0.4; pointer-events: none; transition: opacity 0.2s; }
  .join-btn.ready { opacity: 1; pointer-events: auto; }
  .join-btn.ready:hover { background: #c23152; }
  .error { color: #e94560; font-size: 0.85rem; margin-top: 8px; min-height: 1.2em; }
  .warnings { margin-top: 16px; font-size: 0.75rem; color: #666; line-height: 1.4; }

  /* Range picker */
  .range-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 12px 0 16px; font-size: 1rem; color: #ccc; }
  .range-field { background: #16213e; border: 2px solid #0f3460; color: #eee; padding: 6px 10px; border-radius: 8px; font-size: 1rem; width: 60px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .range-field:focus, .range-field.active { border-color: #e94560; outline: none; }
  .range-field::placeholder { color: #555; }

  /* Range piano popup */
  .range-piano-popup { display: none; background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 12px; margin: 8px 0; }
  .range-piano-popup.visible { display: block; }
  .range-piano-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .octave-btn { background: #0f3460; border: 1px solid #555; color: #ccc; width: 36px; height: 36px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .octave-btn:active { background: #1a4a8a; }
  .range-piano { display: flex; position: relative; height: 80px; flex: 1; user-select: none; -webkit-user-select: none; touch-action: none; }
  .rp-key { position: relative; border: 1px solid #333; border-radius: 0 0 4px 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; font-size: 0.65rem; color: #888; transition: background 0.05s; }
  .rp-key.white { background: #ddd; flex: 1; height: 80px; z-index: 1; color: #666; }
  .rp-key.black { background: #222; width: 22px; height: 48px; margin-left: -11px; margin-right: -11px; z-index: 2; color: #999; font-size: 0.55rem; }
  .rp-key.selected { background: #e94560 !important; color: #fff !important; }
  .rp-key > * { pointer-events: none; }
  .range-piano-hint { font-size: 0.85rem; color: #888; margin-top: 8px; text-align: center; }

  /* Singing screen */
  #singScreen { display: none; width: 100%; max-width: 360px; text-align: center; }
  .current-note { font-size: 6rem; font-weight: bold; line-height: 1; margin: 10px 0; transition: color 0.1s; height: 6rem; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .current-note.bass { color: #ff6b6b; }
  .current-note.tenor { color: #ffc857; }
  .current-note.alto { color: #60a5fa; }
  .current-note.soprano { color: #c084fc; }
  .current-note.silent { color: #444; font-size: 3rem; }
  .part-label { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.2em; font-weight: bold; }
  .part-label.bass { color: #ff6b6b; }
  .part-label.tenor { color: #ffc857; }
  .part-label.alto { color: #60a5fa; }
  .part-label.soprano { color: #c084fc; }

  .part-switcher { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .part-switch-btn { padding: 6px 12px; border-radius: 6px; border: 2px solid transparent; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: all 0.15s; }
  .part-switch-btn.bass { background: rgba(255,107,107,0.1); color: #ff6b6b; }
  .part-switch-btn.tenor { background: rgba(255,200,87,0.1); color: #ffc857; }
  .part-switch-btn.alto { background: rgba(96,165,250,0.1); color: #60a5fa; }
  .part-switch-btn.soprano { background: rgba(192,132,252,0.1); color: #c084fc; }
  .part-switch-btn.active { border-color: currentColor; }

  /* Syllable display */
  .syllable-display { font-size: 2.5rem; font-weight: bold; color: #fbbf24; margin: 8px 0; height: 3rem; overflow: hidden; }

  /* Mini piano */
  .mini-piano-wrapper { margin: 12px 0; }
  .mini-piano { display: flex; position: relative; height: 50px; user-select: none; }
  .mini-key { position: relative; border: 1px solid #333; border-radius: 0 0 4px 4px; }
  .mini-key.white { background: #555; flex: 1; height: 50px; z-index: 1; }
  .mini-key.black { background: #222; width: 16px; height: 30px; margin-left: -8px; margin-right: -8px; z-index: 2; }

  /* Mute controls */
  .mute-controls { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 12px; }
  .mute-btn { background: #333; border: 2px solid #555; color: #ccc; padding: 10px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.15s; }
  .mute-btn.muted { background: #e94560; border-color: #e94560; color: white; }
  .mode-toggle { background: none; border: 1px solid #444; color: #888; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
  .mode-toggle:hover { border-color: #888; color: #ccc; }

  .conn-status { font-size: 0.8rem; margin-top: 16px; }
  .conn-status.connected { color: #34d399; }
  .conn-status.disconnected { color: #e94560; }
  .room-info { font-size: 0.85rem; color: #666; margin-top: 4px; }
  .singer-counts { display: flex; gap: 12px; justify-content: center; margin-top: 8px; font-size: 0.8rem; color: #666; }

</style>
</head>
<body>

<div id="joinScreen">
  <h1>Singing Earring</h1>
  <div class="subtitle">Join a room and sing your part</div>

  <input type="text" class="code-input" id="codeInput" placeholder="Room code" maxlength="4" autocomplete="off" autocapitalize="characters">

  <input type="text" id="nameInput" placeholder="Your name (optional)" autocomplete="off" style="background:#16213e;border:1px solid #0f3460;color:#eee;padding:8px 12px;border-radius:8px;width:100%;font-size:0.95rem;margin-top:12px;outline:none;text-align:center;" onfocus="this.style.borderColor='#e94560'" onblur="this.style.borderColor='#0f3460'">

  <div class="range-row">
    Range:
    <input type="text" class="range-field" id="rangeLow" placeholder="—" readonly onclick="openRangePicker('low')" ondblclick="makeRangeEditable(this)" autocomplete="off">
    to
    <input type="text" class="range-field" id="rangeHigh" placeholder="—" readonly onclick="openRangePicker('high')" ondblclick="makeRangeEditable(this)" autocomplete="off">
  </div>

  <div class="range-piano-popup" id="rangePianoPopup">
    <div class="range-piano-controls">
      <button class="octave-btn" onclick="shiftRangeOctave(-1)">◀</button>
      <div class="range-piano" id="rangePiano"></div>
      <button class="octave-btn" onclick="shiftRangeOctave(1)">▶</button>
    </div>
    <div class="range-piano-hint" id="rangePianoHint"></div>
  </div>

  <div style="font-size:0.85rem;color:#666;margin-bottom:6px;">Or start with a preset category:</div>
  <div class="parts" id="parts">
    <button class="part-btn bass" data-part="bass" onclick="selectPart(this)">Bass</button>
    <button class="part-btn tenor" data-part="tenor" onclick="selectPart(this)">Tenor</button>
    <button class="part-btn alto" data-part="alto" onclick="selectPart(this)">Alto</button>
    <button class="part-btn soprano" data-part="soprano" onclick="selectPart(this)">Soprano</button>
  </div>

  <button class="join-btn" id="joinBtn" onclick="joinRoom()">Join</button>
  <div class="error" id="error"></div>

  <div class="warnings">
    <p>Use wired headphones for best results. Bluetooth adds noticeable delay.</p>
    <p>iOS users: make sure your mute switch is OFF.</p>
  </div>
</div>

<div id="singScreen">
  <div class="part-label" id="partLabel" style="font-size:2.4rem;"></div>
  <div class="range-row" style="margin-top:4px;font-size:1.5rem;">
    Range:
    <input type="text" class="range-field" id="singRangeLow" placeholder="—" readonly onclick="openSingRangePicker('low')" ondblclick="makeRangeEditable(this)" autocomplete="off" style="font-size:1.3rem;width:70px;">
    to
    <input type="text" class="range-field" id="singRangeHigh" placeholder="—" readonly onclick="openSingRangePicker('high')" ondblclick="makeRangeEditable(this)" autocomplete="off" style="font-size:1.3rem;width:70px;">
  </div>
  <div class="range-piano-popup" id="singRangePianoPopup">
    <div class="range-piano-controls">
      <button class="octave-btn" onclick="shiftSingRangeOctave(-1)">◀</button>
      <div class="range-piano" id="singRangePiano"></div>
      <button class="octave-btn" onclick="shiftSingRangeOctave(1)">▶</button>
    </div>
    <div class="range-piano-hint" id="singRangePianoHint"></div>
  </div>
  <div style="font-size:0.85rem;color:#666;margin:4px 0 6px;">Click above to adjust range, or switch to a preset:</div>
  <div class="part-switcher" id="partSwitcher">
    <button class="part-switch-btn bass" onclick="switchPart('bass')">B</button>
    <button class="part-switch-btn tenor" onclick="switchPart('tenor')">T</button>
    <button class="part-switch-btn alto" onclick="switchPart('alto')">A</button>
    <button class="part-switch-btn soprano" onclick="switchPart('soprano')">S</button>
  </div>
  <div class="syllable-display" id="syllableDisplay">Aah</div>
  <div class="current-note silent" id="noteDisplay">---</div>
  <div class="mini-piano-wrapper">
    <div class="mini-piano" id="miniPiano"></div>
  </div>
  <div class="mute-controls">
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
    <button class="mode-toggle" id="modeToggle" onclick="toggleMode()">Manual</button>
  </div>
  <div class="singer-counts" id="singerCounts"></div>
  <div class="conn-status connected" id="connStatus">Connected</div>
  <div class="room-info" id="roomInfo"></div>
  <div id="singerName" style="font-size:0.75rem;color:#555;margin-top:4px;"></div>
</div>


<script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let PART_COLORS = { bass: '#ff6b6b', tenor: '#ffc857', alto: '#60a5fa', soprano: '#c084fc' };
let RANGE = {
  soprano: [60, 79],
  alto:    [53, 72],
  tenor:   [48, 67],
  bass:    [40, 60],
};
let dynamicParts = null; // set when conductor sends part config

let selectedPart = null;
let customRange = { low: null, high: null };
let rangePickerTarget = null; // 'low' or 'high'
let rangeOctave = 3; // current octave shown in range picker
let rangePreviewNote = null; // currently sounding preview note
let rangePreviewOsc = null; // oscillator for preview
let rangePreviewGain = null; // gain for preview

let ws = null;
let audioCtx = null;
let oscillators = [];
let gainNode = null;
let filterNode = null;
let currentMidi = -1;
let wakeLock = null;
let roomCode = null;
let myId = null;
let intentionalClose = false;
let reconnectAttempts = 0;
const MAX_RECONNECT = 10;

// Mute state
let isMuted = false;
let muteMode = 'manual';
let autoMuteTimer = null;

// Volume state
let partVolume = 0.5;

// Syllable state
let currentSyllable = 'Aah';
let isPulsing = false;
let pulseBpm = 100;
let pulseTimer = null;

function noteName(midi) {
  if (midi < 0) return '---';
  return NOTES[midi % 12] + (Math.floor(midi / 12) - 1);
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function selectPart(btn) {
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedPart = btn.dataset.part;
  // Set range as preset for this part
  const r = RANGE[selectedPart] || [48, 72];
  customRange.low = r[0];
  customRange.high = r[1];
  document.getElementById('rangeLow').value = noteName(r[0]);
  document.getElementById('rangeHigh').value = noteName(r[1]);
  // Close picker if open
  closeRangePicker();
  checkReady();
}

function checkReady() {
  const code = document.getElementById('codeInput').value.trim();
  const btn = document.getElementById('joinBtn');
  if (code.length === 4 && customRange.low !== null && customRange.high !== null) {
    btn.classList.add('ready');
  } else {
    btn.classList.remove('ready');
  }
}

// === Range Picker ===

function openRangePicker(target) {
  rangePickerTarget = target;
  // Set sensible starting octave
  if (target === 'low') {
    rangeOctave = customRange.low !== null ? Math.floor(customRange.low / 12) - 1 : 3;
  } else {
    rangeOctave = customRange.high !== null ? Math.floor(customRange.high / 12) - 1 : 4;
  }
  document.getElementById('rangePianoPopup').classList.add('visible');
  document.getElementById('rangeLow').classList.toggle('active', target === 'low');
  document.getElementById('rangeHigh').classList.toggle('active', target === 'high');
  const hint = target === 'low'
    ? 'Find the lowest note you feel comfortable singing'
    : 'Find the highest note you feel comfortable singing';
  document.getElementById('rangePianoHint').textContent = hint;
  buildRangePiano();
}

function closeRangePicker() {
  document.getElementById('rangePianoPopup').classList.remove('visible');
  document.getElementById('rangeLow').classList.remove('active');
  document.getElementById('rangeHigh').classList.remove('active');
  rangePickerTarget = null;
  stopRangePreview();
}

function shiftRangeOctave(dir) {
  const newOctave = rangeOctave + dir;
  if (newOctave < 1 || newOctave > 6) return;
  rangeOctave = newOctave;
  buildRangePiano();
}

function buildRangePiano() {
  const container = document.getElementById('rangePiano');
  container.innerHTML = '';
  const blackKeys = new Set([1,3,6,8,10]);
  const startMidi = (rangeOctave + 1) * 12; // C of this octave
  const endMidi = startMidi + 12; // C to B (one octave)

  const currentVal = rangePickerTarget === 'low' ? customRange.low : customRange.high;

  for (let midi = startMidi; midi < endMidi; midi++) {
    const semitone = midi % 12;
    const isBlack = blackKeys.has(semitone);
    const key = document.createElement('div');
    key.className = `rp-key ${isBlack ? 'black' : 'white'}`;
    if (midi === currentVal && rangePreviewNote === midi) key.classList.add('selected');
    key.dataset.midi = midi;

    const label = document.createElement('span');
    label.textContent = NOTES[semitone] + rangeOctave;
    key.appendChild(label);

    key.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      onRangeKeyTap(midi);
    });

    container.appendChild(key);
  }
}

function onRangeKeyTap(midi) {
  if (!rangePickerTarget) return;

  const currentVal = rangePickerTarget === 'low' ? customRange.low : customRange.high;

  // Tapping the already-selected key silences it but keeps the value
  if (midi === currentVal && rangePreviewNote === midi) {
    stopRangePreview();
    buildRangePiano();
    return;
  }

  // Set the value
  customRange[rangePickerTarget] = midi;
  const fieldId = rangePickerTarget === 'low' ? 'rangeLow' : 'rangeHigh';
  document.getElementById(fieldId).value = noteName(midi);

  // Auto-swap if low > high
  if (customRange.low !== null && customRange.high !== null && customRange.low > customRange.high) {
    const tmp = customRange.low;
    customRange.low = customRange.high;
    customRange.high = tmp;
    document.getElementById('rangeLow').value = noteName(customRange.low);
    document.getElementById('rangeHigh').value = noteName(customRange.high);
  }

  // Play the note
  playRangePreview(midi);

  // Update visual selection and auto-classify part
  buildRangePiano();
  updatePartFromRange();
  checkReady();
}

function initRangeAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
  }
  if (!rangePreviewGain) {
    rangePreviewGain = audioCtx.createGain();
    rangePreviewGain.gain.value = 0;
    rangePreviewGain.connect(audioCtx.destination);
  }
}

function playRangePreview(midi) {
  initRangeAudio();
  stopRangePreview();

  const freq = midiToFreq(midi);
  rangePreviewOsc = audioCtx.createOscillator();
  rangePreviewOsc.type = 'sine';
  rangePreviewOsc.frequency.value = freq;
  rangePreviewOsc.connect(rangePreviewGain);
  rangePreviewOsc.start();
  rangePreviewGain.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.01);
  rangePreviewNote = midi;
}

function stopRangePreview() {
  if (rangePreviewOsc) {
    if (rangePreviewGain && audioCtx) {
      rangePreviewGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
    }
    const osc = rangePreviewOsc;
    setTimeout(() => { try { osc.stop(); } catch {} }, 100);
    rangePreviewOsc = null;
    rangePreviewNote = null;
  }
}

// Parse a note name like "C#4", "Eb3", "D4" into a MIDI number, or null if invalid
function parseNoteName(str) {
  const m = str.trim().match(/^([A-Ga-g])(#|b|♯|♭)?(\d)$/);
  if (!m) return null;
  const letter = m[1].toUpperCase();
  const accidental = m[2] || '';
  const octave = parseInt(m[3]);
  const letterToSemitone = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  let semitone = letterToSemitone[letter];
  if (semitone === undefined) return null;
  if (accidental === '#' || accidental === '♯') semitone++;
  else if (accidental === 'b' || accidental === '♭') semitone--;
  semitone = ((semitone % 12) + 12) % 12;
  const midi = (octave + 1) * 12 + semitone;
  if (midi < 24 || midi > 96) return null;
  return midi;
}

// Auto-classify range into closest part preset
function classifyRange(low, high) {
  if (low === null || high === null) return null;
  const mid = (low + high) / 2;
  let bestPart = null, bestDist = Infinity;
  for (const [part, [pLo, pHi]] of Object.entries(RANGE)) {
    const pMid = (pLo + pHi) / 2;
    const dist = Math.abs(mid - pMid);
    if (dist < bestDist) { bestDist = dist; bestPart = part; }
  }
  return bestPart;
}

// Update part button highlighting based on current range
function updatePartFromRange() {
  const part = classifyRange(customRange.low, customRange.high);
  if (part) {
    selectedPart = part;
    document.querySelectorAll('.part-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.part === part);
    });
  }
}

function makeRangeEditable(field) {
  field.removeAttribute('readonly');
  field.select();
  // Re-add readonly when focus leaves
  field.addEventListener('blur', function restoreReadonly() {
    field.setAttribute('readonly', '');
    field.removeEventListener('blur', restoreReadonly);
  });
}

// Handle Enter/Escape on range fields (for text editing mode)
function handleRangeFieldKey(e, target) {
  const field = e.target;

  // Arrow keys: shift note by semitone when picker is open and note is playing
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && field.hasAttribute('readonly')) {
    e.preventDefault();
    if (!rangePickerTarget || rangePreviewNote === null) return;
    const dir = e.key === 'ArrowRight' ? 1 : -1;
    const newMidi = rangePreviewNote + dir;
    if (newMidi < 24 || newMidi > 96) return;
    onRangeKeyTap(newMidi);
    // Switch octave display if needed
    const newOctave = Math.floor(newMidi / 12) - 1;
    if (newOctave !== rangeOctave) {
      rangeOctave = newOctave;
      buildRangePiano();
    }
    return;
  }

  if (e.key === 'Enter' || e.key === 'Escape') {
    e.preventDefault();
    // Only parse text if field was editable
    if (!field.hasAttribute('readonly')) {
      const midi = parseNoteName(field.value);
      if (midi !== null) {
        customRange[target] = midi;
        field.value = noteName(midi);
        // Auto-swap if low > high
        if (customRange.low !== null && customRange.high !== null && customRange.low > customRange.high) {
          const tmp = customRange.low;
          customRange.low = customRange.high;
          customRange.high = tmp;
          document.getElementById('rangeLow').value = noteName(customRange.low);
          document.getElementById('rangeHigh').value = noteName(customRange.high);
        }
        updatePartFromRange();
        if (rangePickerTarget === target) buildRangePiano();
        checkReady();
      } else if (field.value.trim() === '') {
        customRange[target] = null;
        checkReady();
      } else {
        // Invalid input — restore previous value
        field.value = customRange[target] !== null ? noteName(customRange[target]) : '';
      }
    }
    field.blur();
    if (e.key === 'Escape') closeRangePicker();
  }
}

document.getElementById('rangeLow').addEventListener('keydown', (e) => handleRangeFieldKey(e, 'low'));
document.getElementById('rangeHigh').addEventListener('keydown', (e) => handleRangeFieldKey(e, 'high'));

document.getElementById('codeInput').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
  checkReady();
});

// === Sing-screen Range Picker ===
let singRangePickerTarget = null;
let singRangeOctave = 3;

function openSingRangePicker(target) {
  singRangePickerTarget = target;
  if (target === 'low') {
    singRangeOctave = customRange.low !== null ? Math.floor(customRange.low / 12) - 1 : 3;
  } else {
    singRangeOctave = customRange.high !== null ? Math.floor(customRange.high / 12) - 1 : 4;
  }
  document.getElementById('singRangePianoPopup').classList.add('visible');
  document.getElementById('singRangeLow').classList.toggle('active', target === 'low');
  document.getElementById('singRangeHigh').classList.toggle('active', target === 'high');
  document.getElementById('singRangePianoHint').textContent = target === 'low'
    ? 'Find the lowest note you feel comfortable singing'
    : 'Find the highest note you feel comfortable singing';
  buildSingRangePiano();
}

function closeSingRangePicker() {
  document.getElementById('singRangePianoPopup').classList.remove('visible');
  document.getElementById('singRangeLow').classList.remove('active');
  document.getElementById('singRangeHigh').classList.remove('active');
  singRangePickerTarget = null;
  stopRangePreview();
}

function shiftSingRangeOctave(dir) {
  const newOctave = singRangeOctave + dir;
  if (newOctave < 1 || newOctave > 6) return;
  singRangeOctave = newOctave;
  buildSingRangePiano();
}

function buildSingRangePiano() {
  const container = document.getElementById('singRangePiano');
  container.innerHTML = '';
  const blackKeys = new Set([1,3,6,8,10]);
  const startMidi = (singRangeOctave + 1) * 12;
  const endMidi = startMidi + 12;
  const currentVal = singRangePickerTarget === 'low' ? customRange.low : customRange.high;

  for (let midi = startMidi; midi < endMidi; midi++) {
    const semitone = midi % 12;
    const isBlack = blackKeys.has(semitone);
    const key = document.createElement('div');
    key.className = `rp-key ${isBlack ? 'black' : 'white'}`;
    if (midi === currentVal && rangePreviewNote === midi) key.classList.add('selected');
    key.dataset.midi = midi;
    const label = document.createElement('span');
    label.textContent = NOTES[semitone] + singRangeOctave;
    key.appendChild(label);
    key.addEventListener('pointerdown', (e) => { e.preventDefault(); onSingRangeKeyTap(midi); });
    container.appendChild(key);
  }
}

function onSingRangeKeyTap(midi) {
  if (!singRangePickerTarget) return;
  const currentVal = singRangePickerTarget === 'low' ? customRange.low : customRange.high;

  if (midi === currentVal && rangePreviewNote === midi) {
    stopRangePreview();
    buildSingRangePiano();
    return;
  }

  customRange[singRangePickerTarget] = midi;
  const fieldId = singRangePickerTarget === 'low' ? 'singRangeLow' : 'singRangeHigh';
  document.getElementById(fieldId).value = noteName(midi);

  if (customRange.low !== null && customRange.high !== null && customRange.low > customRange.high) {
    const tmp = customRange.low;
    customRange.low = customRange.high;
    customRange.high = tmp;
    document.getElementById('singRangeLow').value = noteName(customRange.low);
    document.getElementById('singRangeHigh').value = noteName(customRange.high);
  }

  playRangePreview(midi);
  buildSingRangePiano();
  buildMiniPiano();

  // Update part classification and notify server
  const newPart = classifyRange(customRange.low, customRange.high);
  if (newPart && newPart !== selectedPart) {
    selectedPart = newPart;
    updatePartDisplay();
  }
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ t: 'part', part: selectedPart, range: [customRange.low, customRange.high] }));
  }
}

// Keyboard handlers for sing-screen range fields
function handleSingRangeFieldKey(e, target) {
  const field = e.target;
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && field.hasAttribute('readonly')) {
    e.preventDefault();
    if (!singRangePickerTarget || rangePreviewNote === null) return;
    const dir = e.key === 'ArrowRight' ? 1 : -1;
    const newMidi = rangePreviewNote + dir;
    if (newMidi < 24 || newMidi > 96) return;
    onSingRangeKeyTap(newMidi);
    const newOctave = Math.floor(newMidi / 12) - 1;
    if (newOctave !== singRangeOctave) { singRangeOctave = newOctave; buildSingRangePiano(); }
    return;
  }
  if (e.key === 'Enter' || e.key === 'Escape') {
    e.preventDefault();
    if (!field.hasAttribute('readonly')) {
      const midi = parseNoteName(field.value);
      if (midi !== null) {
        customRange[target] = midi;
        field.value = noteName(midi);
        if (customRange.low !== null && customRange.high !== null && customRange.low > customRange.high) {
          const tmp = customRange.low; customRange.low = customRange.high; customRange.high = tmp;
          document.getElementById('singRangeLow').value = noteName(customRange.low);
          document.getElementById('singRangeHigh').value = noteName(customRange.high);
        }
        buildMiniPiano();
        const newPart = classifyRange(customRange.low, customRange.high);
        if (newPart && newPart !== selectedPart) { selectedPart = newPart; updatePartDisplay(); }
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ t: 'part', part: selectedPart, range: [customRange.low, customRange.high] }));
        }
        if (singRangePickerTarget === target) buildSingRangePiano();
      } else if (field.value.trim() !== '') {
        field.value = customRange[target] !== null ? noteName(customRange[target]) : '';
      }
    }
    field.blur();
    if (e.key === 'Escape') closeSingRangePicker();
  }
}

document.getElementById('singRangeLow').addEventListener('keydown', (e) => handleSingRangeFieldKey(e, 'low'));
document.getElementById('singRangeHigh').addEventListener('keydown', (e) => handleSingRangeFieldKey(e, 'high'));

function switchPart(part) {
  if (part === selectedPart) return;
  selectedPart = part;
  // Update range to preset for new part if available
  const r = RANGE[part];
  if (r) {
    customRange.low = r[0];
    customRange.high = r[1];
    document.getElementById('singRangeLow').value = noteName(customRange.low);
    document.getElementById('singRangeHigh').value = noteName(customRange.high);
  }
  updatePartDisplay();
  buildMiniPiano();
  updateSyllableDisplay();
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ t: 'part', part, range: [customRange.low, customRange.high] }));
  }
}

function updatePartDisplay() {
  const label = document.getElementById('partLabel');
  if (dynamicParts) {
    const pDef = dynamicParts.find(p => p.id === selectedPart);
    label.textContent = pDef ? pDef.label : selectedPart;
    label.style.color = pDef ? pDef.color : '';
    label.className = 'part-label';
  } else {
    label.textContent = selectedPart;
    label.className = `part-label ${selectedPart}`;
  }
  document.querySelectorAll('.part-switch-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.partId === selectedPart);
  });
}

function rebuildPartButtons(parts) {
  // Rebuild join-screen part buttons
  const joinContainer = document.getElementById('parts');
  joinContainer.innerHTML = '';
  for (const p of parts) {
    if (!p.label) continue; // skip unlabeled (1-part mode)
    const btn = document.createElement('button');
    btn.className = 'part-btn';
    btn.dataset.part = p.id;
    btn.style.background = `${p.color}22`;
    btn.style.color = p.color;
    btn.textContent = p.label;
    btn.onclick = function() { selectPart(this); };
    if (selectedPart === p.id) btn.classList.add('selected');
    joinContainer.appendChild(btn);
  }

  // Rebuild sing-screen part switcher
  const singContainer = document.getElementById('partSwitcher');
  singContainer.innerHTML = '';
  for (const p of parts) {
    const btn = document.createElement('button');
    btn.className = 'part-switch-btn';
    btn.dataset.partId = p.id;
    btn.style.color = p.color;
    btn.style.borderColor = p.color;
    btn.textContent = p.shortLabel || p.label;
    btn.onclick = function() { switchPart(p.id); };
    if (selectedPart === p.id) btn.classList.add('active');
    singContainer.appendChild(btn);
  }
}

function buildMiniPiano() {
  const container = document.getElementById('miniPiano');
  container.innerHTML = '';
  if (!selectedPart) return;
  const defaultRange = RANGE[selectedPart] || [48, 72];
  const lo = customRange.low !== null ? customRange.low : defaultRange[0];
  const hi = customRange.high !== null ? customRange.high : defaultRange[1];
  const blackKeys = new Set([1,3,6,8,10]);
  for (let midi = lo; midi <= hi; midi++) {
    const semitone = midi % 12;
    const isBlack = blackKeys.has(semitone);
    const key = document.createElement('div');
    key.className = `mini-key ${isBlack ? 'black' : 'white'}`;
    key.dataset.midi = midi;
    container.appendChild(key);
  }
}

function updateMiniPiano(midi) {
  const color = PART_COLORS[selectedPart] || '#e94560';
  document.querySelectorAll('.mini-key').forEach(k => {
    const m = parseInt(k.dataset.midi);
    k.style.background = (m === midi) ? color : '';
  });
}

// Syllable display
function updateSyllableDisplay() {
  const el = document.getElementById('syllableDisplay');

  // Clear any existing pulse
  if (pulseTimer) { clearInterval(pulseTimer); pulseTimer = null; }

  if (isPulsing) {
    startPulse();
  } else {
    el.style.transition = 'none';
    el.style.opacity = '1';
    el.textContent = currentSyllable;
  }
}

function startPulse() {
  if (pulseTimer) clearInterval(pulseTimer);
  const el = document.getElementById('syllableDisplay');
  const intervalMs = 60000 / pulseBpm;
  const fadeDuration = Math.max(200, intervalMs - 50);

  // Flash on immediately then fade
  el.textContent = currentSyllable;
  el.style.transition = 'none';
  el.style.opacity = '1';
  void el.offsetWidth;
  el.style.transition = `opacity ${fadeDuration}ms ease-out`;
  el.style.opacity = '0';

  pulseTimer = setInterval(() => {
    if (isPulsing) {
      el.textContent = currentSyllable;
      el.style.transition = 'none';
      el.style.opacity = '1';
      void el.offsetWidth;
      el.style.transition = `opacity ${fadeDuration}ms ease-out`;
      el.style.opacity = '0';
    }
  }, intervalMs);
}

// Mute controls
function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.classList.toggle('muted', isMuted);
  btn.textContent = isMuted ? 'Unmute' : 'Mute';
  if (isMuted) {
    if (autoMuteTimer) { clearTimeout(autoMuteTimer); autoMuteTimer = null; }
    if (gainNode && audioCtx) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
  } else {
    if (currentMidi >= 0 && gainNode && audioCtx) {
      gainNode.gain.setTargetAtTime(partVolume, audioCtx.currentTime, 0.01);
    }
  }
}

function toggleMode() {
  muteMode = muteMode === 'manual' ? 'auto' : 'manual';
  document.getElementById('modeToggle').textContent = muteMode === 'manual' ? 'Manual' : 'Auto (2s)';
}

// Audio setup
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();

  const silentBuf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
  const src = audioCtx.createBufferSource();
  src.buffer = silentBuf;
  src.connect(audioCtx.destination);
  src.start();

  startSilentKeepAlive();

  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;

  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 2000;
  filterNode.Q.value = 1.0;

  const partials = [
    [1,    0.40,   0],
    [1,    0.15,   6],
    [2,    0.10,  -4],
    [3,    0.03,   3],
    [4,    0.01,  -5],
  ];

  for (const [mult, amp, detune] of partials) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 440 * mult;
    osc.detune.value = detune;
    const partialGain = audioCtx.createGain();
    partialGain.gain.value = amp;
    osc.connect(partialGain);
    partialGain.connect(filterNode);
    osc.start();
    oscillators.push({ osc, gain: partialGain, mult });
  }

  filterNode.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

function startSilentKeepAlive() {
  if (document.getElementById('keepAlive')) return;
  const wav = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAESsAAABAAgAZGF0YQAAAAA=';
  const audio = document.createElement('audio');
  audio.id = 'keepAlive';
  audio.loop = true;
  audio.src = wav;
  audio.volume = 0.01;
  document.body.appendChild(audio);
  audio.play().catch(() => {});
}

function playNote(midi) {
  if (!audioCtx || oscillators.length === 0) return;

  if (midi < 0) {
    if (currentMidi >= 0) {
      gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.03);
      currentMidi = -1;
    }
    return;
  }

  const freq = midiToFreq(midi);
  const wassilent = currentMidi < 0;
  currentMidi = midi;

  for (const p of oscillators) {
    p.osc.frequency.setTargetAtTime(freq * p.mult, audioCtx.currentTime, wassilent ? 0.005 : 0.015);
  }

  if (isMuted && muteMode === 'manual') {
    isMuted = false;
    document.getElementById('muteBtn').classList.remove('muted');
    document.getElementById('muteBtn').textContent = 'Mute';
  }

  if (!isMuted) {
    gainNode.gain.setTargetAtTime(partVolume, audioCtx.currentTime, 0.01);
  }

  if (muteMode === 'auto') {
    if (autoMuteTimer) clearTimeout(autoMuteTimer);
    isMuted = false;
    document.getElementById('muteBtn').classList.remove('muted');
    document.getElementById('muteBtn').textContent = 'Mute';
    gainNode.gain.setTargetAtTime(partVolume, audioCtx.currentTime, 0.01);

    autoMuteTimer = setTimeout(() => {
      gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
      isMuted = true;
      document.getElementById('muteBtn').classList.add('muted');
      document.getElementById('muteBtn').textContent = 'Unmute';
    }, 2000);
  }
}

function updateNoteDisplay(midi) {
  const el = document.getElementById('noteDisplay');
  if (midi < 0) {
    el.textContent = '---';
    el.className = 'current-note silent';
    el.style.color = '';
  } else {
    el.textContent = noteName(midi);
    el.className = 'current-note';
    el.style.color = PART_COLORS[selectedPart] || '#e94560';
  }
  updateMiniPiano(midi);
}

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch {}
}

function connectWebSocket(code, isReconnect) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    reconnectAttempts = 0;
    const part = selectedPart || classifyRange(customRange.low, customRange.high) || (dynamicParts ? dynamicParts[0].id : 'soprano');
    const range = (customRange.low !== null && customRange.high !== null)
      ? [customRange.low, customRange.high] : (RANGE[part] || [48, 72]);
    const singerName = (document.getElementById('nameInput')?.value || '').trim();
    ws.send(JSON.stringify({ t: 'join', code, part, range, name: singerName || undefined }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.t === 'joined') {
      roomCode = msg.code;
      myId = msg.id;
      document.getElementById('joinScreen').style.display = 'none';
      document.getElementById('singScreen').style.display = 'block';
      updatePartDisplay();
      buildMiniPiano();
      document.getElementById('roomInfo').textContent = `Room: ${msg.code}`;
      if (msg.name) document.getElementById('singerName').textContent = msg.name;
      document.getElementById('connStatus').textContent = isReconnect ? 'Reconnected' : 'Connected';
      document.getElementById('connStatus').className = 'conn-status connected';
      requestWakeLock();
      // Populate sing-screen range fields with current range values
      if (customRange.low !== null) {
        document.getElementById('singRangeLow').value = noteName(customRange.low);
      }
      if (customRange.high !== null) {
        document.getElementById('singRangeHigh').value = noteName(customRange.high);
      }

    } else if (msg.t === 'error') {
      if (isReconnect) {
        intentionalClose = true;
        document.getElementById('connStatus').textContent = 'Room closed';
        document.getElementById('connStatus').className = 'conn-status disconnected';
      } else {
        document.getElementById('error').textContent = msg.msg;
      }

    } else if (msg.t === 'n') {
      const midi = msg.notes[myId];
      if (midi !== undefined) {
        playNote(midi);
        updateNoteDisplay(midi);
      }

    } else if (msg.t === 'parts') {
      // Conductor changed the part configuration
      dynamicParts = msg.parts;
      PART_COLORS = {};
      RANGE = {};
      for (const p of msg.parts) {
        PART_COLORS[p.id] = p.color;
        RANGE[p.id] = p.range;
      }
      // Reassign singer to closest new part if current part no longer exists
      if (!msg.parts.find(p => p.id === selectedPart)) {
        const mid = (customRange.low !== null && customRange.high !== null)
          ? (customRange.low + customRange.high) / 2 : 60;
        let bestPart = msg.parts[0];
        let bestDist = Infinity;
        for (const p of msg.parts) {
          const dist = Math.abs(mid - p.mid);
          if (dist < bestDist) { bestDist = dist; bestPart = p; }
        }
        selectedPart = bestPart.id;
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ t: 'part', part: selectedPart, range: [customRange.low, customRange.high] }));
        }
      }
      rebuildPartButtons(msg.parts);
      updatePartDisplay();
      buildMiniPiano();

    } else if (msg.t === 'r') {
      // Room state — count singers per part dynamically
      const counts = {};
      if (dynamicParts) {
        for (const p of dynamicParts) counts[p.id] = 0;
      } else {
        counts.soprano = 0; counts.alto = 0; counts.tenor = 0; counts.bass = 0;
      }
      for (const s of msg.singers) counts[s.part] = (counts[s.part] || 0) + 1;
      const parts = dynamicParts || [{id:'soprano',shortLabel:'S'},{id:'alto',shortLabel:'A'},{id:'tenor',shortLabel:'T'},{id:'bass',shortLabel:'B'}];
      document.getElementById('singerCounts').textContent =
        parts.map(p => `${p.shortLabel || p.id.charAt(0).toUpperCase()}:${counts[p.id]||0}`).join(' ');

    } else if (msg.t === 'ended') {
      intentionalClose = true;
      document.getElementById('connStatus').textContent = 'Session ended by conductor';
      document.getElementById('connStatus').className = 'conn-status disconnected';
      if (gainNode && audioCtx) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.03);

    } else if (msg.t === 'vol') {
      const vol = msg[selectedPart];
      if (vol !== undefined) {
        partVolume = vol / 100;
        if (gainNode && audioCtx && currentMidi >= 0 && !isMuted) {
          gainNode.gain.setTargetAtTime(partVolume, audioCtx.currentTime, 0.05);
        }
      }

    } else if (msg.t === 'syl') {
      if (msg.perPart && msg.perPart[selectedPart]) {
        const pd = msg.perPart[selectedPart];
        currentSyllable = pd.text;
        isPulsing = !!pd.pulse;
        if (pd.bpm) pulseBpm = pd.bpm;
      }
      updateSyllableDisplay();
    }
  };

  ws.onclose = () => {
    if (intentionalClose) return;
    if (roomCode && reconnectAttempts < MAX_RECONNECT) {
      reconnectAttempts++;
      const delay = Math.min(1000 * reconnectAttempts, 5000);
      document.getElementById('connStatus').textContent = `Reconnecting (${reconnectAttempts})...`;
      document.getElementById('connStatus').className = 'conn-status disconnected';
      setTimeout(() => {
        if (!intentionalClose) connectWebSocket(roomCode, true);
      }, delay);
    } else {
      document.getElementById('connStatus').textContent = 'Disconnected';
      document.getElementById('connStatus').className = 'conn-status disconnected';
    }
  };
}

function joinRoom() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (code.length !== 4 || customRange.low === null || customRange.high === null) return;

  closeRangePicker();
  stopRangePreview();
  initAudio();
  document.getElementById('error').textContent = '';
  intentionalClose = false;
  reconnectAttempts = 0;
  connectWebSocket(code, false);
}

function showJoin() {
  intentionalClose = true;
  if (ws) ws.close();
  if (gainNode && audioCtx) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
  currentMidi = -1;
  roomCode = null;
  document.getElementById('joinScreen').style.display = '';
  document.getElementById('singScreen').style.display = 'none';
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    requestWakeLock();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    const ka = document.getElementById('keepAlive');
    if (ka && ka.paused) ka.play().catch(() => {});
    if (roomCode && (!ws || ws.readyState > 1) && !intentionalClose) {
      reconnectAttempts = 0;
      connectWebSocket(roomCode, true);
    }
  }
});

// Test mode
const isTestMode = new URLSearchParams(location.search).has('test');
if (isTestMode) {
  document.getElementById('codeInput').value = 'TEST';
  document.getElementById('codeInput').style.display = 'none';
  document.querySelector('.subtitle').textContent = 'Test mode — pick your part';

  const origSelectPart = selectPart;
  selectPart = function(btn) {
    origSelectPart(btn);
    joinRoom();
  };
}
