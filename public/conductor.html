<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singing Earring - Conductor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 10px; color: #e94560; }
  .room-code { font-size: 3rem; font-weight: bold; letter-spacing: 0.3em; color: #0f3460; background: #e94560; padding: 10px 24px; border-radius: 12px; display: inline-block; margin: 10px 0; }
  .section { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .section h2 { font-size: 1rem; color: #e94560; margin-bottom: 8px; }
  .master-display { display: flex; gap: 0; margin-top: 12px; overflow: visible; align-items: stretch; }
  .vol-controls { display: flex; flex-direction: column; justify-content: center; gap: 6px; margin-right: 6px; flex-shrink: 0; }
  .vol-btn { width: 36px; height: 72px; border-radius: 6px; background: #222; border: none; color: #888; font-size: 1.2rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; padding: 2px 0; }
  .vol-btn:active { background: #333; }
  .vol-btn .vol-key { font-size: 1.2rem; color: rgba(255,255,255,0.35); font-weight: bold; }
  .part-column { position: relative; flex: 1; text-align: center; padding: 12px 8px; margin: 0 3px; border: 3px solid transparent; border-radius: 12px; transition: border-color 0.1s; min-width: 0; box-sizing: border-box; }
  .part-column:first-child { margin-left: 0; }
  .part-column:last-child { margin-right: 0; }
  .part-column .part-label { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; }
  .part-column .part-modifier { font-size: 1.5rem; opacity: 0.4; margin-top: 2px; }
  .part-column .part-count { font-size: 1.4rem; font-weight: bold; }
  .part-column .part-syllable { font-size: 2rem; font-weight: bold; margin: 8px 0 4px; height: 2.4rem; overflow: hidden; }
  .part-column .part-note { font-size: 2.2rem; font-weight: 600; height: 2.6rem; overflow: hidden; opacity: 0.7; }
  .part-column .vol-bar-wrap { position: absolute; top: 8px; bottom: 8px; right: 6px; width: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .part-column .vol-bar { position: absolute; bottom: 0; width: 100%; border-radius: 4px; transition: height 0.1s; }
  .midi-select { background: #0f3460; border: 1px solid #e94560; color: #eee; padding: 8px 12px; border-radius: 8px; font-size: 1rem; width: 100%; }
  .midi-status { font-size: 0.85rem; color: #888; margin-top: 6px; }
  .piano-wrapper { position: relative; margin-top: 10px; }
  .piano { display: flex; position: relative; height: 140px; user-select: none; -webkit-user-select: none; touch-action: none; }
  .key { position: relative; border: 1px solid #333; border-radius: 0 0 6px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; font-size: 1.3rem; color: #888; transition: background 0.05s; }
  .key.white { background: #ddd; flex: 1; height: 140px; z-index: 1; }
  .key.black { background: #222; width: 28px; height: 85px; margin-left: -14px; margin-right: -14px; z-index: 2; color: #666; }
  .key > * { pointer-events: none; }
  .key .keybind { font-size: 1.2rem; color: rgba(0,0,0,0.35); margin-top: 2px; font-weight: bold; }
  .key.black .keybind { color: rgba(255,255,255,0.3); }
  .range-indicators { position: relative; height: 20px; margin-top: 2px; }
  .range-line { position: absolute; height: 2px; border-radius: 1px; }
  #status { font-size: 0.85rem; color: #888; margin-top: 10px; }
  button { background: #e94560; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #c23152; }
  /* Indicator controls */
  .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .sustain-toggle { padding: 2px 8px; border-radius: 6px; background: #222; font-size: 1.8rem; cursor: pointer; color: #888; transition: all 0.15s; }
  .syl-btn { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 6px; background: #222; cursor: pointer; font-size: 1.8rem; color: #888; transition: all 0.15s; border: 2px solid transparent; }
  .syl-btn.active { background: #e94560; color: white; border-color: #e94560; }
  .syl-key { font-size: 1.8rem; color: rgba(255,255,255,0.35); }
  .syl-input { background: transparent; border: none; color: inherit; font: inherit; width: 3.5em; text-align: center; outline: none; padding: 0; }
  .syl-input:focus { border-bottom: 1px solid currentColor; }
  .bpm-control { display: flex; align-items: center; gap: 8px; font-size: 1.8rem; color: #888; }
  .bpm-control button { padding: 2px 8px; font-size: 1.8rem; border-radius: 6px; }
  .bpm-input { background: transparent; border: none; border-bottom: 1px solid #555; color: #eee; font: inherit; width: 3em; text-align: center; outline: none; }
</style>
</head>
<body>

<h1>Singing Earring - Conductor</h1>

<div id="setup" class="section">
  <button id="createBtn" onclick="createRoom()">Create Room</button>
  <div id="status"></div>
</div>

<div id="roomInfo" class="section" style="display:none">
  <div id="singerUrl" style="font-size: 1.3rem; color: #888; margin-bottom: 8px;"></div>
  <h2>Room Code</h2>
  <div class="room-code" id="roomCode"></div>
  <div class="master-display">
    <div class="vol-controls">
      <div class="vol-btn" onclick="adjustVolume(5)">▲<span class="vol-key">9</span></div>
      <div class="vol-btn" onclick="adjustVolume(-5)">▼<span class="vol-key">6</span></div>
    </div>
    <div class="part-column" data-part="bass" style="color: #34d399;">
      <div class="part-label">Bass</div>
      <div class="part-modifier">Z</div>
      <div class="part-count" id="countB">0</div>
      <div class="part-syllable" id="sylB"></div>
      <div class="part-note" id="noteB"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volB" style="height:50%;background:#34d399;"></div></div>
    </div>
    <div class="part-column" data-part="tenor" style="color: #60a5fa;">
      <div class="part-label">Tenor</div>
      <div class="part-modifier">X</div>
      <div class="part-count" id="countT">0</div>
      <div class="part-syllable" id="sylT"></div>
      <div class="part-note" id="noteT"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volT" style="height:50%;background:#60a5fa;"></div></div>
    </div>
    <div class="part-column" data-part="alto" style="color: #c084fc;">
      <div class="part-label">Alto</div>
      <div class="part-modifier">C</div>
      <div class="part-count" id="countA">0</div>
      <div class="part-syllable" id="sylA"></div>
      <div class="part-note" id="noteA"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volA" style="height:50%;background:#c084fc;"></div></div>
    </div>
    <div class="part-column" data-part="soprano" style="color: #ff6b9d;">
      <div class="part-label">Soprano</div>
      <div class="part-modifier">V</div>
      <div class="part-count" id="countS">0</div>
      <div class="part-syllable" id="sylS"></div>
      <div class="part-note" id="noteS"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volS" style="height:50%;background:#ff6b9d;"></div></div>
    </div>
  </div>
</div>

<div id="midiSection" class="section" style="display:none">
  <h2>MIDI Input</h2>
  <select id="midiSelect" class="midi-select"><option value="">No MIDI devices found</option></select>
  <div class="midi-status" id="midiStatus">Requesting MIDI access...</div>
</div>

<div id="controlsSection" class="section" style="display:none">
  <h2>Controls</h2>
  <div class="controls-row">
    <div class="syl-btn active" data-idx="0" onclick="setSyllable(0)">
      <input class="syl-input" type="text" maxlength="6" value="Aah" data-idx="0"><span class="syl-key">A</span>
    </div>
    <div class="syl-btn" data-idx="1" onclick="setSyllable(1)">
      <input class="syl-input" type="text" maxlength="6" value="Mmm" data-idx="1"><span class="syl-key">M</span>
    </div>
    <div class="syl-btn" data-idx="2" onclick="setSyllable(2)">
      <input class="syl-input" type="text" maxlength="6" value="Hoo" data-idx="2"><span class="syl-key">H</span>
    </div>
    <div class="syl-btn" data-idx="3" onclick="setSyllable(3)">
      <input class="syl-input" type="text" maxlength="6" value="Bum" data-idx="3"><span class="syl-key">B</span>
    </div>
    <div class="syl-btn" data-idx="4" onclick="setSyllable(4)">
      <input class="syl-input" type="text" maxlength="6" value="Shh" data-idx="4"><span class="syl-key">S</span>
    </div>
    <div class="bpm-control" id="bpmControl" style="display:none">
      <button onclick="adjustBpm(-5)">&lt; <span class="syl-key">,</span></button>
      <span>BPM = </span><input class="bpm-input" id="bpmInput" type="text" inputmode="numeric" pattern="[0-9]*" value="100">
      <button onclick="adjustBpm(5)">&gt; <span class="syl-key">.</span></button>
    </div>
  </div>
  <div class="controls-row">
    <div class="sustain-toggle" id="sustainToggle" onclick="toggleSustain()">Sustain: Off <span class="syl-key">Space</span></div>
    <div class="sustain-toggle" id="modeToggle" onclick="toggleAutoVoicing()">Manual Voicing <span class="syl-key">F</span></div>
  </div>
</div>

<div id="autoVoicingControls" class="section" style="display:none">
  <h2>Auto Voicing</h2>
  <div style="display:flex;gap:20px;align-items:flex-start;">
    <div id="autoControlsLeft" style="flex-shrink:0;">
      <div class="controls-row" style="gap:16px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:1rem;color:#ccc;cursor:pointer;">
          <input type="checkbox" id="rootInBassCheck" checked onchange="rootInBass=this.checked"> Root in Bass
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:1rem;color:#ccc;">
          Voices: <input type="number" id="numVoicesInput" min="1" max="12" value="4" style="width:3.5em;background:#0f3460;border:1px solid #e94560;color:#eee;padding:4px 6px;border-radius:6px;font-size:1rem;text-align:center;" onchange="numVoices=Math.max(1,Math.min(12,parseInt(this.value)||4))">
        </label>
      </div>
      <div class="controls-row" style="gap:16px;margin-top:8px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:1rem;color:#ccc;">
          Key:
          <select id="tonicSelect" class="midi-select" style="width:auto;padding:4px 8px;" onchange="selectedKey.tonic=parseInt(this.value);updateStaffDisplay();updateChordDisplay();updatePianoLabels();">
            <option value="0">C</option><option value="1">C#/Db</option><option value="2">D</option>
            <option value="3">D#/Eb</option><option value="4">E</option><option value="5">F</option>
            <option value="6">F#/Gb</option><option value="7">G</option><option value="8">G#/Ab</option>
            <option value="9">A</option><option value="10">A#/Bb</option><option value="11">B</option>
          </select>
          <select id="modeSelect" class="midi-select" style="width:auto;padding:4px 8px;" onchange="selectedKey.mode=this.value.toLowerCase();updateStaffDisplay();updateChordDisplay();updatePianoLabels();">
            <option value="major">Major</option><option value="minor">Minor</option>
          </select>
        </label>
      </div>
      <div id="chordDisplay" style="font-size:2.5rem;font-weight:bold;color:#fbbf24;margin-top:12px;min-height:3rem;"></div>
      <div id="degreeHints" style="font-size:0.85rem;color:#666;margin-top:8px;">
        Press 1–7 for scale degrees. Hold 0=dim, -=minor, ==major.
      </div>
    </div>
    <div id="staffContainer" style="flex:1;min-width:0;"></div>
  </div>
</div>

<div id="keyboardSection" class="section" style="display:none">
  <div class="piano-wrapper">
    <div class="piano" id="piano"></div>
    <div class="range-indicators" id="rangeIndicators"></div>
  </div>
</div>

<script>
// === Constants ===
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const PARTS = ['bass','tenor','alto','soprano'];
const PART_COLORS = { soprano: '#ff6b9d', alto: '#c084fc', tenor: '#60a5fa', bass: '#34d399' };
const RANGE_MID = { soprano: 72, alto: 69, tenor: 55, bass: 43 };
const RANGE = {
  soprano: [60, 79],
  alto:    [53, 72],
  tenor:   [48, 67],
  bass:    [40, 60],
};
const PART_SUFFIXES = { bass: 'B', tenor: 'T', alto: 'A', soprano: 'S' };

// === State ===
let ws = null;
let midiAccess = null;
let currentInput = null;
let heldNotes = new Set();       // physically pressed MIDI notes
let singers = [];                // [{id, part}, ...]
let sustainMode = false;         // sustain pedal: notes persist after release
let modifiers = { z: false, x: false, c: false, v: false }; // ZXCV part targeting
let partNotes = { bass: -1, tenor: -1, alto: -1, soprano: -1 }; // current note per part
let lastAssignments = {};        // {singerId: midi} — last sent to singers
let masterPulseTimer = null;

// Syllable system — always per-part
let activeSyllable = 0;
const syllables = [
  { text: 'Aah', pulse: false },
  { text: 'Mmm', pulse: false },
  { text: 'Hoo', pulse: false },
  { text: 'Bum', pulse: true },
  { text: 'Shh', pulse: false, percussive: true },
];
let pulseBpm = 100;
let partSyllables = { bass: 0, tenor: 0, alto: 0, soprano: 0 };

// Volume per part (0–100, default 50)
let partVolumes = { bass: 50, tenor: 50, alto: 50, soprano: 50 };

// Auto-voicing state
let autoVoicing = false;
let selectedKey = { tonic: 0, mode: 'major' }; // tonic as pitch class (0=C)
let numVoices = 4;
let rootInBass = true;
let currentChord = null;          // { root: pitchClass, quality: 'major'|'minor'|'dim'|'aug' }
let chordModifiers = { dim: false, min: false, maj: false };
let previousVoicing = null;       // snapshot of partNotes for voice leading

// Scale degree definitions
const SCALE_DEGREES = {
  major: [
    { interval: 0, quality: 'major' },   // I
    { interval: 2, quality: 'minor' },   // ii
    { interval: 4, quality: 'minor' },   // iii
    { interval: 5, quality: 'major' },   // IV
    { interval: 7, quality: 'major' },   // V
    { interval: 9, quality: 'minor' },   // vi
    { interval: 11, quality: 'dim' },    // vii°
  ],
  minor: [
    { interval: 0, quality: 'minor' },   // i
    { interval: 2, quality: 'dim' },     // ii°
    { interval: 3, quality: 'major' },   // III
    { interval: 5, quality: 'minor' },   // iv
    { interval: 7, quality: 'minor' },   // v
    { interval: 8, quality: 'major' },   // VI
    { interval: 10, quality: 'major' },  // VII
  ],
};

const CHORD_INTERVALS = {
  major: [0, 4, 7],
  minor: [0, 3, 7],
  dim: [0, 3, 6],
  aug: [0, 4, 8],
};

const QUALITY_LABELS = { major: '', minor: 'm', dim: '°', aug: '+' };

const SHARP_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_NAMES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

// Number of sharps (positive) or flats (negative) for each key
const KEY_SIGNATURES = {
  major: { 0:0, 1:7, 2:2, 3:-3, 4:4, 5:-1, 6:6, 7:1, 8:-4, 9:3, 10:-2, 11:5 },
  minor: { 0:-3, 1:4, 2:-1, 3:6, 4:1, 5:-4, 6:3, 7:-2, 8:5, 9:0, 10:-5, 11:2 },
};

function noteNameInKey(pitchClass) {
  const sig = KEY_SIGNATURES[selectedKey.mode][selectedKey.tonic];
  return sig >= 0 ? SHARP_NAMES[pitchClass] : FLAT_NAMES[pitchClass];
}

// Volume hold state
let volHoldTimeout = null;
let volHoldInterval = null;
let volHoldDone = false;

// BPM hold state
let bpmHoldTimeout = null;
let bpmHoldInterval = null;
let bpmHoldDone = false;

// === Helpers ===
function noteName(midi) {
  return NOTES[midi % 12] + (Math.floor(midi / 12) - 1);
}

function fitToRange(note, part) {
  const [lo, hi] = RANGE[part];
  while (note < lo) note += 12;
  while (note > hi) note -= 12;
  if (note < lo) note = lo;
  if (note > hi) note = hi;
  return note;
}

function getTargetParts() {
  if (!modifiers.z && !modifiers.x && !modifiers.c && !modifiers.v) {
    return ['bass', 'tenor', 'alto', 'soprano'];
  }
  const parts = [];
  if (modifiers.z) parts.push('bass');
  if (modifiers.x) parts.push('tenor');
  if (modifiers.c) parts.push('alto');
  if (modifiers.v) parts.push('soprano');
  return parts;
}

function singerCountForPart(part) {
  return singers.filter(s => s.part === part).length;
}

// === Core: note distribution ===

// Distribute notes across targeted parts. Non-targeted parts are unchanged.
function distributeNotes(notes, targetParts) {
  const sorted = [...notes].sort((a, b) => a - b);

  if (sorted.length === 0) {
    for (const part of targetParts) partNotes[part] = -1;
    return;
  }

  // Filter to parts with singers (fall back to all targeted if none have singers)
  const activeParts = targetParts.filter(p => singerCountForPart(p) > 0);
  const partsToUse = activeParts.length > 0 ? activeParts : targetParts;

  // Sort target parts by range (low to high)
  const partsByRange = [...partsToUse].sort((a, b) => RANGE_MID[a] - RANGE_MID[b]);
  const n = sorted.length, p = partsByRange.length;

  if (n >= p) {
    for (let pi = 0; pi < p; pi++) {
      const ni = Math.round(pi * (n - 1) / (p - 1 || 1));
      partNotes[partsByRange[pi]] = sorted[ni];
    }
  } else {
    const base = Math.floor(p / n);
    const remainder = p % n;
    let partIdx = 0;
    for (let ni = 0; ni < n; ni++) {
      const count = base + (ni < remainder ? 1 : 0);
      for (let j = 0; j < count; j++) {
        partNotes[partsByRange[partIdx]] = sorted[ni];
        partIdx++;
      }
    }
  }
}

// Build per-singer assignments from partNotes
function buildSingerAssignments() {
  const assignments = {};
  for (const singer of singers) {
    const note = partNotes[singer.part];
    assignments[singer.id] = note >= 0 ? fitToRange(note, singer.part) : -1;
  }
  return assignments;
}

// === Note on/off ===

function noteOn(midi) {
  if (autoVoicing) {
    const pitchClass = midi % 12;
    const quality = getChordQuality(pitchClass);
    setChord({ root: pitchClass, quality });
    heldNotes.add(midi);
    return;
  }
  heldNotes.add(midi);
  const targetParts = getTargetParts();
  distributeNotes(heldNotes, targetParts);
  // In non-sustain mode, silence non-targeted parts
  if (!sustainMode) {
    for (const part of PARTS) {
      if (!targetParts.includes(part)) partNotes[part] = -1;
    }
  }
  updateDisplay();
}

function noteOff(midi) {
  heldNotes.delete(midi);
  if (autoVoicing) {
    if (!sustainMode && heldNotes.size === 0) {
      for (const part of PARTS) partNotes[part] = -1;
      currentChord = null;
      updateDisplay();
      updateChordDisplay();
      updateStaffDisplay();
    }
    return;
  }
  if (sustainMode) return; // assignments persist
  const targetParts = getTargetParts();
  distributeNotes(heldNotes, targetParts);
  for (const part of PARTS) {
    if (!targetParts.includes(part)) partNotes[part] = -1;
  }
  updateDisplay();
}

// === Display ===

function updateDisplay() {
  const assignments = buildSingerAssignments();
  lastAssignments = { ...assignments };

  if (ws && ws.readyState === 1 && singers.length > 0) {
    ws.send(JSON.stringify({ t: 'n', notes: assignments }));
  }

  updateMasterDisplay();

  // Color piano keys by which parts are assigned to each key
  document.querySelectorAll('.key').forEach(k => {
    const midi = parseInt(k.dataset.midi);
    const partsOnKey = [];
    for (const part of PARTS) {
      if (partNotes[part] === midi) partsOnKey.push(part);
    }
    if (partsOnKey.length === 0) {
      k.style.background = '';
    } else if (partsOnKey.length === 1) {
      k.style.background = PART_COLORS[partsOnKey[0]];
    } else {
      const stops = partsOnKey.map((p, i) => {
        const pct1 = (i / partsOnKey.length * 100).toFixed(1);
        const pct2 = ((i + 1) / partsOnKey.length * 100).toFixed(1);
        return `${PART_COLORS[p]} ${pct1}%, ${PART_COLORS[p]} ${pct2}%`;
      }).join(', ');
      k.style.background = `linear-gradient(to right, ${stops})`;
    }
  });
}

function updateMasterDisplay() {
  for (const part of PARTS) {
    const note = partNotes[part];
    const el = document.getElementById('note' + PART_SUFFIXES[part]);
    el.textContent = note >= 0 ? noteName(note) : '';
  }
  updateMasterSyllables();
}

// === Syllable system ===

function getPartSyllable(part) {
  return syllables[partSyllables[part]];
}

function anyPartPulsing() {
  return PARTS.some(p => syllables[partSyllables[p]].pulse);
}

function setSyllable(index) {
  activeSyllable = index;
  const parts = getTargetParts();
  for (const part of parts) partSyllables[part] = index;
  // Percussive syllable cancels the note for targeted parts
  if (syllables[index].percussive) {
    for (const part of parts) partNotes[part] = -1;
    updateDisplay();
  }
  updateIndicators();
  sendSyllable();
}

function sendSyllable() {
  const msg = { t: 'syl', perPart: {} };
  for (const part of PARTS) {
    const syl = syllables[partSyllables[part]];
    const pd = { text: syl.text };
    if (syl.pulse) { pd.pulse = true; pd.bpm = pulseBpm; }
    msg.perPart[part] = pd;
  }
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

function updateMasterSyllables() {
  for (const part of PARTS) {
    const syl = getPartSyllable(part);
    const el = document.getElementById('syl' + PART_SUFFIXES[part]);
    if (!syl.pulse) {
      el.style.transition = 'none';
      el.style.opacity = '1';
      el.textContent = syl.text;
    }
  }
}

function startMasterPulse() {
  if (masterPulseTimer) { clearInterval(masterPulseTimer); masterPulseTimer = null; }

  if (!anyPartPulsing()) {
    for (const part of PARTS) {
      const el = document.getElementById('syl' + PART_SUFFIXES[part]);
      el.style.transition = 'none';
      el.style.opacity = '1';
    }
    updateMasterSyllables();
    return;
  }

  const intervalMs = 60000 / pulseBpm;
  const fadeDuration = Math.max(200, intervalMs - 50);

  function doPulseFlash() {
    for (const part of PARTS) {
      const syl = getPartSyllable(part);
      const el = document.getElementById('syl' + PART_SUFFIXES[part]);
      if (syl.pulse) {
        el.textContent = syl.text;
        el.style.transition = 'none';
        el.style.opacity = '1';
        void el.offsetWidth;
        el.style.transition = `opacity ${fadeDuration}ms ease-out`;
        el.style.opacity = '0';
      }
    }
  }

  updateMasterSyllables();
  doPulseFlash();
  masterPulseTimer = setInterval(doPulseFlash, intervalMs);
}

function updateIndicators() {
  document.querySelectorAll('.syl-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    btn.classList.toggle('active', idx === activeSyllable);
  });
  document.getElementById('bpmControl').style.display = anyPartPulsing() ? 'flex' : 'none';
  startMasterPulse();
  updateMasterDisplay();
}

// === Volume system ===

function adjustVolume(delta) {
  const parts = getTargetParts();
  for (const part of parts) {
    partVolumes[part] = Math.max(0, Math.min(100, partVolumes[part] + delta));
  }
  updateVolumeBars();
  sendVolume();
}

function updateVolumeBars() {
  for (const part of PARTS) {
    document.getElementById('vol' + PART_SUFFIXES[part]).style.height = partVolumes[part] + '%';
  }
}

function sendVolume() {
  const msg = { t: 'vol', bass: partVolumes.bass, tenor: partVolumes.tenor, alto: partVolumes.alto, soprano: partVolumes.soprano };
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

function startVolHold(delta) {
  stopVolHold();
  volHoldDone = false;
  adjustVolume(delta > 0 ? 5 : -5);
  volHoldTimeout = setTimeout(() => {
    volHoldDone = true;
    volHoldInterval = setInterval(() => { adjustVolume(delta > 0 ? 2 : -2); }, 80);
  }, 500);
}

function stopVolHold() {
  if (volHoldTimeout) { clearTimeout(volHoldTimeout); volHoldTimeout = null; }
  if (volHoldInterval) { clearInterval(volHoldInterval); volHoldInterval = null; }
  volHoldDone = false;
}

// === BPM system ===

function adjustBpm(delta) {
  pulseBpm = Math.max(30, Math.min(300, pulseBpm + delta));
  document.getElementById('bpmInput').value = pulseBpm;
  if (anyPartPulsing()) { startMasterPulse(); sendSyllable(); }
}

function startBpmHold(delta) {
  stopBpmHold();
  bpmHoldDone = false;
  bpmHoldTimeout = setTimeout(() => {
    bpmHoldDone = true;
    bpmHoldInterval = setInterval(() => { adjustBpm(delta > 0 ? 1 : -1); }, 80);
  }, 1000);
}

function stopBpmHold(doInitial, delta) {
  if (bpmHoldTimeout) { clearTimeout(bpmHoldTimeout); bpmHoldTimeout = null; }
  if (bpmHoldInterval) { clearInterval(bpmHoldInterval); bpmHoldInterval = null; }
  if (doInitial && !bpmHoldDone) { adjustBpm(delta); }
  bpmHoldDone = false;
}

// === Sustain toggle ===

function toggleSustain() {
  sustainMode = !sustainMode;
  const el = document.getElementById('sustainToggle');
  el.innerHTML = (sustainMode ? 'Sustain: On' : 'Sustain: Off') + ' <span class="syl-key">Space</span>';
  el.style.background = sustainMode ? '#e94560' : '#222';
  el.style.color = sustainMode ? '#fff' : '#888';

  if (!sustainMode) {
    // Turning off: if no keys held, silence everything
    if (heldNotes.size === 0) {
      for (const part of PARTS) partNotes[part] = -1;
      updateDisplay();
    } else {
      // Keys still held: redistribute to all parts
      distributeNotes(heldNotes, PARTS);
      updateDisplay();
    }
  }
  // Turning on: current assignments persist, no state change needed

  updateTargetHighlight();
}

// === Auto-voicing system ===

function toggleAutoVoicing() {
  autoVoicing = !autoVoicing;
  document.getElementById('autoVoicingControls').style.display = autoVoicing ? '' : 'none';
  const el = document.getElementById('modeToggle');
  el.innerHTML = (autoVoicing ? 'Auto Voicing' : 'Manual Voicing') + ' <span class="syl-key">F</span>';
  el.style.background = autoVoicing ? '#e94560' : '#222';
  el.style.color = autoVoicing ? '#fff' : '#888';
  // Update volume key labels
  document.querySelector('.vol-btn:last-child .vol-key').textContent = autoVoicing ? '8' : '6';
  // Clear state when switching
  currentChord = null;
  previousVoicing = null;
  for (const part of PARTS) partNotes[part] = -1;
  heldNotes.clear();
  heldKeyboard.clear();
  updateDisplay();
  updateChordDisplay();
  updateStaffDisplay();
  updatePianoLabels();
}

function getChordQuality(pitchClass) {
  // If modifier held, override quality
  if (chordModifiers.dim) return 'dim';
  if (chordModifiers.min) return 'minor';
  if (chordModifiers.maj) return 'major';
  // Otherwise, infer from key: find which scale degree this pitch class is
  const scale = SCALE_DEGREES[selectedKey.mode];
  for (const entry of scale) {
    if ((selectedKey.tonic + entry.interval) % 12 === pitchClass) {
      return entry.quality;
    }
  }
  return 'major'; // default fallback for chromatic notes
}

function selectScaleDegree(degree) {
  const scale = SCALE_DEGREES[selectedKey.mode];
  const entry = scale[degree - 1];
  const root = (selectedKey.tonic + entry.interval) % 12;
  let quality = entry.quality;
  if (chordModifiers.dim) quality = 'dim';
  else if (chordModifiers.min) quality = 'minor';
  else if (chordModifiers.maj) quality = 'major';
  setChord({ root, quality });
}

function setChord(chord) {
  previousVoicing = (currentChord && partNotes.bass >= 0) ? { ...partNotes } : null;
  currentChord = chord;
  generateVoicing(chord);
  updateDisplay();
  updateChordDisplay();
  updateStaffDisplay();
}

function generateVoicing(chord) {
  const intervals = CHORD_INTERVALS[chord.quality] || CHORD_INTERVALS.major;
  const chordTones = intervals.map(i => (chord.root + i) % 12);

  // Determine which pitch classes each voice should sing
  // Build target pitch classes based on numVoices (for 4-part, we assign one per part)
  const voicePitchClasses = assignPitchClasses(chordTones, chord.root);

  // Generate all valid MIDI notes per part for assigned pitch classes
  const candidates = {};
  for (const part of PARTS) {
    const pc = voicePitchClasses[part];
    const [lo, hi] = RANGE[part];
    const validNotes = [];
    for (let midi = lo; midi <= hi; midi++) {
      if (midi % 12 === pc) validNotes.push(midi);
    }
    candidates[part] = validNotes;
  }

  // If any part has no valid notes, just set what we can
  for (const part of PARTS) {
    if (candidates[part].length === 0) {
      partNotes[part] = -1;
    }
  }

  // Find best voicing by brute-force search with scoring
  let bestScore = Infinity;
  let bestVoicing = null;

  for (const bass of candidates.bass) {
    for (const tenor of candidates.tenor) {
      if (tenor <= bass) continue; // no voice crossing
      if (tenor - bass > 19) continue; // max ~octave+fifth between bass-tenor
      for (const alto of candidates.alto) {
        if (alto <= tenor) continue;
        if (alto - tenor > 12) continue; // max octave between tenor-alto
        for (const soprano of candidates.soprano) {
          if (soprano <= alto) continue;
          if (soprano - alto > 12) continue; // max octave between alto-soprano

          const candidate = { bass, tenor, alto, soprano };
          let score = 0;

          // Movement cost (most important)
          if (previousVoicing) {
            for (const part of PARTS) {
              if (previousVoicing[part] >= 0) {
                score += Math.abs(candidate[part] - previousVoicing[part]) * 2;
              }
            }

            // Parallel 5ths/octaves penalty
            for (let i = 0; i < PARTS.length - 1; i++) {
              for (let j = i + 1; j < PARTS.length; j++) {
                const p1 = PARTS[i], p2 = PARTS[j];
                const prevInt = Math.abs(previousVoicing[p2] - previousVoicing[p1]) % 12;
                const newInt = Math.abs(candidate[p2] - candidate[p1]) % 12;
                const bothMoved = previousVoicing[p1] !== candidate[p1] && previousVoicing[p2] !== candidate[p2];
                // Same direction motion
                const dir1 = Math.sign(candidate[p1] - previousVoicing[p1]);
                const dir2 = Math.sign(candidate[p2] - previousVoicing[p2]);
                if (bothMoved && dir1 === dir2 && (newInt === 7 || newInt === 0) && prevInt === newInt) {
                  score += 50; // heavy penalty
                }
              }
            }

            // Common tone bonus
            for (const part of PARTS) {
              if (previousVoicing[part] === candidate[part]) score -= 3;
            }
          }

          // Spacing: prefer upper voices close together
          score += (soprano - alto) * 0.3;
          score += (alto - tenor) * 0.3;

          // Prefer voicings near each part's RANGE_MID
          for (const part of PARTS) {
            score += Math.abs(candidate[part] - RANGE_MID[part]) * 0.1;
          }

          if (score < bestScore) {
            bestScore = score;
            bestVoicing = candidate;
          }
        }
      }
    }
  }

  if (bestVoicing) {
    for (const part of PARTS) partNotes[part] = bestVoicing[part];
  }
}

function assignPitchClasses(chordTones, root) {
  // For 4 voices with a triad (3 chord tones): double the root
  // rootInBass: bass always gets root
  const result = {};
  const available = [...chordTones];

  if (rootInBass) {
    result.bass = root;
    // Distribute remaining tones to tenor, alto, soprano
    // With 3 chord tones and 3 remaining voices: one gets doubled root
    const remaining = ['tenor', 'alto', 'soprano'];
    const tones = [...chordTones];
    // Double root: add extra root
    if (tones.length < remaining.length) {
      // Need to double. Double root first, then 5th
      while (tones.length < remaining.length) {
        if (tones.length === chordTones.length) tones.push(root); // double root
        else if (chordTones.length >= 3) tones.push(chordTones[2]); // double 5th
        else tones.push(root);
      }
    }
    // Sort tones low to high by RANGE_MID for assignment
    const sortedTones = tones.sort((a, b) => a - b);
    const sortedParts = [...remaining].sort((a, b) => RANGE_MID[a] - RANGE_MID[b]);
    for (let i = 0; i < sortedParts.length; i++) {
      result[sortedParts[i]] = sortedTones[i % sortedTones.length];
    }
  } else {
    // No root-in-bass constraint: distribute chord tones evenly
    const tones = [...chordTones];
    while (tones.length < 4) {
      if (tones.length === chordTones.length) tones.push(root);
      else if (chordTones.length >= 3) tones.push(chordTones[2]);
      else tones.push(root);
    }
    const sortedTones = tones.sort((a, b) => a - b);
    const sortedParts = [...PARTS].sort((a, b) => RANGE_MID[a] - RANGE_MID[b]);
    for (let i = 0; i < sortedParts.length; i++) {
      result[sortedParts[i]] = sortedTones[i % sortedTones.length];
    }
  }

  return result;
}

function updateChordDisplay() {
  const el = document.getElementById('chordDisplay');
  if (!el) return;
  if (!currentChord) {
    el.textContent = '';
    return;
  }
  const rootName = NOTES[currentChord.root];
  const qualLabel = QUALITY_LABELS[currentChord.quality] || '';
  el.textContent = rootName + qualLabel;
}

function updateStaffDisplay() {
  const container = document.getElementById('staffContainer');
  if (!container) return;
  if (!autoVoicing) { container.innerHTML = ''; return; }

  // SVG viewBox dimensions
  const vw = 700, vh = 160;
  const staffTop = 35, lineGap = 12;
  const bottomLine = staffTop + 4 * lineGap;

  let svg = `<svg width="100%" viewBox="0 0 ${vw} ${vh}" style="display:block;" preserveAspectRatio="xMinYMid meet">`;

  // 5 staff lines
  for (let i = 0; i < 5; i++) {
    const y = staffTop + i * lineGap;
    svg += `<line x1="10" y1="${y}" x2="${vw-10}" y2="${y}" stroke="#555" stroke-width="1"/>`;
  }

  // Treble clef (G-clef) — SVG path approximation positioned at the left
  const clefX = 30, clefY = staffTop + 2 * lineGap; // centered on B4 line
  svg += `<text x="${clefX}" y="${clefY + 18}" font-size="58" fill="#999" text-anchor="middle" font-family="serif">𝄞</text>`;

  // Key signature
  const sig = KEY_SIGNATURES[selectedKey.mode][selectedKey.tonic];
  let keySigEndX = 55; // start drawing key sig after clef

  if (sig > 0) {
    // Sharps — order: F, C, G, D, A, E, B
    // Staff positions (steps from top line F5=0): F5=0, C5=3.5→use C5=3, G5=-0.5→above, D5=2, A4=5, E5=1, B4=4
    // Using half-steps from F5 (top line) where each step = lineGap/2
    const sharpSteps = [0, 3, -1, 2, 5, 1, 4]; // F5, C5, G5(above), D5, A4, E5, B4
    for (let i = 0; i < sig; i++) {
      const sx = keySigEndX + i * 14;
      const sy = staffTop + sharpSteps[i] * (lineGap / 2);
      svg += `<text x="${sx}" y="${sy + 5}" font-size="16" fill="#ccc" text-anchor="middle" font-family="serif">♯</text>`;
      keySigEndX = sx + 14;
    }
  } else if (sig < 0) {
    // Flats — order: B, E, A, D, G, C, F
    const flatSteps = [4, 1, 5, 2, 6, 3, 7]; // B4, E5, A4, D5, G4, C5, F4
    for (let i = 0; i < -sig; i++) {
      const fx = keySigEndX + i * 14;
      const fy = staffTop + flatSteps[i] * (lineGap / 2);
      svg += `<text x="${fx}" y="${fy + 5}" font-size="16" fill="#ccc" text-anchor="middle" font-family="serif">♭</text>`;
      keySigEndX = fx + 14;
    }
  }

  // Compute 7 scale degree notes
  const scale = SCALE_DEGREES[selectedKey.mode];
  const startOctave = (selectedKey.tonic <= 5) ? 4 : 4; // start in octave 4
  const startMidi = selectedKey.tonic + (startOctave * 12) + 12; // MIDI = pitchClass + (octave+1)*12
  // Actually: MIDI 60 = C4, so tonic in octave 4 = tonic + 60 for C, generally: 48 + 12 + tonic for octave 4
  // MIDI for C4 = 60. So for tonic T in octave 4: midi = 60 + T (if T is offset from C)
  // Wait — tonic is pitch class 0=C, 2=D, etc. So tonic T in octave 4 = 60 + T? No.
  // MIDI 60=C4, 62=D4, 64=E4. So pitchClass P in octave 4 = 60 + P? No, that's wrong for sharps.
  // MIDI note = (octave + 1) * 12 + pitchClass. So octave 4, pitchClass P → (4+1)*12 + P = 60 + P.
  // C4 = 60+0 = 60 ✓, D4 = 60+2 = 62 ✓, E4 = 60+4 = 64 ✓

  const degreeNotes = [];
  let baseMidi = 60 + selectedKey.tonic; // tonic in octave 4
  // If the 7th degree would be too high (above ~F5=77), shift down an octave
  const seventhInterval = scale[6].interval;
  if (baseMidi + seventhInterval > 79) baseMidi -= 12;
  // If tonic is too low for the staff (below C4=60 ledger line area), shift up
  if (baseMidi < 55) baseMidi += 12;

  for (let d = 0; d < 7; d++) {
    const midi = baseMidi + scale[d].interval;
    const pc = (selectedKey.tonic + scale[d].interval) % 12;
    degreeNotes.push({ midi, pc, quality: scale[d].quality, degree: d + 1 });
  }

  // Draw noteheads evenly spaced after key signature
  const noteStartX = keySigEndX + 20;
  const noteEndX = vw - 30;
  const noteSpacing = (noteEndX - noteStartX) / 6; // 7 notes, 6 gaps

  for (let d = 0; d < 7; d++) {
    const nx = noteStartX + d * noteSpacing;
    const ny = midiToStaffY(degreeNotes[d].midi, staffTop, lineGap);

    // Ledger lines if needed
    if (ny > bottomLine + lineGap / 2) {
      for (let ly = bottomLine + lineGap; ly <= ny + 1; ly += lineGap) {
        svg += `<line x1="${nx-10}" y1="${ly}" x2="${nx+10}" y2="${ly}" stroke="#555" stroke-width="1"/>`;
      }
    }
    if (ny < staffTop - lineGap / 2) {
      for (let ly = staffTop - lineGap; ly >= ny - 1; ly -= lineGap) {
        svg += `<line x1="${nx-10}" y1="${ly}" x2="${nx+10}" y2="${ly}" stroke="#555" stroke-width="1"/>`;
      }
    }

    // Notehead ellipse — neutral color (not color-coded)
    const isActive = currentChord && degreeNotes[d].pc === currentChord.root;
    const fill = isActive ? '#fbbf24' : '#aaa';
    svg += `<ellipse cx="${nx}" cy="${ny}" rx="7" ry="5" fill="${fill}" transform="rotate(-10,${nx},${ny})"/>`;

    // Digit label below staff
    const digitY = bottomLine + lineGap * 3.5;
    svg += `<text x="${nx}" y="${digitY}" text-anchor="middle" fill="#ccc" font-size="15" font-weight="bold">${d + 1}</text>`;

    // Chord symbol below digit
    const chordName = noteNameInKey(degreeNotes[d].pc) + QUALITY_LABELS[degreeNotes[d].quality];
    const chordY = digitY + 16;
    svg += `<text x="${nx}" y="${chordY}" text-anchor="middle" fill="#888" font-size="12">${chordName}</text>`;
  }

  svg += '</svg>';
  container.innerHTML = svg;
}

function midiToStaffY(midi, staffTop, lineGap) {
  // Map MIDI note to Y position on treble clef staff
  // F5 (77) = top line = staffTop
  // E4 (64) = bottom line = staffTop + 4*lineGap
  // Each staff position is lineGap/2 apart
  // Use note positions (C,D,E,F,G,A,B) ignoring sharps/flats for Y
  const notePositions = { 0: 0, 2: 1, 4: 2, 5: 3, 7: 4, 9: 5, 11: 6 }; // C=0..B=6
  const semitone = midi % 12;
  const octave = Math.floor(midi / 12) - 1;
  // Find nearest natural note position
  let notePos = notePositions[semitone];
  if (notePos === undefined) {
    // Sharp/flat: use the lower natural
    notePos = notePositions[semitone - 1];
    if (notePos === undefined) notePos = notePositions[semitone + 1];
  }
  // F5 (MIDI 77) = staffTop, position = octave5*7 + 3(F) = 38
  const refPos = 5 * 7 + 3; // F5 absolute position
  const absPos = octave * 7 + notePos;
  const stepsFromTop = refPos - absPos;
  return staffTop + stepsFromTop * (lineGap / 2);
}

// === Piano label updates ===

function updatePianoLabels() {
  const keys = document.querySelectorAll('.key');
  if (autoVoicing) {
    // Build pitch class → degree number map
    const scale = SCALE_DEGREES[selectedKey.mode];
    const pcToDegree = {};
    for (let d = 0; d < 7; d++) {
      const pc = (selectedKey.tonic + scale[d].interval) % 12;
      pcToDegree[pc] = d + 1;
    }
    keys.forEach(k => {
      const midi = parseInt(k.dataset.midi);
      const pc = midi % 12;
      const bindEl = k.querySelector('.keybind');
      if (bindEl) {
        bindEl.textContent = pcToDegree[pc] !== undefined ? pcToDegree[pc] : '';
      }
    });
  } else {
    // Restore original keyboard shortcut labels
    keys.forEach(k => {
      const midi = parseInt(k.dataset.midi);
      const bindKey = Object.entries(KEY_TO_MIDI).find(([key, m]) => m === midi);
      const bindEl = k.querySelector('.keybind');
      if (bindEl) {
        bindEl.textContent = bindKey ? (bindKey[0] === '\\' ? '\\' : bindKey[0].toUpperCase()) : '';
      }
    });
  }
}

// === ZXCV target highlighting ===

function updateTargetHighlight() {
  const anyModifier = modifiers.z || modifiers.x || modifiers.c || modifiers.v;
  const targetParts = getTargetParts();
  document.querySelectorAll('.part-column').forEach(c => {
    const part = c.dataset.part;
    c.style.borderColor = anyModifier && targetParts.includes(part)
      ? PART_COLORS[part] : 'transparent';
  });
}

// === Syllable text editing ===

document.querySelectorAll('.syl-input').forEach(input => {
  input.addEventListener('input', (e) => {
    const idx = parseInt(e.target.dataset.idx);
    syllables[idx].text = e.target.value || '';
    if (idx === activeSyllable || Object.values(partSyllables).includes(idx)) {
      sendSyllable();
      updateMasterSyllables();
    }
  });
  input.addEventListener('click', (e) => e.stopPropagation());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
  });
});

// BPM input editing
const bpmInputEl = document.getElementById('bpmInput');
bpmInputEl.addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, '');
});
bpmInputEl.addEventListener('change', (e) => {
  const val = parseInt(e.target.value);
  if (!isNaN(val)) {
    pulseBpm = Math.max(30, Math.min(300, val));
    e.target.value = pulseBpm;
    if (anyPartPulsing()) { startMasterPulse(); sendSyllable(); }
  } else {
    e.target.value = pulseBpm;
  }
});
bpmInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
});

// === WebSocket ===

function createRoom() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ t: 'create' }));
    document.getElementById('status').textContent = 'Connected';
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.t === 'created') {
      document.getElementById('roomCode').textContent = msg.code;
      document.getElementById('singerUrl').textContent = 'Singers go to: ' + msg.ip + ':' + msg.port;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('roomInfo').style.display = '';
      document.getElementById('midiSection').style.display = '';
      document.getElementById('controlsSection').style.display = '';
      document.getElementById('keyboardSection').style.display = '';
      initMIDI();
      buildRangeIndicators();
      updateIndicators();
      sendSyllable();
      sendVolume();
    } else if (msg.t === 'r') {
      singers = msg.singers || [];
      const counts = { soprano: 0, alto: 0, tenor: 0, bass: 0 };
      for (const s of singers) counts[s.part] = (counts[s.part] || 0) + 1;
      document.getElementById('countS').textContent = counts.soprano;
      document.getElementById('countA').textContent = counts.alto;
      document.getElementById('countT').textContent = counts.tenor;
      document.getElementById('countB').textContent = counts.bass;
      updateDisplay();
    }
  };
  ws.onclose = () => { document.getElementById('status').textContent = 'Disconnected'; };
}

if (new URLSearchParams(location.search).has('test')) {
  createRoom();
}

// === MIDI ===

async function initMIDI() {
  const statusEl = document.getElementById('midiStatus');
  const selectEl = document.getElementById('midiSelect');
  try {
    midiAccess = await navigator.requestMIDIAccess();
    statusEl.textContent = 'MIDI access granted';

    function updateInputs() {
      selectEl.innerHTML = '';
      const inputs = [...midiAccess.inputs.values()];

      const kbOpt = document.createElement('option');
      kbOpt.value = '';
      kbOpt.textContent = 'Laptop keyboard (on-screen)';
      selectEl.appendChild(kbOpt);

      for (const input of inputs) {
        const opt = document.createElement('option');
        opt.value = input.id;
        opt.textContent = input.name;
        selectEl.appendChild(opt);
      }

      if (inputs.length > 0) {
        selectEl.value = inputs[0].id;
        selectInput(inputs[0].id);
      } else {
        statusEl.textContent = 'No MIDI devices found. Use the on-screen keyboard.';
      }
    }

    selectEl.addEventListener('change', (e) => selectInput(e.target.value));
    midiAccess.onstatechange = updateInputs;
    updateInputs();
  } catch (err) {
    statusEl.textContent = 'MIDI not available — use the on-screen keyboard';
  }
}

function selectInput(id) {
  if (currentInput) { currentInput.onmidimessage = null; currentInput = null; }
  if (!id) {
    document.getElementById('midiStatus').textContent = 'Using laptop keyboard';
    return;
  }
  currentInput = midiAccess.inputs.get(id);
  if (currentInput) {
    currentInput.onmidimessage = onMIDIMessage;
    document.getElementById('midiStatus').textContent = `Listening: ${currentInput.name}`;
  }
}

function onMIDIMessage(e) {
  const [status, note, velocity] = e.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && velocity > 0) noteOn(note);
  else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) noteOff(note);
}

// === On-screen piano ===

const pointerToMidi = new Map();

function buildPiano() {
  const piano = document.getElementById('piano');
  const startMidi = 48, endMidi = 72;
  const blackKeys = new Set([1,3,6,8,10]);

  for (let midi = startMidi; midi <= endMidi; midi++) {
    const semitone = midi % 12;
    const isBlack = blackKeys.has(semitone);
    const key = document.createElement('div');
    key.className = `key ${isBlack ? 'black' : 'white'}`;
    key.dataset.midi = midi;

    const nameLabel = document.createTextNode(isBlack ? '' : NOTES[semitone] + (Math.floor(midi / 12) - 1));
    key.appendChild(nameLabel);

    const bindKey = Object.entries(KEY_TO_MIDI).find(([k, m]) => m === midi);
    const bindEl = document.createElement('span');
    bindEl.className = 'keybind';
    bindEl.textContent = bindKey ? (bindKey[0] === '\\' ? '\\' : bindKey[0].toUpperCase()) : '';
    key.appendChild(bindEl);

    key.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      pointerToMidi.set(e.pointerId, midi);
      noteOn(midi);
    });

    piano.appendChild(key);
  }
}

// Range indicators
function buildRangeIndicators() {
  const container = document.getElementById('rangeIndicators');
  container.innerHTML = '';
  const pianoStart = 48, pianoEnd = 72;

  const blackSet = new Set([1,3,6,8,10]);
  const whitePositions = {};
  let whiteIdx = 0;
  for (let m = pianoStart; m <= pianoEnd; m++) {
    if (!blackSet.has(m % 12)) {
      whitePositions[m] = whiteIdx;
      whiteIdx++;
    }
  }
  const totalWhite = whiteIdx;

  function midiToLeftPct(midi) {
    const clamped = Math.max(pianoStart, Math.min(pianoEnd, midi));
    if (whitePositions[clamped] !== undefined) return whitePositions[clamped] / totalWhite * 100;
    const lower = clamped - 1, upper = clamped + 1;
    if (whitePositions[lower] !== undefined && whitePositions[upper] !== undefined)
      return (whitePositions[lower] + whitePositions[upper]) / 2 / totalWhite * 100;
    return (clamped - pianoStart) / (pianoEnd - pianoStart) * 100;
  }

  function midiToRightPct(midi) {
    const clamped = Math.max(pianoStart, Math.min(pianoEnd, midi));
    if (whitePositions[clamped] !== undefined) return (whitePositions[clamped] + 1) / totalWhite * 100;
    const lower = clamped - 1, upper = clamped + 1;
    if (whitePositions[lower] !== undefined && whitePositions[upper] !== undefined)
      return ((whitePositions[lower] + whitePositions[upper]) / 2 + 1) / totalWhite * 100;
    return (clamped - pianoStart + 1) / (pianoEnd - pianoStart) * 100;
  }

  const partOrder = ['bass', 'tenor', 'alto', 'soprano'];
  const lineH = 2, gap = 2;

  for (let i = 0; i < partOrder.length; i++) {
    const part = partOrder[i];
    const [lo, hi] = RANGE[part];
    const clampedLo = Math.max(pianoStart, lo);
    const clampedHi = Math.min(pianoEnd, hi);
    const leftPct = midiToLeftPct(clampedLo);
    const rightPct = midiToRightPct(clampedHi);

    const line = document.createElement('div');
    line.className = 'range-line';
    line.style.background = PART_COLORS[part];
    line.style.left = leftPct + '%';
    line.style.width = (rightPct - leftPct) + '%';
    line.style.bottom = (i * (lineH + gap)) + 'px';
    container.appendChild(line);
  }
}

// === Keyboard mapping ===

const KEY_TO_MIDI = {
  '`': 48, '1': 49, 'd': 50, '2': 51,
  'q': 52, '3': 54, 'w': 53, '4': 56,
  'e': 55, '5': 58, 'r': 57, 't': 59,
  'y': 60, '7': 61, 'u': 62, '8': 63,
  'i': 64, 'o': 65, '0': 66, 'p': 67,
  '-': 68, '[': 69, '=': 70, ']': 71, '\\': 72,
};

const CODE_TO_KEY = {
  'Backquote': '`', 'Digit1': '1', 'KeyD': 'd', 'Digit2': '2',
  'KeyQ': 'q', 'KeyW': 'w', 'KeyE': 'e', 'KeyR': 'r', 'KeyT': 't',
  'KeyY': 'y', 'KeyU': 'u', 'KeyI': 'i', 'KeyO': 'o', 'KeyP': 'p',
  'BracketLeft': '[', 'BracketRight': ']', 'Backslash': '\\',
  'Digit3': '3', 'Digit4': '4', 'Digit5': '5', 'Digit7': '7', 'Digit8': '8',
  'Digit0': '0', 'Minus': '-', 'Equal': '=',
};

const heldKeyboard = new Set();

// === Keyboard handlers ===

document.addEventListener('keydown', (e) => {
  // ZXCV modifier keys — always active
  if (e.code === 'KeyZ') { modifiers.z = true; updateTargetHighlight(); return; }
  if (e.code === 'KeyX') { modifiers.x = true; updateTargetHighlight(); return; }
  if (e.code === 'KeyC') { modifiers.c = true; updateTargetHighlight(); return; }
  if (e.code === 'KeyV') { modifiers.v = true; updateTargetHighlight(); return; }

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  // Mode toggle — never on repeat
  if (e.code === 'KeyF' && !e.repeat) { e.preventDefault(); toggleAutoVoicing(); return; }

  if (e.repeat && !autoVoicing) return;

  // Syllable keys
  if (e.key === 'a') { e.preventDefault(); setSyllable(0); return; }
  if (e.key === 'm') { e.preventDefault(); setSyllable(1); return; }
  if (e.key === 'h') { e.preventDefault(); setSyllable(2); return; }
  if (e.key === 'b') { e.preventDefault(); setSyllable(3); return; }
  if (e.key === 's') { e.preventDefault(); setSyllable(4); return; }

  // BPM and sustain
  if (e.key === ',') { e.preventDefault(); startBpmHold(-5); return; }
  if (e.key === '.') { e.preventDefault(); startBpmHold(5); return; }
  if (e.key === ' ') { e.preventDefault(); toggleSustain(); return; }

  if (autoVoicing) {
    // Scale degree keys 1-7
    if (e.code === 'Digit1') { e.preventDefault(); selectScaleDegree(1); return; }
    if (e.code === 'Digit2') { e.preventDefault(); selectScaleDegree(2); return; }
    if (e.code === 'Digit3') { e.preventDefault(); selectScaleDegree(3); return; }
    if (e.code === 'Digit4') { e.preventDefault(); selectScaleDegree(4); return; }
    if (e.code === 'Digit5') { e.preventDefault(); selectScaleDegree(5); return; }
    if (e.code === 'Digit6') { e.preventDefault(); selectScaleDegree(6); return; }
    if (e.code === 'Digit7') { e.preventDefault(); selectScaleDegree(7); return; }
    // Volume down remapped to 8 in auto mode
    if (e.code === 'Digit8') { e.preventDefault(); startVolHold(-1); return; }
    // Volume up stays at 9
    if (e.code === 'Digit9') { e.preventDefault(); startVolHold(1); return; }
    // Chord quality modifiers
    if (e.code === 'Digit0') { e.preventDefault(); chordModifiers.dim = true; updateChordDisplay(); return; }
    if (e.code === 'Minus') { e.preventDefault(); chordModifiers.min = true; updateChordDisplay(); return; }
    if (e.code === 'Equal') { e.preventDefault(); chordModifiers.maj = true; updateChordDisplay(); return; }
  } else {
    // Volume keys (manual mode)
    if (e.code === 'Digit9') { e.preventDefault(); startVolHold(1); return; }
    if (e.code === 'Digit6') { e.preventDefault(); startVolHold(-1); return; }
  }

  // Note keys (piano/MIDI via keyboard)
  const key = e.key.toLowerCase();
  const midi = KEY_TO_MIDI[key] !== undefined ? KEY_TO_MIDI[key] : KEY_TO_MIDI[CODE_TO_KEY[e.code]];
  if (midi !== undefined) {
    if (autoVoicing || sustainMode) {
      e.preventDefault();
      noteOn(midi);
    } else if (!heldKeyboard.has(e.code)) {
      e.preventDefault();
      heldKeyboard.add(e.code);
      noteOn(midi);
    }
  }
});

document.addEventListener('keyup', (e) => {
  // ZXCV modifier keys
  if (e.code === 'KeyZ') { modifiers.z = false; updateTargetHighlight(); return; }
  if (e.code === 'KeyX') { modifiers.x = false; updateTargetHighlight(); return; }
  if (e.code === 'KeyC') { modifiers.c = false; updateTargetHighlight(); return; }
  if (e.code === 'KeyV') { modifiers.v = false; updateTargetHighlight(); return; }

  if (autoVoicing) {
    if (e.code === 'Digit8' || e.code === 'Digit9') { stopVolHold(); return; }
    if (e.code === 'Digit0') { chordModifiers.dim = false; updateChordDisplay(); return; }
    if (e.code === 'Minus') { chordModifiers.min = false; updateChordDisplay(); return; }
    if (e.code === 'Equal') { chordModifiers.maj = false; updateChordDisplay(); return; }
    // Scale degree releases: in non-sustain mode, silence
    if (!sustainMode && /^Digit[1-7]$/.test(e.code)) {
      for (const part of PARTS) partNotes[part] = -1;
      currentChord = null;
      updateDisplay();
      updateChordDisplay();
      updateStaffDisplay();
      return;
    }
  } else {
    if (e.code === 'Digit9' || e.code === 'Digit6') { stopVolHold(); return; }
  }
  if (e.key === ',') { stopBpmHold(true, -5); return; }
  if (e.key === '.') { stopBpmHold(true, 5); return; }

  const key = e.key.toLowerCase();
  const midi = KEY_TO_MIDI[key] !== undefined ? KEY_TO_MIDI[key] : KEY_TO_MIDI[CODE_TO_KEY[e.code]];
  if (midi !== undefined) {
    heldKeyboard.delete(e.code);
    noteOff(midi);
  }
});

buildPiano();

// Document-level pointer release for on-screen piano keys
document.addEventListener('pointerup', (e) => {
  const m = pointerToMidi.get(e.pointerId);
  if (m !== undefined) { noteOff(m); pointerToMidi.delete(e.pointerId); }
});
document.addEventListener('pointercancel', (e) => {
  const m = pointerToMidi.get(e.pointerId);
  if (m !== undefined) { noteOff(m); pointerToMidi.delete(e.pointerId); }
});
</script>
