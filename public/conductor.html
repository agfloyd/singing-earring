}

// === MIDI ===

async function initMIDI() {
  const statusEl = document.getElementById('midiStatus');
  const selectEl = document.getElementById('midiSelect');
  try {
    midiAccess = await navigator.requestMIDIAccess();
    statusEl.textContent = 'MIDI access granted';

    function updateInputs() {
      selectEl.innerHTML = '';
      const inputs = [...midiAccess.inputs.values()];

      const kbOpt = document.createElement('option');
      kbOpt.value = '';
      kbOpt.textContent = 'Laptop keyboard (on-screen)';
      selectEl.appendChild(kbOpt);

      for (const input of inputs) {
        const opt = document.createElement('option');
        opt.value = input.id;
        opt.textContent = input.name;
        selectEl.appendChild(opt);
      }

      if (inputs.length > 0) {
        selectEl.value = inputs[0].id;
        selectInput(inputs[0].id);
      } else {
        statusEl.textContent = 'No MIDI devices found. Use the on-screen keyboard.';
      }
    }

    selectEl.addEventListener('change', (e) => selectInput(e.target.value));
    midiAccess.onstatechange = updateInputs;
    updateInputs();
  } catch (err) {
    statusEl.textContent = 'MIDI not available — use the on-screen keyboard';
  }
}

function selectInput(id) {
  if (currentInput) { currentInput.onmidimessage = null; currentInput = null; }
  if (!id) {
    document.getElementById('midiStatus').textContent = 'Using laptop keyboard';
    return;
  }
  currentInput = midiAccess.inputs.get(id);
  if (currentInput) {
    currentInput.onmidimessage = onMIDIMessage;
    document.getElementById('midiStatus').textContent = `Listening: ${currentInput.name}`;
  }
}

function onMIDIMessage(e) {
  const [status, note, velocity] = e.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && velocity > 0) noteOn(note);
  else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) noteOff(note);
}

// === On-screen piano ===

const pointerToMidi = new Map();

function buildPiano() {
  const piano = document.getElementById('piano');
  const startMidi = 48, endMidi = 72;
  const blackKeys = new Set([1,3,6,8,10]);

  for (let midi = startMidi; midi <= endMidi; midi++) {
    const semitone = midi % 12;
    const isBlack = blackKeys.has(semitone);
    const key = document.createElement('div');
    key.className = `key ${isBlack ? 'black' : 'white'}`;
    key.dataset.midi = midi;

    if (!isBlack) {
      const nameSpan = document.createElement('span');
      nameSpan.className = 'notename';
      nameSpan.textContent = NOTES[semitone] + (Math.floor(midi / 12) - 1);
      key.appendChild(nameSpan);
    }

    const bindKey = Object.entries(KEY_TO_MIDI).find(([k, m]) => m === midi);
    const bindEl = document.createElement('span');
    bindEl.className = 'keybind';
    bindEl.textContent = bindKey ? (bindKey[0] === '\\' ? '\\' : bindKey[0].toUpperCase()) : '';
    key.appendChild(bindEl);

    key.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      pointerToMidi.set(e.pointerId, midi);
      noteOn(midi);
    });

    piano.appendChild(key);
  }
}

// === Choir visualization ===

// C2 = MIDI 36, C6 = MIDI 84 → 48 semitones (49 notes inclusive)
const VIZ_LO = 36, VIZ_HI = 84;
const VIZ_NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

function midiToLabel(midi) {
  return VIZ_NOTE_NAMES[midi % 12] + Math.floor(midi / 12 - 1);
}

function buildChoirSquares() {
  const container = document.getElementById('choirSquares');
  if (!container) return;
  container.innerHTML = '';
  for (let midi = VIZ_LO; midi <= VIZ_HI; midi++) {
    const sq = document.createElement('div');
    sq.className = 'choir-sq';
    sq.dataset.midi = midi;
    sq.dataset.tip = midiToLabel(midi);
    container.appendChild(sq);
  }
}

function updateChoirViz() {
  const sizeLabel = document.getElementById('choirSizeLabel');
  if (sizeLabel) sizeLabel.textContent = `Choir Size: ${singers.length}`;

  updateAllocButtons();

  if (!document.querySelectorAll('.choir-sq').length) buildChoirSquares();

  const squares = document.querySelectorAll('.choir-sq');
  if (!squares.length) return;

  // Reset all squares to base faint state and default tooltip
  squares.forEach(sq => {
    sq.style.background = 'rgba(255,255,255,0.1)';
    sq.style.boxShadow = 'none';
    sq.dataset.tip = midiToLabel(parseInt(sq.dataset.midi));
  });

  if (singers.length === 0) return;

  // Build per-square color accumulation and singer info for tooltips
  const squareColors = {}; // midi -> [{r,g,b,alpha}]
  const squareSingers = {}; // midi -> [{name, range, partLabel}] for midpoint squares
  for (const singer of singers) {
    const part = getPartById(singer.part);
    if (!part) continue;
    const sRange = singer.range || part.range;
    const lo = sRange[0], hi = sRange[1];
    const mid = (lo + hi) / 2;
    const midMidi = Math.round(mid);
    const rgb = parseColor(part.color);

    // Track singer at their midpoint square for tooltip
    if (midMidi >= VIZ_LO && midMidi <= VIZ_HI) {
      if (!squareSingers[midMidi]) squareSingers[midMidi] = [];
      squareSingers[midMidi].push({
        name: singer.name || singer.id,
        range: midiToLabel(lo) + '–' + midiToLabel(hi),
        partLabel: part.label
      });
    }

    for (let midi = Math.max(lo, VIZ_LO); midi <= Math.min(hi, VIZ_HI); midi++) {
      if (!squareColors[midi]) squareColors[midi] = [];
      const dist = Math.abs(midi - mid);
      const halfRange = Math.max((hi - lo) / 2, 1);
      const t = dist / halfRange;
      const alpha = Math.exp(-2.5 * t * t) * 0.5;
      squareColors[midi].push({ r: rgb[0], g: rgb[1], b: rgb[2], a: alpha });
    }
  }

  // Apply accumulated colors and tooltips to squares
  squares.forEach(sq => {
    const midi = parseInt(sq.dataset.midi);

    // Build tooltip
    const singerInfos = squareSingers[midi];
    if (singerInfos && singerInfos.length > 0) {
      const lines = [midiToLabel(midi)];
      for (const s of singerInfos) {
        lines.push(`${s.name} (${s.partLabel}) ${s.range}`);
      }
      sq.dataset.tip = lines.join('\n');
    }

    const colors = squareColors[midi];
    if (!colors || colors.length === 0) return;

    // Additive blend
    let r = 0, g = 0, b = 0, a = 0;
    for (const c of colors) {
      r += c.r * c.a;
      g += c.g * c.a;
      b += c.b * c.a;
      a += c.a;
    }
    a = Math.min(a, 1);
    r = Math.min(Math.round(r / Math.max(a, 0.01)), 255);
    g = Math.min(Math.round(g / Math.max(a, 0.01)), 255);
    b = Math.min(Math.round(b / Math.max(a, 0.01)), 255);

    sq.style.background = `rgba(${r},${g},${b},${Math.max(a, 0.1)})`;
    if (a > 0.2) {
      sq.style.boxShadow = `0 0 ${Math.round(a * 6)}px rgba(${r},${g},${b},${a * 0.6})`;
    }
  });
}

function animateChoirTransitions(oldPartMap) {
  // For singers whose part changed, apply a 1-second CSS transition on the affected squares
  const changedSingers = singers.filter(s => oldPartMap[s.id] && oldPartMap[s.id] !== s.part);
  if (changedSingers.length === 0) return;

  const squares = document.querySelectorAll('.choir-sq');
  if (!squares.length) return;

  // Add transition to all squares (it will only be visible on changed ones)
  squares.forEach(sq => {
    sq.style.transition = 'background 1s ease, box-shadow 1s ease';
  });

  // Remove transition after animation completes
  setTimeout(() => {
    squares.forEach(sq => {
      sq.style.transition = '';
    });
  }, 1100);
}

const _colorCache = {};
function parseColor(color) {
  if (_colorCache[color]) return _colorCache[color];
  // Parse HSL or hex to RGB using off-screen canvas
  const c = document.createElement('canvas');
  c.width = c.height = 1;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 1, 1);
  const d = ctx.getImageData(0, 0, 1, 1).data;
  const rgb = [d[0], d[1], d[2]];
  _colorCache[color] = rgb;
  return rgb;
}

// Range indicators
function buildRangeIndicators() {
  const container = document.getElementById('rangeIndicators');
  if (!container) return;
  container.innerHTML = '';
  const pianoStart = 48, pianoEnd = 72;

  const blackSet = new Set([1,3,6,8,10]);
  const whitePositions = {};
  let whiteIdx = 0;
  for (let m = pianoStart; m <= pianoEnd; m++) {
    if (!blackSet.has(m % 12)) {
      whitePositions[m] = whiteIdx;
      whiteIdx++;
    }
  }
  const totalWhite = whiteIdx;

  function midiToLeftPct(midi) {
    const clamped = Math.max(pianoStart, Math.min(pianoEnd, midi));
    if (whitePositions[clamped] !== undefined) return whitePositions[clamped] / totalWhite * 100;
    const lower = clamped - 1, upper = clamped + 1;
    if (whitePositions[lower] !== undefined && whitePositions[upper] !== undefined)
      return (whitePositions[lower] + whitePositions[upper]) / 2 / totalWhite * 100;
    return (clamped - pianoStart) / (pianoEnd - pianoStart) * 100;
  }

  function midiToRightPct(midi) {
    const clamped = Math.max(pianoStart, Math.min(pianoEnd, midi));
    if (whitePositions[clamped] !== undefined) return (whitePositions[clamped] + 1) / totalWhite * 100;
    const lower = clamped - 1, upper = clamped + 1;
    if (whitePositions[lower] !== undefined && whitePositions[upper] !== undefined)
      return ((whitePositions[lower] + whitePositions[upper]) / 2 + 1) / totalWhite * 100;
    return (clamped - pianoStart + 1) / (pianoEnd - pianoStart) * 100;
  }

  const lineH = 2, gap = 2;

  for (let i = 0; i < activeParts.length; i++) {
    const part = activeParts[i];
    const [lo, hi] = part.range;
    const clampedLo = Math.max(pianoStart, lo);
    const clampedHi = Math.min(pianoEnd, hi);
    const leftPct = midiToLeftPct(clampedLo);
    const rightPct = midiToRightPct(clampedHi);

    const line = document.createElement('div');
    line.className = 'range-line';
    line.style.background = part.color;
    line.style.left = leftPct + '%';
    line.style.width = (rightPct - leftPct) + '%';
    line.style.bottom = (i * (lineH + gap)) + 'px';
    container.appendChild(line);
  }
}

// === Keyboard mapping ===

const KEY_TO_MIDI = {
  // White keys: Q=C3, W=D3, E=E3, R=F3, T=G3, Y=A3, U=B3, I=C4, O=D4, P=E4
  'q': 48, 'w': 50, 'e': 52, 'r': 53, 't': 55, 'y': 57, 'u': 59,
  'i': 60, 'o': 62, 'p': 64,
  // Black keys: 2=C#3, 3=D#3, 5=F#3, 6=G#3, 7=A#3, 9=C#4, 0=D#4
  '2': 49, '3': 51, '5': 54, '6': 56, '7': 58, '9': 61, '0': 63,
};

const CODE_TO_KEY = {
  'KeyQ': 'q', 'KeyW': 'w', 'KeyE': 'e', 'KeyR': 'r', 'KeyT': 't',
  'KeyY': 'y', 'KeyU': 'u', 'KeyI': 'i', 'KeyO': 'o', 'KeyP': 'p',
  'Digit2': '2', 'Digit3': '3', 'Digit5': '5', 'Digit6': '6', 'Digit7': '7',
  'Digit9': '9', 'Digit0': '0',
};

const heldKeyboard = new Set();

// === Keyboard handlers ===

document.addEventListener('keydown', (e) => {
  // Part modifier keys (HJKL;') — always active
  if (MODIFIER_CODES.includes(e.code)) {
    modifierHeld.add(e.code);
    modifierShift = e.shiftKey;
    modifierCtrl = e.ctrlKey || e.metaKey;
    updateTargetHighlight();
    return;
  }
  // Track Shift/Ctrl changes while modifiers held
  if ((e.key === 'Shift' || e.key === 'Control' || e.key === 'Meta') && modifierHeld.size > 0) {
    modifierShift = e.shiftKey;
    modifierCtrl = e.ctrlKey || e.metaKey;
    updateTargetHighlight();
    return;
  }

  // CapsLock: toggle QWERTY shortcuts
  if (e.code === 'CapsLock') { e.preventDefault(); toggleQwerty(); return; }

  // Volume — always ArrowUp/ArrowDown (before input guard so it works globally with modifiers)
  if (e.code === 'ArrowUp') { e.preventDefault(); startVolHold(1); return; }
  if (e.code === 'ArrowDown') { e.preventDefault(); startVolHold(-1); return; }

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  // Backspace/Delete: hold for tonic shortcut, tap for mode toggle
  if ((e.code === 'Delete' || e.code === 'Backspace') && !e.repeat) {
    e.preventDefault();
    backspaceHeld = true;
    backspaceUsed = false;
    return;
  }
  // While backspace held, letter keys set the tonic
  if (backspaceHeld) {
    const TONIC_MAP = { KeyC: 0, KeyD: 2, KeyE: 4, KeyF: 5, KeyG: 7, KeyA: 9, KeyB: 11 };
    if (TONIC_MAP[e.code] !== undefined) {
      e.preventDefault();
      backspaceUsed = true;
      document.getElementById('tonicLetterSelect').value = TONIC_MAP[e.code];
      tonicAccidental = null;
      updateAccidentalButtons();
      updateTonicFromUI();
      return;
    }
  }

  if (e.repeat && qwertyShortcuts) return;

  // Syllable keys — only when QWERTY mode is on (A/G/B are chord selectors when QWERTY off)
  if (qwertyShortcuts) {
    if (e.code === 'KeyA') { e.preventDefault(); setSyllable(0); return; }
    if (e.code === 'KeyM') { e.preventDefault(); setSyllable(1); return; }
    if (e.code === 'KeyG') { e.preventDefault(); setSyllable(2); return; }
    if (e.code === 'KeyB') { e.preventDefault(); setSyllable(3); return; }
    if (e.code === 'KeyS') { e.preventDefault(); setSyllable(4); return; }
  }

  // BPM and sustain
  if (e.key === ',') { e.preventDefault(); startBpmHold(-5); return; }
  if (e.key === '.') { e.preventDefault(); startBpmHold(5); return; }
  if (e.key === ' ') { e.preventDefault(); toggleSustain(); return; }

  if (!qwertyShortcuts) {
    // Scale degree mode: number keys select scale degrees, letter keys select chords/notes
    if (e.code === 'Digit1') { e.preventDefault(); selectScaleDegree(1); return; }
    if (e.code === 'Digit2') { e.preventDefault(); selectScaleDegree(2); return; }
    if (e.code === 'Digit3') { e.preventDefault(); selectScaleDegree(3); return; }
    if (e.code === 'Digit4') { e.preventDefault(); selectScaleDegree(4); return; }
    if (e.code === 'Digit5') { e.preventDefault(); selectScaleDegree(5); return; }
    if (e.code === 'Digit6') { e.preventDefault(); selectScaleDegree(6); return; }
    if (e.code === 'Digit7') { e.preventDefault(); selectScaleDegree(7); return; }
    if (e.code === 'Digit8') { e.preventDefault(); selectScaleDegree(8); return; }
    if (e.code === 'Digit9') { e.preventDefault(); selectScaleDegree(9); return; }
    // Quality modifiers (these are handled globally below for autoVoicing + QWERTY too)
    if (e.code === 'Backquote') { e.preventDefault(); chordModifiers.dim = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Digit1') { e.preventDefault(); chordModifiers.aug = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Minus') { e.preventDefault(); chordModifiers.min = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Equal') { e.preventDefault(); chordModifiers.maj = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'BracketLeft') { e.preventDefault(); chordModifiers.add7 = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'BracketRight') { e.preventDefault(); chordModifiers.addMaj7 = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Backslash') { e.preventDefault(); chordModifiers.add9 = true; updateChordDisplay(); updateStaffDisplay(); return; }

    // Letter keys A-G: select chord by note name (auto-voicing) or note (manual)
    const NOTE_CODES = { KeyC: 'C', KeyD: 'D', KeyE: 'E', KeyF: 'F', KeyG: 'G', KeyA: 'A', KeyB: 'B' };
    if (NOTE_CODES[e.code]) {
      e.preventDefault();
      if (autoVoicing) {
        selectNoteChord(NOTE_CODES[e.code]);
      } else {
        // In manual mode, play the MIDI note for that letter in octave 4
        const NOTE_TO_MIDI = { C: 60, D: 62, E: 64, F: 65, G: 67, A: 69, B: 71 };
        const midi = NOTE_TO_MIDI[NOTE_CODES[e.code]];
        if (sustainMode) {
          noteOn(midi);
        } else if (!heldKeyboard.has(e.code)) {
          heldKeyboard.add(e.code);
          noteOn(midi);
        }
      }
      return;
    }
  }

  // All chord modifiers — active when auto-voicing is on (in either QWERTY mode)
  if (autoVoicing) {
    if (e.code === 'Backquote') { e.preventDefault(); chordModifiers.dim = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Digit1') { e.preventDefault(); chordModifiers.aug = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Minus') { e.preventDefault(); chordModifiers.min = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Equal') { e.preventDefault(); chordModifiers.maj = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'BracketLeft') { e.preventDefault(); chordModifiers.add7 = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'BracketRight') { e.preventDefault(); chordModifiers.addMaj7 = true; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Backslash') { e.preventDefault(); chordModifiers.add9 = true; updateChordDisplay(); updateStaffDisplay(); return; }
  }

  if (qwertyShortcuts) {
    // QWERTY mode: keyboard layout plays MIDI notes
    const key = e.key.toLowerCase();
    const midi = KEY_TO_MIDI[key] !== undefined ? KEY_TO_MIDI[key] : KEY_TO_MIDI[CODE_TO_KEY[e.code]];
    if (midi !== undefined) {
      if (autoVoicing || sustainMode) {
        e.preventDefault();
        noteOn(midi);
      } else if (!heldKeyboard.has(e.code)) {
        e.preventDefault();
        heldKeyboard.add(e.code);
        noteOn(midi);
      }
    }
  }
});

document.addEventListener('keyup', (e) => {
  // Backspace/Delete release: toggle mode only if no tonic key was pressed
  if ((e.code === 'Delete' || e.code === 'Backspace') && backspaceHeld) {
    backspaceHeld = false;
    if (!backspaceUsed) toggleAutoVoicing();
    return;
  }
  if (MODIFIER_CODES.includes(e.code)) {
    modifierHeld.delete(e.code);
    if (modifierHeld.size === 0) { modifierShift = false; modifierCtrl = false; }
    updateTargetHighlight();
    return;
  }
  if ((e.key === 'Shift' || e.key === 'Control' || e.key === 'Meta') && modifierHeld.size > 0) {
    modifierShift = e.shiftKey;
    modifierCtrl = e.ctrlKey || e.metaKey;
    updateTargetHighlight();
    return;
  }

  // Volume keyup — always arrow keys
  if (e.code === 'ArrowUp' || e.code === 'ArrowDown') { stopVolHold(); return; }

  // All chord modifier keyup — active when auto-voicing is on (in either QWERTY mode)
  if (autoVoicing || !qwertyShortcuts) {
    if (e.code === 'Backquote') { chordModifiers.dim = false; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Digit1') { chordModifiers.aug = false; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Minus') { chordModifiers.min = false; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Equal') { chordModifiers.maj = false; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'BracketLeft') { chordModifiers.add7 = false; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'BracketRight') { chordModifiers.addMaj7 = false; updateChordDisplay(); updateStaffDisplay(); return; }
    if (e.code === 'Backslash') { chordModifiers.add9 = false; updateChordDisplay(); updateStaffDisplay(); return; }
  }

  if (!qwertyShortcuts) {
    // Scale degree mode keyup (these were already handled above if autoVoicing);
    if (!sustainMode && /^Digit[1-9]$/.test(e.code)) {
      for (const pid of getPartIds()) partNotes[pid] = -1;
      currentChord = null;
      updateDisplay();
      updateChordDisplay();
      updateStaffDisplay();
      return;
    }
    // Letter key chord/note release
    const NOTE_CODES_UP = { KeyC: 'C', KeyD: 'D', KeyE: 'E', KeyF: 'F', KeyG: 'G', KeyA: 'A', KeyB: 'B' };
    if (NOTE_CODES_UP[e.code]) {
      if (autoVoicing && !sustainMode) {
        for (const pid of getPartIds()) partNotes[pid] = -1;
        currentChord = null;
        updateDisplay();
        updateChordDisplay();
        updateStaffDisplay();
      } else {
        heldKeyboard.delete(e.code);
        const NOTE_TO_MIDI_UP = { C: 60, D: 62, E: 64, F: 65, G: 67, A: 69, B: 71 };
        noteOff(NOTE_TO_MIDI_UP[NOTE_CODES_UP[e.code]]);
      }
      return;
    }
  }

  if (e.key === ',') { stopBpmHold(true, -5); return; }
  if (e.key === '.') { stopBpmHold(true, 5); return; }

  if (qwertyShortcuts) {
    const key = e.key.toLowerCase();
    const midi = KEY_TO_MIDI[key] !== undefined ? KEY_TO_MIDI[key] : KEY_TO_MIDI[CODE_TO_KEY[e.code]];
    if (midi !== undefined) {
      heldKeyboard.delete(e.code);
      noteOff(midi);
    }
  }
});

// === Initialize ===
initParts(4);
buildPiano();

// Document-level pointer release for on-screen piano keys
document.addEventListener('pointerup', (e) => {
  const m = pointerToMidi.get(e.pointerId);
  if (m !== undefined) { noteOff(m); pointerToMidi.delete(e.pointerId); }
});
document.addEventListener('pointercancel', (e) => {
  const m = pointerToMidi.get(e.pointerId);
  if (m !== undefined) { noteOff(m); pointerToMidi.delete(e.pointerId); }
});
</script>
