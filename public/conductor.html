<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singing Earring - Conductor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 10px; color: #e94560; }
  .room-code { font-size: 3rem; font-weight: bold; letter-spacing: 0.3em; color: #0f3460; background: #e94560; padding: 10px 24px; border-radius: 12px; display: inline-block; margin: 10px 0; }
  .section { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .section h2 { font-size: 1rem; color: #e94560; margin-bottom: 8px; }
  .master-display { display: flex; gap: 0; margin-top: 12px; overflow: visible; align-items: stretch; }
  .vol-controls { display: flex; flex-direction: column; justify-content: center; gap: 6px; margin-right: 6px; flex-shrink: 0; }
  .vol-btn { width: 36px; height: 72px; border-radius: 6px; background: #222; border: none; color: #888; font-size: 1.2rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; padding: 2px 0; }
  .vol-btn:active { background: #333; }
  .vol-btn .vol-key { font-size: 1.2rem; color: rgba(255,255,255,0.35); font-weight: bold; }
  .part-column { position: relative; flex: 1; text-align: center; padding: 12px 8px; margin: 0 3px; border: 3px solid transparent; border-radius: 12px; transition: border-color 0.1s; min-width: 0; box-sizing: border-box; }
  .part-column:first-child { margin-left: 0; }
  .part-column:last-child { margin-right: 0; }
  .part-column .part-label { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; }
  .part-column .part-modifier { font-size: 1.5rem; opacity: 0.4; margin-top: 2px; display: none; }
  .part-column .part-count { font-size: 1.4rem; font-weight: bold; }
  .part-column .part-syllable { font-size: 2rem; font-weight: bold; margin: 8px 0 4px; min-height: 2.4rem; }
  .part-column .part-note { font-size: 2.2rem; font-weight: 600; min-height: 2.6rem; opacity: 0.7; }
  .part-column .vol-bar-wrap { position: absolute; top: 8px; bottom: 8px; right: 6px; width: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .part-column .vol-bar { position: absolute; bottom: 0; width: 100%; border-radius: 4px; transition: height 0.1s; }
  .midi-select { background: #0f3460; border: 1px solid #e94560; color: #eee; padding: 8px 12px; border-radius: 8px; font-size: 1rem; width: 100%; }
  .midi-status { font-size: 0.85rem; color: #888; margin-top: 6px; }
  .piano-wrapper { position: relative; margin-top: 10px; }
  .piano { display: flex; position: relative; height: 140px; user-select: none; -webkit-user-select: none; touch-action: none; }
  .key { position: relative; border: 1px solid #333; border-radius: 0 0 6px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; font-size: 0.65rem; color: #888; transition: background 0.05s; }
  .key.white { background: #ddd; flex: 1; height: 140px; z-index: 1; }
  .key.black { background: #222; width: 28px; height: 85px; margin-left: -14px; margin-right: -14px; z-index: 2; color: #666; }
  .key .keybind { font-size: 0.6rem; color: rgba(0,0,0,0.35); margin-top: 2px; font-weight: bold; }
  .key.black .keybind { color: rgba(255,255,255,0.3); }
  .range-indicators { position: relative; height: 20px; margin-top: 2px; }
  .range-line { position: absolute; height: 2px; border-radius: 1px; }
  #status { font-size: 0.85rem; color: #888; margin-top: 10px; }
  button { background: #e94560; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #c23152; }
  /* Indicator controls */
  .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .sustain-toggle { padding: 2px 8px; border-radius: 6px; background: #222; font-size: 1.8rem; cursor: pointer; color: #888; transition: all 0.15s; }
  .syl-btn { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 6px; background: #222; cursor: pointer; font-size: 1.8rem; color: #888; transition: all 0.15s; border: 2px solid transparent; }
  .syl-btn.active { background: #e94560; color: white; border-color: #e94560; }
  .syl-key { font-size: 1.8rem; color: rgba(255,255,255,0.35); }
  .syl-input { background: transparent; border: none; color: inherit; font: inherit; width: 3.5em; text-align: center; outline: none; padding: 0; }
  .syl-input:focus { border-bottom: 1px solid currentColor; }
  .bpm-control { display: flex; align-items: center; gap: 8px; font-size: 1.8rem; color: #888; }
  .bpm-control button { padding: 2px 8px; font-size: 1.8rem; border-radius: 6px; }
  .bpm-input { background: transparent; border: none; border-bottom: 1px solid #555; color: #eee; font: inherit; width: 3em; text-align: center; outline: none; }
</style>
</head>
<body>

<h1>Singing Earring - Conductor</h1>

<div id="setup" class="section">
  <button id="createBtn" onclick="createRoom()">Create Room</button>
  <div id="status"></div>
</div>

<div id="roomInfo" class="section" style="display:none">
  <div id="singerUrl" style="font-size: 1.3rem; color: #888; margin-bottom: 8px;"></div>
  <h2>Room Code</h2>
  <div class="room-code" id="roomCode"></div>
  <div class="master-display">
    <div class="vol-controls">
      <div class="vol-btn" onclick="adjustVolume(5)">▲<span class="vol-key">9</span></div>
      <div class="vol-btn" onclick="adjustVolume(-5)">▼<span class="vol-key">6</span></div>
    </div>
    <div class="part-column" data-part="bass" style="color: #34d399;">
      <div class="part-label">Bass</div>
      <div class="part-modifier">⇧</div>
      <div class="part-count" id="countB">0</div>
      <div class="part-syllable" id="sylB"></div>
      <div class="part-note" id="noteB"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volB" style="height:50%;background:#34d399;"></div></div>
    </div>
    <div class="part-column" data-part="tenor" style="color: #60a5fa;">
      <div class="part-label">Tenor</div>
      <div class="part-modifier">⌃</div>
      <div class="part-count" id="countT">0</div>
      <div class="part-syllable" id="sylT"></div>
      <div class="part-note" id="noteT"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volT" style="height:50%;background:#60a5fa;"></div></div>
    </div>
    <div class="part-column" data-part="alto" style="color: #c084fc;">
      <div class="part-label">Alto</div>
      <div class="part-modifier">⌥</div>
      <div class="part-count" id="countA">0</div>
      <div class="part-syllable" id="sylA"></div>
      <div class="part-note" id="noteA"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volA" style="height:50%;background:#c084fc;"></div></div>
    </div>
    <div class="part-column" data-part="soprano" style="color: #ff6b9d;">
      <div class="part-label">Soprano</div>
      <div class="part-modifier">⌘</div>
      <div class="part-count" id="countS">0</div>
      <div class="part-syllable" id="sylS"></div>
      <div class="part-note" id="noteS"></div>
      <div class="vol-bar-wrap"><div class="vol-bar" id="volS" style="height:50%;background:#ff6b9d;"></div></div>
    </div>
  </div>
</div>

<div id="midiSection" class="section" style="display:none">
  <h2>MIDI Input</h2>
  <select id="midiSelect" class="midi-select"><option value="">No MIDI devices found</option></select>
  <div class="midi-status" id="midiStatus">Requesting MIDI access...</div>
</div>

<div id="controlsSection" class="section" style="display:none">
  <h2>Controls</h2>
  <div class="controls-row">
    <div class="syl-btn active" data-idx="0" onclick="setSyllable(0)">
      <input class="syl-input" type="text" maxlength="6" value="Aah" data-idx="0"><span class="syl-key">A</span>
    </div>
    <div class="syl-btn" data-idx="1" onclick="setSyllable(1)">
      <input class="syl-input" type="text" maxlength="6" value="Mmm" data-idx="1"><span class="syl-key">M</span>
    </div>
    <div class="syl-btn" data-idx="2" onclick="setSyllable(2)">
      <input class="syl-input" type="text" maxlength="6" value="Hoo" data-idx="2"><span class="syl-key">H</span>
    </div>
    <div class="syl-btn" data-idx="3" onclick="setSyllable(3)">
      <input class="syl-input" type="text" maxlength="6" value="Bum" data-idx="3"><span class="syl-key">B</span>
    </div>
    <div class="syl-btn" data-idx="4" onclick="setSyllable(4)">
      <input class="syl-input" type="text" maxlength="6" value="Shh" data-idx="4"><span class="syl-key">S</span>
    </div>
    <div class="bpm-control" id="bpmControl" style="display:none">
      <button onclick="adjustBpm(-5)">&lt; <span class="syl-key">,</span></button>
      <span>BPM = </span><input class="bpm-input" id="bpmInput" type="text" inputmode="numeric" pattern="[0-9]*" value="100">
      <button onclick="adjustBpm(5)">&gt; <span class="syl-key">.</span></button>
    </div>
  </div>
  <div class="controls-row">
    <div class="sustain-toggle" id="sustainToggle" onclick="toggleSustain()">Sustain: Off <span class="syl-key">Space</span></div>
  </div>
</div>

<div id="keyboardSection" class="section" style="display:none">
  <div class="piano-wrapper">
    <div class="piano" id="piano"></div>
    <div class="range-indicators" id="rangeIndicators"></div>
  </div>
</div>

<script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const PARTS = ['bass','tenor','alto','soprano'];
const PART_COLORS = { soprano: '#ff6b9d', alto: '#c084fc', tenor: '#60a5fa', bass: '#34d399' };
const RANGE_MID = { soprano: 72, alto: 69, tenor: 55, bass: 43 };
const RANGE = {
  soprano: [60, 79],
  alto:    [53, 72],
  tenor:   [48, 67],
  bass:    [40, 60],
};

let ws = null;
let midiAccess = null;
let currentInput = null;
let heldNotes = new Set();
let singerCounts = { soprano: 0, alto: 0, tenor: 0, bass: 0 };

// Sustain mode
let sustainMode = false;
let sustainedNotes = { bass: -1, tenor: -1, alto: -1, soprano: -1 };
let modifiers = { shift: false, ctrl: false, alt: false, meta: false };

// Syllable system
let activeSyllable = 0;
const syllables = [
  { text: 'Aah', pulse: false },
  { text: 'Mmm', pulse: false },
  { text: 'Hoo', pulse: false },
  { text: 'Bum', pulse: true },
  { text: 'Shh', pulse: false, percussive: true },
];
let pulseBpm = 100;
let partSyllables = { bass: 0, tenor: 0, alto: 0, soprano: 0 };

// Volume per part (0–100, default 50)
let partVolumes = { bass: 50, tenor: 50, alto: 50, soprano: 50 };

// Volume hold state
let volHoldTimeout = null;
let volHoldInterval = null;
let volHoldDone = false;

function adjustVolume(delta) {
  const parts = sustainMode ? getTargetParts() : ['bass', 'tenor', 'alto', 'soprano'];
  for (const part of parts) {
    partVolumes[part] = Math.max(0, Math.min(100, partVolumes[part] + delta));
  }
  updateVolumeBars();
  sendVolume();
}

function updateVolumeBars() {
  for (const part of ['bass', 'tenor', 'alto', 'soprano']) {
    document.getElementById('vol' + PART_SUFFIXES[part]).style.height = partVolumes[part] + '%';
  }
}

function sendVolume() {
  const msg = { t: 'vol', bass: partVolumes.bass, tenor: partVolumes.tenor, alto: partVolumes.alto, soprano: partVolumes.soprano };
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

function startVolHold(delta) {
  stopVolHold();
  volHoldDone = false;
  adjustVolume(delta > 0 ? 5 : -5);
  volHoldTimeout = setTimeout(() => {
    volHoldDone = true;
    volHoldInterval = setInterval(() => {
      adjustVolume(delta > 0 ? 2 : -2);
    }, 80);
  }, 500);
}

function stopVolHold() {
  if (volHoldTimeout) { clearTimeout(volHoldTimeout); volHoldTimeout = null; }
  if (volHoldInterval) { clearInterval(volHoldInterval); volHoldInterval = null; }
  volHoldDone = false;
}

// Track last-sent voice assignments for master display
let lastVoices = { soprano: -1, alto: -1, tenor: -1, bass: -1 };
let masterPulseTimer = null;

function noteName(midi) {
  return NOTES[midi % 12] + (Math.floor(midi / 12) - 1);
}

const PART_SUFFIXES = { bass: 'B', tenor: 'T', alto: 'A', soprano: 'S' };

function getPartSyllable(part) {
  return sustainMode ? syllables[partSyllables[part]] : syllables[activeSyllable];
}

function anyPartPulsing() {
  if (!sustainMode) return syllables[activeSyllable].pulse;
  return ['bass', 'tenor', 'alto', 'soprano'].some(p => syllables[partSyllables[p]].pulse);
}

function updateMasterDisplay() {
  // Update note names only — pulse timer is independent
  for (const part of ['bass', 'tenor', 'alto', 'soprano']) {
    const note = lastVoices[part];
    document.getElementById('note' + PART_SUFFIXES[part]).textContent = note >= 0 ? noteName(note) : '';
  }
  // Update non-pulsing parts' syllable text immediately
  updateMasterSyllables();
}

function updateMasterSyllables() {
  for (const part of ['bass', 'tenor', 'alto', 'soprano']) {
    const syl = getPartSyllable(part);
    const el = document.getElementById('syl' + PART_SUFFIXES[part]);
    if (!syl.pulse) {
      // Non-pulsing: set text and ensure full opacity
      el.style.transition = 'none';
      el.style.opacity = '1';
      el.textContent = syl.text;
    }
    // Pulsing parts are handled by startMasterPulse timer
  }
}

function startMasterPulse() {
  if (masterPulseTimer) { clearInterval(masterPulseTimer); masterPulseTimer = null; }

  if (!anyPartPulsing()) {
    // No parts pulsing — reset all opacity and set text
    for (const part of ['bass', 'tenor', 'alto', 'soprano']) {
      const el = document.getElementById('syl' + PART_SUFFIXES[part]);
      el.style.transition = 'none';
      el.style.opacity = '1';
    }
    updateMasterSyllables();
    return;
  }

  const intervalMs = 60000 / pulseBpm;
  const fadeDuration = Math.max(200, intervalMs - 50);

  function doPulseFlash() {
    for (const part of ['bass', 'tenor', 'alto', 'soprano']) {
      const syl = getPartSyllable(part);
      const el = document.getElementById('syl' + PART_SUFFIXES[part]);
      if (syl.pulse) {
        el.textContent = syl.text;
        el.style.transition = 'none';
        el.style.opacity = '1';
        void el.offsetWidth;
        el.style.transition = `opacity ${fadeDuration}ms ease-out`;
        el.style.opacity = '0';
      }
      // Non-pulsing parts keep their steady text (set by updateMasterSyllables)
    }
  }

  updateMasterSyllables(); // set non-pulsing parts' text first
  doPulseFlash();
  masterPulseTimer = setInterval(doPulseFlash, intervalMs);
}

function fitToRange(note, part) {
  const [lo, hi] = RANGE[part];
  while (note < lo) note += 12;
  while (note > hi) note -= 12;
  if (note < lo) note = lo;
  if (note > hi) note = hi;
  return note;
}

// Voice assignment: distribute parts evenly across notes, lower parts on lower notes
function assignVoices(notes) {
  if (notes.length === 0) return { soprano: -1, alto: -1, tenor: -1, bass: -1 };

  const sorted = [...notes].sort((a, b) => a - b);
  const activeParts = PARTS.filter(p => (singerCounts[p] || 0) > 0);
  const partsToAssign = activeParts.length > 0 ? activeParts : PARTS;
  const partsByRange = [...partsToAssign].sort((a, b) => RANGE_MID[a] - RANGE_MID[b]);
  const result = { soprano: -1, alto: -1, tenor: -1, bass: -1 };
  const n = sorted.length, p = partsByRange.length;

  if (n >= p) {
    // More notes than parts: spread parts proportionally across notes
    for (let pi = 0; pi < p; pi++) {
      const ni = Math.round(pi * (n - 1) / (p - 1 || 1));
      result[partsByRange[pi]] = fitToRange(sorted[ni], partsByRange[pi]);
    }
  } else {
    // More parts than notes: distribute evenly, lower parts on lower notes
    const base = Math.floor(p / n);
    const remainder = p % n;
    let partIdx = 0;
    for (let ni = 0; ni < n; ni++) {
      const count = base + (ni < remainder ? 1 : 0);
      for (let j = 0; j < count; j++) {
        const part = partsByRange[partIdx];
        result[part] = fitToRange(sorted[ni], part);
        partIdx++;
      }
    }
  }

  return result;
}

function updateDisplay() {
  const notes = [...heldNotes].sort((a, b) => a - b);

  if (notes.length === 0) {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ t: 'n', s: -1, a: -1, e: -1, b: -1 }));
    }
    lastVoices = { soprano: -1, alto: -1, tenor: -1, bass: -1 };
    updateMasterDisplay();
    document.querySelectorAll('.key').forEach(k => { k.style.background = ''; });
    return;
  }

  const voices = assignVoices(notes);
  lastVoices = { ...voices };

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({
      t: 'n',
      s: voices.soprano,
      a: voices.alto,
      e: voices.tenor,
      b: voices.bass,
    }));
  }

  updateMasterDisplay();

  // Color piano keys by assigned part
  document.querySelectorAll('.key').forEach(k => {
    const midi = parseInt(k.dataset.midi);
    const isBlack = k.classList.contains('black');
    if (!heldNotes.has(midi)) { k.style.background = ''; return; }

    const partsOnKey = [];
    for (const part of ['soprano','alto','tenor','bass']) {
      if (voices[part] >= 0 && voices[part] % 12 === midi % 12) {
        partsOnKey.push(part);
      }
    }

    if (partsOnKey.length === 0) {
      k.style.background = isBlack ? '#c23152' : '#e94560';
    } else if (partsOnKey.length === 1) {
      k.style.background = PART_COLORS[partsOnKey[0]];
    } else {
      const stops = partsOnKey.map((p, i) => {
        const pct1 = (i / partsOnKey.length * 100).toFixed(1);
        const pct2 = ((i + 1) / partsOnKey.length * 100).toFixed(1);
        return `${PART_COLORS[p]} ${pct1}%, ${PART_COLORS[p]} ${pct2}%`;
      }).join(', ');
      k.style.background = `linear-gradient(to right, ${stops})`;
    }
  });
}

function noteOn(midi) {
  if (sustainMode) {
    const parts = getTargetParts();
    for (const part of parts) { sustainedNotes[part] = midi; }
    updateSustainDisplay();
  } else {
    heldNotes.add(midi);
    updateDisplay();
  }
}
function noteOff(midi) {
  if (sustainMode) return; // no-op in sustain mode
  heldNotes.delete(midi);
  updateDisplay();
}

function getTargetParts() {
  // If no modifier held, target all parts
  if (!modifiers.shift && !modifiers.ctrl && !modifiers.alt && !modifiers.meta) {
    return ['bass', 'tenor', 'alto', 'soprano'];
  }
  // Otherwise, build list from held modifiers
  const parts = [];
  if (modifiers.shift) parts.push('bass');
  if (modifiers.ctrl) parts.push('tenor');
  if (modifiers.alt) parts.push('alto');
  if (modifiers.meta) parts.push('soprano');
  return parts;
}

function updateSustainDisplay() {
  const voices = {
    soprano: sustainedNotes.soprano >= 0 ? fitToRange(sustainedNotes.soprano, 'soprano') : -1,
    alto: sustainedNotes.alto >= 0 ? fitToRange(sustainedNotes.alto, 'alto') : -1,
    tenor: sustainedNotes.tenor >= 0 ? fitToRange(sustainedNotes.tenor, 'tenor') : -1,
    bass: sustainedNotes.bass >= 0 ? fitToRange(sustainedNotes.bass, 'bass') : -1,
  };

  lastVoices = { ...voices };

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ t: 'n', s: voices.soprano, a: voices.alto, e: voices.tenor, b: voices.bass }));
  }

  updateMasterDisplay();

  document.querySelectorAll('.key').forEach(k => {
    const midi = parseInt(k.dataset.midi);
    const partsOnKey = [];
    for (const part of ['soprano','alto','tenor','bass']) {
      if (voices[part] === midi) {
        partsOnKey.push(part);
      }
    }
    if (partsOnKey.length === 0) {
      k.style.background = '';
    } else if (partsOnKey.length === 1) {
      k.style.background = PART_COLORS[partsOnKey[0]];
    } else {
      const stops = partsOnKey.map((p, i) => {
        const pct1 = (i / partsOnKey.length * 100).toFixed(1);
        const pct2 = ((i + 1) / partsOnKey.length * 100).toFixed(1);
        return `${PART_COLORS[p]} ${pct1}%, ${PART_COLORS[p]} ${pct2}%`;
      }).join(', ');
      k.style.background = `linear-gradient(to right, ${stops})`;
    }
  });
}

function toggleSustain() {
  sustainMode = !sustainMode;
  const el = document.getElementById('sustainToggle');
  el.innerHTML = (sustainMode ? 'Sustain: On' : 'Sustain: Off') + ' <span class="syl-key">Space</span>';
  el.style.background = sustainMode ? '#e94560' : '#222';
  el.style.color = sustainMode ? '#fff' : '#888';

  if (sustainMode) {
    heldNotes.clear();
    heldKeyboard.clear();
    sustainedNotes = { bass: -1, tenor: -1, alto: -1, soprano: -1 };
    partSyllables = { bass: activeSyllable, tenor: activeSyllable, alto: activeSyllable, soprano: activeSyllable };
    updateSustainDisplay();
  } else {
    sustainedNotes = { bass: -1, tenor: -1, alto: -1, soprano: -1 };
    updateDisplay();
  }
  updateSustainHighlight();
}

function updateSustainHighlight() {
  const columns = document.querySelectorAll('.part-column');
  // Show/hide modifier symbols based on sustain mode
  document.querySelectorAll('.part-modifier').forEach(el => {
    el.style.display = sustainMode ? 'block' : 'none';
  });
  if (!sustainMode) {
    columns.forEach(c => c.style.borderColor = 'transparent');
    return;
  }
  const targetParts = getTargetParts();
  columns.forEach(c => {
    const part = c.dataset.part;
    c.style.borderColor = targetParts.includes(part) ? PART_COLORS[part] : 'transparent';
  });
}

// --- Syllable system ---
function setSyllable(index) {
  activeSyllable = index;
  if (sustainMode) {
    const parts = getTargetParts();
    for (const part of parts) { partSyllables[part] = index; }
    // Percussive syllable cancels the note for targeted parts
    if (syllables[index].percussive) {
      for (const part of parts) { sustainedNotes[part] = -1; }
      updateSustainDisplay();
    }
  }
  updateIndicators();
  sendSyllable();
}

function sendSyllable() {
  if (sustainMode) {
    // Send per-part syllable data
    const msg = { t: 'syl', perPart: {} };
    for (const part of ['bass', 'tenor', 'alto', 'soprano']) {
      const syl = syllables[partSyllables[part]];
      const pd = { text: syl.text };
      if (syl.pulse) { pd.pulse = true; pd.bpm = pulseBpm; }
      msg.perPart[part] = pd;
    }
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
  } else {
    const syl = syllables[activeSyllable];
    const msg = { t: 'syl', text: syl.text };
    if (syl.pulse) { msg.pulse = true; msg.bpm = pulseBpm; }
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
  }
}

function adjustBpm(delta) {
  pulseBpm = Math.max(30, Math.min(300, pulseBpm + delta));
  document.getElementById('bpmInput').value = pulseBpm;
  if (anyPartPulsing()) { startMasterPulse(); sendSyllable(); }
}

// BPM hold-to-fine-adjust state
let bpmHoldTimeout = null;
let bpmHoldInterval = null;
let bpmHoldDone = false; // true if we already did the initial ±5 jump

function startBpmHold(delta) {
  stopBpmHold();
  bpmHoldDone = false;
  // After 1 second, start rapid ±1 adjustments
  bpmHoldTimeout = setTimeout(() => {
    bpmHoldDone = true;
    bpmHoldInterval = setInterval(() => {
      adjustBpm(delta > 0 ? 1 : -1);
    }, 80);
  }, 1000);
}

function stopBpmHold(doInitial, delta) {
  if (bpmHoldTimeout) { clearTimeout(bpmHoldTimeout); bpmHoldTimeout = null; }
  if (bpmHoldInterval) { clearInterval(bpmHoldInterval); bpmHoldInterval = null; }
  // If released before the hold kicked in, do the normal ±5 jump
  if (doInitial && !bpmHoldDone) { adjustBpm(delta); }
  bpmHoldDone = false;
}

function updateIndicators() {
  // Syllable buttons
  document.querySelectorAll('.syl-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    btn.classList.toggle('active', idx === activeSyllable);
  });

  // BPM control visibility — show if any part is pulsing
  document.getElementById('bpmControl').style.display = anyPartPulsing() ? 'flex' : 'none';

  startMasterPulse();
  updateMasterDisplay();
}

// Handle syllable text editing
document.querySelectorAll('.syl-input').forEach(input => {
  input.addEventListener('input', (e) => {
    const idx = parseInt(e.target.dataset.idx);
    syllables[idx].text = e.target.value || '';
    // Resend if this syllable is active for any part
    if (idx === activeSyllable || (sustainMode && Object.values(partSyllables).includes(idx))) {
      sendSyllable();
      updateMasterSyllables();
    }
  });
  // Don't let clicking the input trigger setSyllable via the parent onclick
  input.addEventListener('click', (e) => e.stopPropagation());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
  });
});

// Handle BPM input editing
const bpmInputEl = document.getElementById('bpmInput');
bpmInputEl.addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, '');
});
bpmInputEl.addEventListener('change', (e) => {
  const val = parseInt(e.target.value);
  if (!isNaN(val)) {
    pulseBpm = Math.max(30, Math.min(300, val));
    e.target.value = pulseBpm;
    if (anyPartPulsing()) { startMasterPulse(); sendSyllable(); }
  } else {
    e.target.value = pulseBpm;
  }
});
bpmInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
});

// WebSocket
function createRoom() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ t: 'create' }));
    document.getElementById('status').textContent = 'Connected';
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.t === 'created') {
      document.getElementById('roomCode').textContent = msg.code;
      document.getElementById('singerUrl').textContent = 'Singers go to: ' + msg.ip + ':' + msg.port;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('roomInfo').style.display = '';
      document.getElementById('midiSection').style.display = '';
      document.getElementById('controlsSection').style.display = '';
      document.getElementById('keyboardSection').style.display = '';
      initMIDI();
      buildRangeIndicators();
      updateIndicators();
      // Send initial syllable and volume state
      sendSyllable();
      sendVolume();
    } else if (msg.t === 'r') {
      singerCounts = msg.singers;
      document.getElementById('countS').textContent = singerCounts.soprano || 0;
      document.getElementById('countA').textContent = singerCounts.alto || 0;
      document.getElementById('countT').textContent = singerCounts.tenor || 0;
      document.getElementById('countB').textContent = singerCounts.bass || 0;
      if (heldNotes.size > 0) updateDisplay();
    }
  };
  ws.onclose = () => { document.getElementById('status').textContent = 'Disconnected'; };
}

if (new URLSearchParams(location.search).has('test')) {
  createRoom();
}

// MIDI
async function initMIDI() {
  const statusEl = document.getElementById('midiStatus');
  const selectEl = document.getElementById('midiSelect');
  try {
    midiAccess = await navigator.requestMIDIAccess();
    statusEl.textContent = 'MIDI access granted';

    function updateInputs() {
      selectEl.innerHTML = '';
      const inputs = [...midiAccess.inputs.values()];
      if (inputs.length === 0) {
        selectEl.innerHTML = '<option value="">No MIDI devices — use keyboard below</option>';
        statusEl.textContent = 'No MIDI devices found. Use the on-screen keyboard.';
        return;
      }
      for (const input of inputs) {
        const opt = document.createElement('option');
        opt.value = input.id;
        opt.textContent = input.name;
        selectEl.appendChild(opt);
      }
      selectInput(inputs[0].id);
    }

    selectEl.addEventListener('change', (e) => selectInput(e.target.value));
    midiAccess.onstatechange = updateInputs;
    updateInputs();
  } catch (err) {
    statusEl.textContent = 'MIDI not available — use the on-screen keyboard';
  }
}

function selectInput(id) {
  if (currentInput) currentInput.onmidimessage = null;
  currentInput = midiAccess.inputs.get(id);
  if (currentInput) {
    currentInput.onmidimessage = onMIDIMessage;
    document.getElementById('midiStatus').textContent = `Listening: ${currentInput.name}`;
  }
}

function onMIDIMessage(e) {
  const [status, note, velocity] = e.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && velocity > 0) noteOn(note);
  else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) noteOff(note);
}

// Fallback on-screen keyboard (C3 to C5)
const pointerToMidi = new Map();

function buildPiano() {
  const piano = document.getElementById('piano');
  const startMidi = 48; // C3
  const endMidi = 72;   // C5
  const blackKeys = new Set([1,3,6,8,10]);

  for (let midi = startMidi; midi <= endMidi; midi++) {
    const semitone = midi % 12;
    const isBlack = blackKeys.has(semitone);
    const key = document.createElement('div');
    key.className = `key ${isBlack ? 'black' : 'white'}`;
    key.dataset.midi = midi;

    const nameLabel = document.createTextNode(isBlack ? '' : NOTES[semitone] + (Math.floor(midi / 12) - 1));
    key.appendChild(nameLabel);

    // Show keyboard shortcut if mapped
    const bindKey = Object.entries(KEY_TO_MIDI).find(([k, m]) => m === midi);
    if (bindKey) {
      const bindEl = document.createElement('span');
      bindEl.className = 'keybind';
      bindEl.textContent = bindKey[0] === '\\' ? '\\' : bindKey[0].toUpperCase();
      key.appendChild(bindEl);
    }

    key.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      modifiers.shift = e.shiftKey;
      modifiers.ctrl = e.ctrlKey;
      modifiers.alt = e.altKey;
      modifiers.meta = e.metaKey;
      key.setPointerCapture(e.pointerId);
      pointerToMidi.set(e.pointerId, midi);
      noteOn(midi);
    });
    key.addEventListener('pointerup', (e) => {
      e.preventDefault();
      const m = pointerToMidi.get(e.pointerId);
      if (m !== undefined) { noteOff(m); pointerToMidi.delete(e.pointerId); }
    });
    key.addEventListener('pointercancel', (e) => {
      const m = pointerToMidi.get(e.pointerId);
      if (m !== undefined) { noteOff(m); pointerToMidi.delete(e.pointerId); }
    });

    piano.appendChild(key);
  }
}

// Range indicators
function buildRangeIndicators() {
  const container = document.getElementById('rangeIndicators');
  container.innerHTML = '';
  const pianoStart = 48, pianoEnd = 72;

  const blackSet = new Set([1,3,6,8,10]);
  const whitePositions = {};
  let whiteIdx = 0;
  for (let m = pianoStart; m <= pianoEnd; m++) {
    if (!blackSet.has(m % 12)) {
      whitePositions[m] = whiteIdx;
      whiteIdx++;
    }
  }
  const totalWhite = whiteIdx;

  function midiToLeftPct(midi) {
    const clamped = Math.max(pianoStart, Math.min(pianoEnd, midi));
    if (whitePositions[clamped] !== undefined) return whitePositions[clamped] / totalWhite * 100;
    const lower = clamped - 1, upper = clamped + 1;
    if (whitePositions[lower] !== undefined && whitePositions[upper] !== undefined)
      return (whitePositions[lower] + whitePositions[upper]) / 2 / totalWhite * 100;
    return (clamped - pianoStart) / (pianoEnd - pianoStart) * 100;
  }

  function midiToRightPct(midi) {
    const clamped = Math.max(pianoStart, Math.min(pianoEnd, midi));
    if (whitePositions[clamped] !== undefined) return (whitePositions[clamped] + 1) / totalWhite * 100;
    const lower = clamped - 1, upper = clamped + 1;
    if (whitePositions[lower] !== undefined && whitePositions[upper] !== undefined)
      return ((whitePositions[lower] + whitePositions[upper]) / 2 + 1) / totalWhite * 100;
    return (clamped - pianoStart + 1) / (pianoEnd - pianoStart) * 100;
  }

  const partOrder = ['bass', 'tenor', 'alto', 'soprano'];
  const lineH = 2, gap = 2;

  for (let i = 0; i < partOrder.length; i++) {
    const part = partOrder[i];
    const [lo, hi] = RANGE[part];
    const clampedLo = Math.max(pianoStart, lo);
    const clampedHi = Math.min(pianoEnd, hi);
    const leftPct = midiToLeftPct(clampedLo);
    const rightPct = midiToRightPct(clampedHi);

    const line = document.createElement('div');
    line.className = 'range-line';
    line.style.background = PART_COLORS[part];
    line.style.left = leftPct + '%';
    line.style.width = (rightPct - leftPct) + '%';
    line.style.bottom = (i * (lineH + gap)) + 'px';
    container.appendChild(line);
  }
}

// Keyboard mapping: QWERTY row = white keys (shifted +2 whole steps), number row = black keys
// C3 and D3 visible on piano but no keyboard shortcut
const KEY_TO_MIDI = {
  // C3-D#3
  '`': 48,                      // C3
  '1': 49,                      // C#3
  'd': 50,                      // D3
  '2': 51,                      // D#3
  // E3-B3
  'q': 52,  '3': 54,           // E3, F#3
  'w': 53,  '4': 56,           // F3, G#3
  'e': 55,  '5': 58,           // G3, A#3
  'r': 57,                      // A3
  't': 59,                      // B3
  // C4-C5
  'y': 60,  '7': 61,           // C4, C#4
  'u': 62,  '8': 63,           // D4, D#4
  'i': 64,                      // E4
  'o': 65,  '0': 66,           // F4, F#4
  'p': 67,  '-': 68,           // G4, G#4
  '[': 69,  '=': 70,           // A4, A#4
  ']': 71,                      // B4
  '\\': 72,                     // C5
};

// Map physical key codes to KEY_TO_MIDI keys (needed when modifiers alter e.key)
const CODE_TO_KEY = {
  'Backquote': '`', 'Digit1': '1', 'KeyD': 'd', 'Digit2': '2',
  'KeyQ': 'q', 'KeyW': 'w', 'KeyE': 'e', 'KeyR': 'r', 'KeyT': 't',
  'KeyY': 'y', 'KeyU': 'u', 'KeyI': 'i', 'KeyO': 'o', 'KeyP': 'p',
  'BracketLeft': '[', 'BracketRight': ']', 'Backslash': '\\',
  'Digit3': '3', 'Digit4': '4', 'Digit5': '5', 'Digit7': '7', 'Digit8': '8',
  'Digit0': '0', 'Minus': '-', 'Equal': '=',
};

const heldKeyboard = new Set();

document.addEventListener('keydown', (e) => {
  modifiers.shift = e.shiftKey;
  modifiers.ctrl = e.ctrlKey;
  modifiers.alt = e.altKey;
  modifiers.meta = e.metaKey;
  if (sustainMode) updateSustainHighlight();

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.repeat) return;

  // Syllable keys — allow with modifiers in sustain mode (use e.code for reliability)
  if (sustainMode) {
    const sylCodes = { 'KeyA': 0, 'KeyM': 1, 'KeyH': 2, 'KeyB': 3, 'KeyS': 4 };
    if (sylCodes[e.code] !== undefined) { e.preventDefault(); setSyllable(sylCodes[e.code]); return; }
  }

  // Volume keys — work with modifiers (for per-part in sustain mode)
  if (e.code === 'Digit9') { e.preventDefault(); startVolHold(1); return; }
  if (e.code === 'Digit6') { e.preventDefault(); startVolHold(-1); return; }

  // Special toggle keys (only when no modifier held)
  if (!e.shiftKey && !e.ctrlKey && !e.altKey && !e.metaKey) {
    if (e.key === 'a') { e.preventDefault(); setSyllable(0); return; }
    if (e.key === 'm') { e.preventDefault(); setSyllable(1); return; }
    if (e.key === 'h') { e.preventDefault(); setSyllable(2); return; }
    if (e.key === 'b') { e.preventDefault(); setSyllable(3); return; }
    if (e.key === 's') { e.preventDefault(); setSyllable(4); return; }
    if (e.key === ',') { e.preventDefault(); startBpmHold(-5); return; }
    if (e.key === '.') { e.preventDefault(); startBpmHold(5); return; }
    if (e.key === ' ') { e.preventDefault(); toggleSustain(); return; }
  }

  // Use e.code to reliably get the physical key regardless of modifiers
  const key = e.key.toLowerCase();
  const midi = KEY_TO_MIDI[key] !== undefined ? KEY_TO_MIDI[key] : KEY_TO_MIDI[CODE_TO_KEY[e.code]];
  if (midi !== undefined) {
    if (sustainMode) {
      e.preventDefault();
      noteOn(midi);
    } else if (!heldKeyboard.has(e.code)) {
      e.preventDefault();
      heldKeyboard.add(e.code);
      noteOn(midi);
    }
  }
});

document.addEventListener('keyup', (e) => {
  modifiers.shift = e.shiftKey;
  modifiers.ctrl = e.ctrlKey;
  modifiers.alt = e.altKey;
  modifiers.meta = e.metaKey;
  if (sustainMode) updateSustainHighlight();

  if (e.code === 'Digit9' || e.code === 'Digit6') { stopVolHold(); return; }
  if (e.key === ',') { stopBpmHold(true, -5); return; }
  if (e.key === '.') { stopBpmHold(true, 5); return; }

  const key = e.key.toLowerCase();
  const midi = KEY_TO_MIDI[key] !== undefined ? KEY_TO_MIDI[key] : KEY_TO_MIDI[CODE_TO_KEY[e.code]];
  if (midi !== undefined) {
    heldKeyboard.delete(e.code);
    noteOff(midi);
  }
});

buildPiano();
</script>
