<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singing Earring - Conductor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 10px; color: #e94560; }
  .room-code { font-size: 3rem; font-weight: bold; letter-spacing: 0.3em; color: #0f3460; background: #e94560; padding: 10px 24px; border-radius: 12px; display: inline-block; margin: 10px 0; }
  .section { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .section h2 { font-size: 1rem; color: #e94560; margin-bottom: 8px; }
  .master-display-container { margin-top: 12px; }
  .master-display { display: flex; gap: 0; overflow: visible; align-items: stretch; }
  .master-display-row { display: flex; gap: 0; overflow: visible; align-items: stretch; margin-bottom: 4px; }
  .vol-controls { display: flex; flex-direction: column; justify-content: center; gap: 6px; margin-right: 6px; flex-shrink: 0; }
  .vol-btn { width: 36px; height: 72px; border-radius: 6px; background: #222; border: none; color: #888; font-size: 1.2rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; padding: 2px 0; }
  .vol-btn:active { background: #333; }
  .vol-btn .vol-key { font-size: 1.2rem; color: rgba(255,255,255,0.35); font-weight: bold; }
  .part-column { position: relative; flex: 1; text-align: center; padding: 12px 8px; margin: 0 3px; border: 3px solid transparent; border-radius: 12px; transition: border-color 0.1s; min-width: 0; box-sizing: border-box; }
  .part-column:first-child { margin-left: 0; }
  .part-column:last-child { margin-right: 0; }
  .part-column .part-label { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .part-column .part-modifier { font-size: 1.3rem; opacity: 0.4; margin-top: 2px; }
  .part-column .part-count { font-size: 1.2rem; font-weight: bold; }
  .part-column .part-count::-webkit-inner-spin-button,
  .part-column .part-count::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .part-column .part-syllable { font-size: 1.8rem; font-weight: bold; margin: 6px 0 4px; height: 2.2rem; overflow: hidden; }
  .part-column .part-note { font-size: 1.8rem; font-weight: 600; height: 2.2rem; overflow: hidden; opacity: 0.7; }
  .part-column .vol-bar-wrap { position: absolute; top: 8px; bottom: 8px; right: 6px; width: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .part-column .vol-bar { position: absolute; bottom: 0; width: 100%; border-radius: 4px; transition: height 0.1s; }
  .midi-select { background: #0f3460; border: 1px solid #e94560; color: #eee; padding: 8px 12px; border-radius: 8px; font-size: 1rem; width: 100%; }
  .midi-status { font-size: 0.85rem; color: #888; margin-top: 6px; }
  .piano-wrapper { position: relative; margin-top: 10px; }
  .piano { display: flex; position: relative; height: 140px; user-select: none; -webkit-user-select: none; touch-action: none; }
  .key { position: relative; border: 1px solid #333; border-radius: 0 0 6px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; font-size: 1.3rem; color: #888; transition: background 0.05s; }
  .key .notename { position: absolute; bottom: 26px; pointer-events: none; }
  .key.white { background: #ddd; flex: 1; height: 140px; z-index: 1; }
  .key.black { background: #222; width: 28px; height: 85px; margin-left: -14px; margin-right: -14px; z-index: 2; color: #666; }
  .key > * { pointer-events: none; }
  .key .keybind { font-size: 1.2rem; color: rgba(0,0,0,0.35); margin-top: 2px; font-weight: bold; }
  .key.black .keybind { color: rgba(255,255,255,0.3); }
  .range-indicators { position: relative; height: 36px; margin-top: 2px; }
  .range-line { position: absolute; height: 2px; border-radius: 1px; }
  #status { font-size: 0.85rem; color: #888; margin-top: 10px; }
  button { background: #e94560; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #c23152; }
  /* Indicator controls */
  .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .toggle-switch { position: relative; display: inline-flex; align-items: center; min-width: 160px; height: 36px; border-radius: 18px; background: #333; cursor: pointer; transition: background 0.25s; overflow: hidden; user-select: none; }
  .toggle-switch.on { background: #e94560; }
  .toggle-switch .toggle-knob { position: absolute; top: 3px; left: 3px; width: 30px; height: 30px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.4); transition: left 0.25s; z-index: 2; }
  .toggle-switch.on .toggle-knob { left: calc(100% - 33px); }
  .toggle-switch .toggle-label { flex: 1; text-align: center; font-size: 0.95rem; color: #ddd; padding: 0 38px; white-space: nowrap; z-index: 1; }
  .toggle-switch .toggle-label .syl-key { font-size: 0.75rem; }
  /* Choir visualization squares: 49 squares, gap = 50% of square width.
     With 49 squares and 48 gaps: totalWidth = 49*s + 48*(0.5*s) = 73*s → s = 100%/73 */
  #choirSquares { gap: calc(100% / 146); /* 0.5s = 100%/146 */ }
  .choir-sq { flex: 0 0 calc(100% / 73); height: 6px; background: rgba(255,255,255,0.1); border-radius: 1px; transition: background 0.3s, box-shadow 0.3s; cursor: default; position: relative; }
  .choir-sq::before { content: ''; position: absolute; top: -12px; bottom: -12px; left: 0; right: 0; }
  .choir-sq::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #222; color: #ddd; font-size: 0.7rem; padding: 4px 6px; border-radius: 4px; white-space: pre; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; line-height: 1.3; }
  .choir-sq:hover::after { opacity: 1; transition-delay: 0.25s; }
  .syl-btn { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 6px; background: #222; cursor: pointer; font-size: 1.8rem; color: #888; transition: all 0.15s; border: 2px solid transparent; }
  .syl-btn.active { background: #e94560; color: white; border-color: #e94560; }
  .syl-key { font-size: 1.8rem; color: rgba(255,255,255,0.35); }
  .syl-input { background: transparent; border: none; color: inherit; font: inherit; width: 3.5em; text-align: center; outline: none; padding: 0; }
  .syl-input:focus { border-bottom: 1px solid currentColor; }
  .bpm-control { display: flex; align-items: center; gap: 8px; font-size: 1.8rem; color: #888; }
  .bpm-control button { padding: 2px 8px; font-size: 1.8rem; border-radius: 6px; }
  .bpm-input { background: transparent; border: none; border-bottom: 1px solid #555; color: #eee; font: inherit; width: 3em; text-align: center; outline: none; }
  .num-parts-control { display: flex; align-items: center; gap: 6px; font-size: 1rem; color: #ccc; }
  .num-parts-control input { width: 3.5em; background: #0f3460; border: 1px solid #e94560; color: #eee; padding: 4px 6px; border-radius: 6px; font-size: 1rem; text-align: center; }
  .num-parts-control button { padding: 2px 8px; font-size: 1.2rem; border-radius: 6px; background: #0f3460; border: 1px solid #e94560; color: #eee; }
</style>
</head>
<body>

<h1>Singing Earring - Conductor</h1>

<div id="setup" class="section">
  <button id="createBtn" onclick="createRoom()">Create Room</button>
  <div id="status"></div>
</div>

<div id="roomInfo" class="section" style="display:none">
  <div id="singerUrl" style="font-size: 1.3rem; color: #888; margin-bottom: 8px;"></div>
  <h2>Room Code</h2>
  <div class="room-code" id="roomCode"></div>
  <div class="master-display-container" style="display:flex;align-items:stretch;">
    <div class="vol-controls" id="volControls" style="display:none">
      <div class="vol-btn" onclick="adjustVolume(5)">▲<span class="vol-key">↑</span></div>
      <button onclick="resetVolumes()" style="font-size:0.6rem;padding:2px 6px;background:#333;border:1px solid #555;border-radius:4px;color:#aaa;cursor:pointer;">Reset</button>
      <div class="vol-btn" onclick="adjustVolume(-5)">▼<span class="vol-key">↓</span></div>
    </div>
    <div id="masterDisplayContainer" style="flex:1;"></div>
  </div>
  <div id="choirVizSection" style="margin-top:12px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="choirSizeLabel" style="font-size:0.85rem;color:#888;white-space:nowrap;">Choir Size: 0</div>
      <button onclick="allocateEvenSplit()" style="font-size:0.7rem;padding:2px 8px;background:#333;border:1px solid #555;border-radius:4px;color:#aaa;cursor:pointer;position:relative;z-index:20;">
        <span id="evenSplitLabel">Even split:</span>
      </button>
      <button onclick="allocateStrictRange()" style="font-size:0.7rem;padding:2px 8px;background:#333;border:1px solid #555;border-radius:4px;color:#aaa;cursor:pointer;position:relative;z-index:20;">
        <span id="strictRangeLabel">Vocal range:</span>
      </button>
    </div>
    <div id="choirSquares" style="display:flex;margin-top:6px;"></div>
  </div>
</div>

<div id="midiSection" class="section" style="display:none">
  <h2>MIDI Input</h2>
  <select id="midiSelect" class="midi-select"><option value="">No MIDI devices found</option></select>
  <div class="midi-status" id="midiStatus">Requesting MIDI access...</div>
</div>

<div id="controlsSection" class="section" style="display:none">
  <h2>Controls</h2>
  <div class="controls-row">
    <div class="syl-btn active" data-idx="0" onclick="setSyllable(0)">
      <input class="syl-input" type="text" maxlength="6" value="Aah" data-idx="0"><span class="syl-key">A</span>
    </div>
    <div class="syl-btn" data-idx="1" onclick="setSyllable(1)">
      <input class="syl-input" type="text" maxlength="6" value="Mmm" data-idx="1"><span class="syl-key">M</span>
    </div>
    <div class="syl-btn" data-idx="2" onclick="setSyllable(2)">
      <input class="syl-input" type="text" maxlength="6" value="Hoo" data-idx="2"><span class="syl-key">G</span>
    </div>
    <div class="syl-btn" data-idx="3" onclick="setSyllable(3)">
      <input class="syl-input" type="text" maxlength="6" value="Bum" data-idx="3"><span class="syl-key">B</span>
    </div>
    <div class="syl-btn" data-idx="4" onclick="setSyllable(4)">
      <input class="syl-input" type="text" maxlength="6" value="Shh" data-idx="4"><span class="syl-key">S</span>
    </div>
    <div class="bpm-control" id="bpmControl" style="display:none">
      <button onclick="adjustBpm(-5)">&lt; <span class="syl-key">,</span></button>
      <span>BPM = </span><input class="bpm-input" id="bpmInput" type="text" inputmode="numeric" pattern="[0-9]*" value="100">
      <button onclick="adjustBpm(5)">&gt; <span class="syl-key">.</span></button>
    </div>
  </div>
  <div class="controls-row">
    <div class="num-parts-control">
      <span>Number of Parts:</span>
      <button onclick="setNumParts(numParts - 1)">−</button>
      <input type="number" id="numPartsInput" min="1" max="12" value="4"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onchange="setNumParts(parseInt(this.value)||4)">
      <button onclick="setNumParts(numParts + 1)">+</button>
    </div>
    <div class="toggle-switch" id="sustainToggle" onclick="toggleSustain()">
      <div class="toggle-knob"></div>
      <span class="toggle-label">Sustain <span class="syl-key">Space</span></span>
    </div>
    <div class="toggle-switch" id="modeToggle" onclick="toggleAutoVoicing()">
      <div class="toggle-knob"></div>
      <span class="toggle-label">Auto Voice <span class="syl-key">⌫</span></span>
    </div>
  </div>
  <div id="tonicControls" class="controls-row" style="display:none;gap:16px;">
    <label style="display:flex;align-items:center;gap:6px;font-size:1rem;color:#ccc;">
      Key:
      <select id="tonicLetterSelect" class="midi-select" style="width:auto;padding:4px 8px;" onchange="updateTonicFromUI();">
        <option value="0">C</option><option value="2">D</option><option value="4">E</option>
        <option value="5">F</option><option value="7">G</option><option value="9">A</option>
        <option value="11">B</option>
      </select>
      <span style="display:inline-flex;flex-direction:column;gap:1px;vertical-align:middle;">
        <button id="sharpBtn" type="button" onclick="toggleAccidental('sharp')" style="width:24px;height:18px;font-size:13px;line-height:1;padding:0;border:1px solid #555;border-radius:3px 3px 0 0;background:#1a1a2e;color:#777;cursor:pointer;font-family:serif;">♯</button>
        <button id="flatBtn" type="button" onclick="toggleAccidental('flat')" style="width:24px;height:18px;font-size:13px;line-height:1;padding:0;border:1px solid #555;border-radius:0 0 3px 3px;background:#1a1a2e;color:#777;cursor:pointer;font-family:serif;">♭</button>
      </span>
      <select id="modeSelect" class="midi-select" style="width:auto;padding:4px 8px;" onchange="selectedKey.mode=this.value;previousVoicing=null;updateStaffDisplay();updateChordDisplay();updatePianoLabels();">
        <option value="major">Major</option>
        <option value="minor">Minor</option>
        <option value="dorian" style="color:#888;">Dorian</option>
        <option value="phrygian" style="color:#888;">Phrygian</option>
        <option value="lydian" style="color:#888;">Lydian</option>
        <option value="mixolydian" style="color:#888;">Mixolydian</option>
        <option value="locrian" style="color:#888;">Locrian</option>
      </select>
    </label>
  </div>
</div>

<div id="autoVoicingControls" class="section" style="display:none">
  <h2>Auto Voicing</h2>
  <div style="display:flex;gap:20px;align-items:flex-start;">
    <div id="autoControlsLeft" style="flex-shrink:0;">
      <div class="controls-row" style="gap:16px;">
        <div class="toggle-switch on" id="rootInBassToggle" onclick="toggleRootInBass()" style="min-width:140px;">
          <div class="toggle-knob"></div>
          <span class="toggle-label">Root in Bass</span>
        </div>
      </div>
      <div id="chordDisplay" style="font-size:2.5rem;font-weight:bold;color:#fbbf24;margin-top:12px;min-height:3rem;"></div>
      <div id="degreeHints" style="font-size:0.85rem;color:#666;margin-top:8px;">
        Press 1–9 for scale degrees. Hold `=dim, 1=aug, -=minor, ==major, [=7, ]=maj7, \=add9
      </div>
    </div>
    <div id="staffContainer" style="flex:1;min-width:0;"></div>
  </div>
</div>

<div id="keyboardSection" class="section" style="display:none">
  <div style="display:flex;justify-content:center;margin-bottom:6px;">
    <div class="toggle-switch on" id="qwertyToggle" onclick="toggleQwerty()">
      <div class="toggle-knob"></div>
      <span class="toggle-label">QWERTY <span class="syl-key">⇪</span></span>
    </div>
  </div>
  <div class="piano-wrapper">
    <div class="piano" id="piano"></div>
    <div class="range-indicators" id="rangeIndicators"></div>
  </div>
</div>

<script>
// === Constants ===
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Modifier keys map to part indices (0-based from lowest)
const MODIFIER_KEYS = ['h', 'j', 'k', 'l', ';', "'"];
const MODIFIER_CODES = ['KeyH', 'KeyJ', 'KeyK', 'KeyL', 'Semicolon', 'Quote'];

// === Dynamic Part System ===

function getPartConfig(n) {
  // Returns array of part definitions sorted low to high
  // Each: { id, label, shortLabel }
  const configs = {
    1:  [{id:'unison', label:'', shortLabel:''}],
    2:  [{id:'bass', label:'Bass', shortLabel:'B'},
         {id:'treble', label:'Treble', shortLabel:'Tr'}],
    3:  [{id:'tenor', label:'Tenor', shortLabel:'T'},
         {id:'alto', label:'Alto', shortLabel:'A'},
         {id:'soprano', label:'Soprano', shortLabel:'S'}],
    4:  [{id:'bass', label:'Bass', shortLabel:'B'},
         {id:'tenor', label:'Tenor', shortLabel:'T'},
         {id:'alto', label:'Alto', shortLabel:'A'},
         {id:'soprano', label:'Soprano', shortLabel:'S'}],
    5:  [{id:'bass', label:'Bass', shortLabel:'B'},
         {id:'baritone', label:'Baritone', shortLabel:'Bar'},
         {id:'tenor', label:'Tenor', shortLabel:'T'},
         {id:'alto', label:'Alto', shortLabel:'A'},
         {id:'soprano', label:'Soprano', shortLabel:'S'}],
    6:  [{id:'bass', label:'Bass', shortLabel:'B'},
         {id:'baritone', label:'Baritone', shortLabel:'Bar'},
         {id:'tenor', label:'Tenor', shortLabel:'T'},
         {id:'alto', label:'Alto', shortLabel:'A'},
         {id:'mezzo', label:'Mezzo-Soprano', shortLabel:'Mez'},
         {id:'soprano', label:'Soprano', shortLabel:'S'}],
    7:  [{id:'bass', label:'Bass', shortLabel:'B'},
         {id:'baritone', label:'Baritone', shortLabel:'Bar'},
         {id:'tenor', label:'Tenor', shortLabel:'T'},
         {id:'alto2', label:'Alto II', shortLabel:'AII'},
         {id:'alto1', label:'Alto I', shortLabel:'AI'},
         {id:'mezzo', label:'Mezzo-Soprano', shortLabel:'Mez'},
         {id:'soprano', label:'Soprano', shortLabel:'S'}],
    8:  [{id:'bass2', label:'Bass II', shortLabel:'BII'},
         {id:'bass1', label:'Bass I', shortLabel:'BI'},
         {id:'tenor2', label:'Tenor II', shortLabel:'TII'},
         {id:'tenor1', label:'Tenor I', shortLabel:'TI'},
         {id:'alto2', label:'Alto II', shortLabel:'AII'},
         {id:'alto1', label:'Alto I', shortLabel:'AI'},
         {id:'soprano2', label:'Soprano II', shortLabel:'SII'},
         {id:'soprano1', label:'Soprano I', shortLabel:'SI'}],
    9:  [{id:'bass2', label:'Bass II', shortLabel:'BII'},
         {id:'bass1', label:'Bass I', shortLabel:'BI'},
         {id:'baritone', label:'Baritone', shortLabel:'Bar'},
         {id:'tenor2', label:'Tenor II', shortLabel:'TII'},
         {id:'tenor1', label:'Tenor I', shortLabel:'TI'},
         {id:'alto2', label:'Alto II', shortLabel:'AII'},
         {id:'alto1', label:'Alto I', shortLabel:'AI'},
         {id:'soprano2', label:'Soprano II', shortLabel:'SII'},
         {id:'soprano1', label:'Soprano I', shortLabel:'SI'}],
    10: [{id:'bass2', label:'Bass II', shortLabel:'BII'},
         {id:'bass1', label:'Bass I', shortLabel:'BI'},
         {id:'baritone2', label:'Baritone II', shortLabel:'BarII'},
         {id:'baritone1', label:'Baritone I', shortLabel:'BarI'},
         {id:'tenor2', label:'Tenor II', shortLabel:'TII'},
         {id:'tenor1', label:'Tenor I', shortLabel:'TI'},
         {id:'alto2', label:'Alto II', shortLabel:'AII'},
         {id:'alto1', label:'Alto I', shortLabel:'AI'},
         {id:'soprano2', label:'Soprano II', shortLabel:'SII'},
         {id:'soprano1', label:'Soprano I', shortLabel:'SI'}],
    11: [{id:'bass2', label:'Bass II', shortLabel:'BII'},
         {id:'bass1', label:'Bass I', shortLabel:'BI'},
         {id:'baritone2', label:'Baritone II', shortLabel:'BarII'},
         {id:'baritone1', label:'Baritone I', shortLabel:'BarI'},
         {id:'tenor2', label:'Tenor II', shortLabel:'TII'},
         {id:'tenor1', label:'Tenor I', shortLabel:'TI'},
         {id:'alto2', label:'Alto II', shortLabel:'AII'},
         {id:'alto1', label:'Alto I', shortLabel:'AI'},
         {id:'mezzo', label:'Mezzo-Soprano', shortLabel:'Mez'},
         {id:'soprano2', label:'Soprano II', shortLabel:'SII'},
         {id:'soprano1', label:'Soprano I', shortLabel:'SI'}],
    12: [{id:'bass2', label:'Bass II', shortLabel:'BII'},
         {id:'bass1', label:'Bass I', shortLabel:'BI'},
         {id:'baritone2', label:'Baritone II', shortLabel:'BarII'},
         {id:'baritone1', label:'Baritone I', shortLabel:'BarI'},
         {id:'tenor2', label:'Tenor II', shortLabel:'TII'},
         {id:'tenor1', label:'Tenor I', shortLabel:'TI'},
         {id:'alto2', label:'Alto II', shortLabel:'AII'},
         {id:'alto1', label:'Alto I', shortLabel:'AI'},
         {id:'mezzo2', label:'Mezzo-Sop. II', shortLabel:'MzII'},
         {id:'mezzo1', label:'Mezzo-Sop. I', shortLabel:'MzI'},
         {id:'soprano2', label:'Soprano II', shortLabel:'SII'},
         {id:'soprano1', label:'Soprano I', shortLabel:'SI'}],
  };
  return configs[n] || configs[4];
}

// Preset vocal ranges for all 12 voice types (MIDI note numbers)
// Based on standard choral ranges: Bass E2-E4, Baritone A2-A4, Tenor C3-C5,
// Alto F3-F5, Mezzo A3-A5, Soprano C4-C6. I/II splits divide each in half.
const VOCAL_RANGES = {
  bass:      [40, 64],  // E2-E4
  bass2:     [40, 52],  // E2-E3 (low half)
  bass1:     [48, 64],  // C3-E4 (high half)
  baritone:  [45, 69],  // A2-A4
  baritone2: [45, 57],  // A2-A3 (low half)
  baritone1: [52, 69],  // E3-A4 (high half)
  tenor:     [48, 72],  // C3-C5
  tenor2:    [48, 60],  // C3-C4 (low half)
  tenor1:    [55, 72],  // G3-C5 (high half)
  alto:      [53, 77],  // F3-F5
  alto2:     [53, 65],  // F3-F4 (low half)
  alto1:     [60, 77],  // C4-F5 (high half)
  mezzo:     [57, 81],  // A3-A5
  mezzo2:    [57, 69],  // A3-A4 (low half)
  mezzo1:    [64, 81],  // E4-A5 (high half)
  soprano:   [60, 84],  // C4-C6
  soprano2:  [60, 72],  // C4-C5 (low half)
  soprano1:  [67, 84],  // G4-C6 (high half)
  treble:    [55, 84],  // G3-C6
  unison:    [40, 84],  // E2-C6
};

function computePartRanges(parts) {
  // Distribute ranges evenly across the vocal range (MIDI 36-84)
  const lo = 36, hi = 84;
  const n = parts.length;
  if (n === 1) {
    parts[0].range = [40, 79];
    parts[0].mid = 60;
    return;
  }
  // Each part gets a range centered on an evenly-spaced midpoint
  // Range width shrinks slightly as parts increase but stays at least 14 semitones
  const rangeWidth = Math.max(14, Math.round(24 - n));
  const half = Math.floor(rangeWidth / 2);
  for (let i = 0; i < n; i++) {
    const center = Math.round(lo + half + (i / (n - 1)) * (hi - lo - rangeWidth));
    const partLo = Math.max(lo, center - half);
    const partHi = Math.min(hi, center + half);
    parts[i].range = [partLo, partHi];
    parts[i].mid = center;
  }
}

function updatePartMidpoints() {
  for (const part of activeParts) {
    const partSingers = singers.filter(s => s.part === part.id && s.range);
    if (partSingers.length > 0) {
      const avgMid = partSingers.reduce((sum, s) => sum + (s.range[0] + s.range[1]) / 2, 0) / partSingers.length;
      part.mid = Math.round(avgMid);
    }
    // If no singers, keep the default from computePartRanges()
  }
}

function computePartColors(parts) {
  const n = parts.length;
  if (n === 1) {
    parts[0].color = 'hsl(200, 70%, 60%)';
    return;
  }
  for (let i = 0; i < n; i++) {
    // Rainbow from red (0°) to violet (280°), low voice to high
    const hue = Math.round((i / (n - 1)) * 280);
    parts[i].color = `hsl(${hue}, 70%, 60%)`;
  }
}

function getModifierGroups() {
  // Group activeParts into modifier groups (max 6, one per key H-J-K-L-;-')
  // Parts with I/II splits (e.g. bass2/bass1) are grouped together
  if (numParts <= 1) return [];
  const groups = [];
  let i = 0;
  while (i < activeParts.length) {
    const part = activeParts[i];
    const baseId = part.id.replace(/[12]$/, '');
    if (i + 1 < activeParts.length && activeParts[i + 1].id.replace(/[12]$/, '') === baseId) {
      // Pair: part[i] is II (lower), part[i+1] is I (higher)
      groups.push({
        partIds: [part.id, activeParts[i + 1].id],
        hasSplit: true,
        label: baseId.charAt(0).toUpperCase() + baseId.slice(1)
      });
      i += 2;
    } else {
      groups.push({ partIds: [part.id], hasSplit: false, label: part.label });
      i += 1;
    }
  }
  // Assign keys
  for (let g = 0; g < groups.length && g < MODIFIER_KEYS.length; g++) {
    groups[g].key = MODIFIER_KEYS[g];
    groups[g].keyCode = MODIFIER_CODES[g];
    groups[g].keyLabel = MODIFIER_KEYS[g] === ';' ? ';' : MODIFIER_KEYS[g] === "'" ? "'" : MODIFIER_KEYS[g].toUpperCase();
  }
  return groups;
}

function getEffectiveSig() {
  let sig = KEY_SIGNATURES[selectedKey.mode][selectedKey.tonic];
  if (tonicAccidental === 'flat' && sig > 0) sig -= 12;
  else if (tonicAccidental === 'sharp' && sig < 0) sig += 12;
  return sig;
}

function noteNameInKey(pitchClass) {
  const sig = getEffectiveSig();
  return sig >= 0 ? SHARP_NAMES[pitchClass] : FLAT_NAMES[pitchClass];
}

// === Helpers ===
function noteName(midi) {

}

function getPartById(id) {
  return activeParts.find(p => p.id === id);
}

function getPartIds() {
  return activeParts.map(p => p.id);
}

function fitToRange(note, partId, singerRange) {
  const part = getPartById(partId);
  const [lo, hi] = singerRange || (part ? part.range : [40, 79]);
  while (note < lo) note += 12;
  while (note > hi) note -= 12;
  if (note < lo) note = lo;
  if (note > hi) note = hi;
  return note;
}

function getTargetParts() {
  if (modifierHeld.size === 0) return getPartIds();
  const groups = getModifierGroups();
  const parts = [];
  for (const group of groups) {
    if (modifierHeld.has(group.keyCode)) {
      if (group.hasSplit) {
        if (modifierShift) {
          parts.push(group.partIds[1]); // Part I (higher)
        } else if (modifierCtrl) {
          parts.push(group.partIds[0]); // Part II (lower)
        } else {
          parts.push(...group.partIds); // Both
        }
      } else {
        parts.push(...group.partIds);
      }
    }
  }
  return parts.length > 0 ? parts : getPartIds();
}

function singerCountForPart(partId) {
  return singers.filter(s => s.part === partId).length;
}

// === Initialize parts ===

function initParts(n) {
  numParts = Math.max(1, Math.min(12, n));
  partLocks = {}; // Reset locks when parts change
  const oldParts = activeParts;
  activeParts = getPartConfig(numParts);
  computePartRanges(activeParts);
  computePartColors(activeParts);

  // Rebuild state objects, preserving values where part IDs match
  const newPartNotes = {};
  const newPartSyllables = {};
  const newPartVolumes = {};
  for (const part of activeParts) {
    newPartNotes[part.id] = (partNotes[part.id] !== undefined) ? partNotes[part.id] : -1;
    newPartSyllables[part.id] = (partSyllables[part.id] !== undefined) ? partSyllables[part.id] : activeSyllable;
    newPartVolumes[part.id] = (partVolumes[part.id] !== undefined) ? partVolumes[part.id] : 50;
  }
  partNotes = newPartNotes;
  partSyllables = newPartSyllables;
  partVolumes = newPartVolumes;

  // Reset previousVoicing since parts changed
  previousVoicing = null;

  // Reassign singers to closest new parts
  if (oldParts.length > 0 && singers.length > 0) {
    reassignSingers();
    updatePartMidpoints();
  }

  // Update input
  const input = document.getElementById('numPartsInput');
  if (input) input.value = numParts;

  // Rebuild UI
  buildMasterDisplay();
  buildRangeIndicators();
  updateDisplay();
  sendVolume();
  sendSyllable();

  // Broadcast new part config to singers
  sendPartConfig();
  buildChoirSquares();
  updateChoirViz();
}

function setNumParts(n) {
  initParts(n);
}

let partLocks = {}; // {partId: lockedCount|null}

function reassignSingers() {
  reassignSingersWithLocks();
}

function reassignSingersWithLocks() {
  const assigned = new Set();

  // 1. Handle locked parts first: assign closest N singers
  for (const part of activeParts) {
    const locked = partLocks[part.id];
    if (locked == null) continue;
    // Find all unassigned singers, sorted by distance to this part
    const available = singers.filter(s => !assigned.has(s.id));
    available.sort((a, b) => {
      const aMid = a.range ? (a.range[0] + a.range[1]) / 2 : part.mid;
      const bMid = b.range ? (b.range[0] + b.range[1]) / 2 : part.mid;
      return Math.abs(aMid - part.mid) - Math.abs(bMid - part.mid);
    });
    const count = Math.min(locked, available.length);
    for (let i = 0; i < count; i++) {
      available[i].part = part.id;
      assigned.add(available[i].id);
    }
  }

  // 2. Assign remaining singers to unlocked parts using cost function
  const remaining = singers.filter(s => !assigned.has(s.id));
  const unlockedParts = activeParts.filter(p => partLocks[p.id] == null);

  for (const singer of remaining) {
    if (singer.range && unlockedParts.length > 0) {
      const singerMid = (singer.range[0] + singer.range[1]) / 2;
      let bestPart = unlockedParts[0];
      let bestScore = Infinity;
      for (const part of unlockedParts) {
        // Cost: midpoint distance + range overlap penalty
        let score = Math.abs(singerMid - part.mid);
        const overlap = Math.min(singer.range[1], part.range[1]) - Math.max(singer.range[0], part.range[0]);
        const singerSpan = singer.range[1] - singer.range[0];
        if (overlap < singerSpan) score += (singerSpan - overlap) * 0.5;
        if (score < bestScore) { bestScore = score; bestPart = part; }
      }
      singer.part = bestPart.id;
    } else if (unlockedParts.length > 0) {
      // No range: try name match, then default to middle part
      const oldPart = singer.part;
      let matched = unlockedParts.find(p => p.id === oldPart);
      if (!matched) matched = unlockedParts.find(p => p.id.startsWith(oldPart) || oldPart.startsWith(p.id));
      singer.part = matched ? matched.id : unlockedParts[Math.floor(unlockedParts.length / 2)].id;
    } else if (activeParts.length > 0) {
      singer.part = activeParts[0].id;
    }
  }
}

function adjustPartCount(partId, delta) {
  const current = singers.filter(s => s.part === partId).length;
  const target = Math.max(0, Math.min(singers.length, current + delta));
  if (target === current) return;
  setPartCount(partId, target);
}

function setPartCount(partId, target) {
  const current = singers.filter(s => s.part === partId).length;
  if (target === current) return;

  // Track old assignments for animation
  const oldPartMap = {};
  for (const s of singers) oldPartMap[s.id] = s.part;

  const part = activeParts.find(p => p.id === partId);
  if (!part) return;

  if (target > current) {
    // Need to pull singers from other parts into this one
    const needed = target - current;
    const otherSingers = singers.filter(s => s.part !== partId);
    // Score each: lower = better candidate to move here
    otherSingers.sort((a, b) => {
      const aScore = reallocationCost(a, part, partId);
      const bScore = reallocationCost(b, part, partId);
      return aScore - bScore;
    });
    for (let i = 0; i < Math.min(needed, otherSingers.length); i++) {
      otherSingers[i].part = partId;
    }
  } else {
    // Need to move singers out of this part
    const excess = current - target;
    const partSingers = singers.filter(s => s.part === partId);
    // Score each: higher = better candidate to move away
    // (reverse: best to move = lowest cost to go to another part)
    const otherParts = activeParts.filter(p => p.id !== partId);
    partSingers.sort((a, b) => {
      const aMin = Math.min(...otherParts.map(p => reallocationCost(a, p, p.id)));
      const bMin = Math.min(...otherParts.map(p => reallocationCost(b, p, p.id)));
      return aMin - bMin; // easiest to move away first
    });
    for (let i = 0; i < Math.min(excess, partSingers.length); i++) {
      // Assign to best other part
      let bestPart = otherParts[0], bestScore = Infinity;
      for (const op of otherParts) {
        const s = reallocationCost(partSingers[i], op, op.id);
        if (s < bestScore) { bestScore = s; bestPart = op; }
      }
      partSingers[i].part = bestPart.id;
    }
  }

  updatePartMidpoints();
  animateChoirTransitions(oldPartMap);
  buildMasterDisplay();
  updateChoirViz();
  updateDisplay();
  sendPartConfig();
}

function reallocationCost(singer, targetPart, targetPartId) {
  if (!singer.range) return 50; // no range info = moderate cost
  const singerLo = singer.range[0], singerHi = singer.range[1];
  const partLo = targetPart.range[0], partHi = targetPart.range[1];

  // Range overlap: how much of singer's range fits within part range
  const overlap = Math.max(0, Math.min(singerHi, partHi) - Math.max(singerLo, partLo));
  const singerSpan = singerHi - singerLo;
  const overlapFraction = singerSpan > 0 ? overlap / singerSpan : 0;
  const overlapCost = (1 - overlapFraction) * 30; // 0-30: higher = worse overlap

  // Evenness: prefer moving to/from parts that would become more balanced
  const counts = {};
  for (const p of activeParts) counts[p.id] = 0;
  for (const s of singers) counts[s.part] = (counts[s.part] || 0) + 1;
  const avgCount = singers.length / activeParts.length;
  const targetCount = counts[targetPartId] || 0;
  const evennessCost = Math.abs(targetCount + 1 - avgCount) * 2; // cost of target being far from average

  return overlapCost + evennessCost;
}

function allocateEvenSplit() {
  if (singers.length === 0) return;
  const oldPartMap = {};
  for (const s of singers) oldPartMap[s.id] = s.part;

  // Sort singers by vocal midrange
  const sorted = [...singers].sort((a, b) => {
    const aMid = a.range ? (a.range[0] + a.range[1]) / 2 : 60;
    const bMid = b.range ? (b.range[0] + b.range[1]) / 2 : 60;
    return aMid - bMid;
  });

  const n = activeParts.length;
  for (let i = 0; i < sorted.length; i++) {
    const partIdx = Math.min(Math.floor(i / (sorted.length / n)), n - 1);
    sorted[i].part = activeParts[partIdx].id;
  }

  partLocks = {};
  updatePartMidpoints();
  animateChoirTransitions(oldPartMap);
  buildMasterDisplay();
  updateChoirViz();
  updateDisplay();
  sendPartConfig();
}

function allocateStrictRange() {
  if (singers.length === 0) return;
  const oldPartMap = {};
  for (const s of singers) oldPartMap[s.id] = s.part;

  // Assign each singer to the part whose VOCAL_RANGES preset is closest
  for (const singer of singers) {
    if (!singer.range) continue;
    const singerMid = (singer.range[0] + singer.range[1]) / 2;
    let bestPart = activeParts[0], bestScore = Infinity;
    for (const part of activeParts) {
      const preset = VOCAL_RANGES[part.id];
      if (!preset) continue;
      const presetMid = (preset[0] + preset[1]) / 2;
      // Score by overlap fraction with preset range
      const overlap = Math.max(0, Math.min(singer.range[1], preset[1]) - Math.max(singer.range[0], preset[0]));
      const singerSpan = singer.range[1] - singer.range[0];
      const overlapFrac = singerSpan > 0 ? overlap / singerSpan : 0;
      const score = (1 - overlapFrac) * 20 + Math.abs(singerMid - presetMid);
      if (score < bestScore) { bestScore = score; bestPart = part; }
    }
    singer.part = bestPart.id;
  }

  partLocks = {};
  updatePartMidpoints();
  animateChoirTransitions(oldPartMap);
  buildMasterDisplay();
  updateChoirViz();
  updateDisplay();
  sendPartConfig();
}

function getEvenSplitPreview() {
  if (singers.length === 0) return activeParts.map(() => 0);
  const sorted = [...singers].sort((a, b) => {
    const aMid = a.range ? (a.range[0] + a.range[1]) / 2 : 60;
    const bMid = b.range ? (b.range[0] + b.range[1]) / 2 : 60;
    return aMid - bMid;
  });
  const n = activeParts.length;
  const counts = new Array(n).fill(0);
  for (let i = 0; i < sorted.length; i++) {
    const idx = Math.min(Math.floor(i / (sorted.length / n)), n - 1);
    counts[idx]++;
  }
  return counts;
}

function getStrictRangePreview() {
  if (singers.length === 0) return activeParts.map(() => 0);
  const counts = new Array(activeParts.length).fill(0);
  for (const singer of singers) {
    if (!singer.range) continue;
    const singerMid = (singer.range[0] + singer.range[1]) / 2;
    let bestIdx = 0, bestScore = Infinity;
    for (let i = 0; i < activeParts.length; i++) {
      const preset = VOCAL_RANGES[activeParts[i].id];
      if (!preset) continue;
      const presetMid = (preset[0] + preset[1]) / 2;
      const overlap = Math.max(0, Math.min(singer.range[1], preset[1]) - Math.max(singer.range[0], preset[0]));
      const singerSpan = singer.range[1] - singer.range[0];
      const overlapFrac = singerSpan > 0 ? overlap / singerSpan : 0;
      const score = (1 - overlapFrac) * 20 + Math.abs(singerMid - presetMid);
      if (score < bestScore) { bestScore = score; bestIdx = i; }
    }
    counts[bestIdx]++;
  }
  return counts;
}

function sendPartConfig() {
  if (!ws || ws.readyState !== 1) return;
  const partsData = activeParts.map(p => ({
    id: p.id, label: p.label, shortLabel: p.shortLabel,
    color: p.color, range: p.range, mid: p.mid
  }));
  ws.send(JSON.stringify({ t: 'parts', parts: partsData }));
}

// === Build master display dynamically ===

function buildMasterDisplay() {
  const container = document.getElementById('masterDisplayContainer');
  if (!container) return;
  container.innerHTML = '';

  const volControls = document.getElementById('volControls');
  if (volControls) volControls.style.display = '';

  const n = activeParts.length;
  const useRows = n > 6;

  if (useRows) {
    // Split into two rows: bottom half (lower voices) and top half (higher voices)
    const midIdx = Math.ceil(n / 2);
    const bottomParts = activeParts.slice(0, midIdx);
    const topParts = activeParts.slice(midIdx);

    // Top row (higher voices)
    const topRow = document.createElement('div');
    topRow.className = 'master-display-row';
    for (const part of topParts) {
      topRow.appendChild(createPartColumn(part));
    }
    container.appendChild(topRow);

    // Bottom row (lower voices)
    const bottomRow = document.createElement('div');
    bottomRow.className = 'master-display-row';
    for (const part of bottomParts) {
      bottomRow.appendChild(createPartColumn(part));
    }
    container.appendChild(bottomRow);
  } else {
    // Single row
    const row = document.createElement('div');
    row.className = 'master-display';
    for (const part of activeParts) {
      row.appendChild(createPartColumn(part));
    }
    container.appendChild(row);
  }

  updateVolumeBars();
  updateMasterSyllables();
}

function createPartColumn(part) {
  const col = document.createElement('div');
  col.className = 'part-column';
  col.dataset.part = part.id;
  col.style.color = part.color;

  // Part label (hidden for 1-part mode)
  const label = document.createElement('div');
  label.className = 'part-label';
  label.textContent = part.label;
  col.appendChild(label);

  // Modifier key hint
  const modifier = document.createElement('div');
  modifier.className = 'part-modifier';
  const groups = getModifierGroups();
  let modText = '';
  for (const group of groups) {
    if (group.partIds.includes(part.id)) {
      if (group.hasSplit) {
        // Show Shift or Ctrl prefix for split parts
        const isPartI = group.partIds[1] === part.id; // Part I is higher (index 1)
        modText = (isPartI ? '⇧' : '⌃') + group.keyLabel;
      } else {
        modText = group.keyLabel;
      }
      break;
    }
  }
  modifier.textContent = modText;
  col.appendChild(modifier);

  // Syllable display
  const syl = document.createElement('div');
  syl.className = 'part-syllable';
  syl.textContent = '';
  col.appendChild(syl);

  // Note display
  const note = document.createElement('div');
  note.className = 'part-note';
  note.textContent = '';
  col.appendChild(note);

  // Singer count with +/- buttons (at the bottom)
  const countRow = document.createElement('div');
  countRow.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:4px;margin-top:auto;';

  const currentCount = singers.filter(s => s.part === part.id).length;

  const minus = document.createElement('button');
  minus.textContent = '−';
  minus.style.cssText = 'font-size:0.7rem;padding:0 4px;background:transparent;border:none;color:rgba(255,255,255,0.25);cursor:pointer;line-height:1;font-weight:bold;';
  minus.onmouseenter = () => { minus.style.color = 'rgba(255,255,255,0.7)'; };
  minus.onmouseleave = () => { minus.style.color = 'rgba(255,255,255,0.25)'; };
  minus.onclick = () => adjustPartCount(part.id, -1);
  countRow.appendChild(minus);

  const countInput = document.createElement('input');
  countInput.type = 'number';
  countInput.className = 'part-count';
  countInput.value = currentCount;
  countInput.min = 0;
  countInput.max = singers.length;
  countInput.style.cssText = 'width:28px;text-align:center;font-size:1.2rem;font-weight:bold;background:transparent;border:none;color:inherit;padding:0;-moz-appearance:textfield;';
  countInput.onchange = (e) => {
    const val = Math.max(0, Math.min(singers.length, parseInt(e.target.value) || 0));
    setPartCount(part.id, val);
  };
  countRow.appendChild(countInput);

  const plus = document.createElement('button');
  plus.textContent = '+';
  plus.style.cssText = 'font-size:0.7rem;padding:0 4px;background:transparent;border:none;color:rgba(255,255,255,0.25);cursor:pointer;line-height:1;font-weight:bold;';
  plus.onmouseenter = () => { plus.style.color = 'rgba(255,255,255,0.7)'; };
  plus.onmouseleave = () => { plus.style.color = 'rgba(255,255,255,0.25)'; };
  plus.onclick = () => adjustPartCount(part.id, 1);
  countRow.appendChild(plus);

  col.appendChild(countRow);

  // Volume bar
  const volWrap = document.createElement('div');
  volWrap.className = 'vol-bar-wrap';
  const volBar = document.createElement('div');
  volBar.className = 'vol-bar';
  volBar.style.height = (partVolumes[part.id] || 50) + '%';
  volBar.style.background = part.color;
  volWrap.appendChild(volBar);
  col.appendChild(volWrap);

  return col;
}

function getPartEl(partId, className) {
  const col = document.querySelector(`.part-column[data-part="${partId}"]`);
  return col ? col.querySelector('.' + className) : null;
}

// === Core: note distribution ===

function distributeNotes(notes, targetPartIds) {
  const sorted = [...notes].sort((a, b) => a - b);

  if (sorted.length === 0) {
    for (const pid of targetPartIds) partNotes[pid] = -1;
    return;
  }

  // Filter to parts with singers (fall back to all targeted if none have singers)
  const activePids = targetPartIds.filter(pid => singerCountForPart(pid) > 0);
  const pidsToUse = activePids.length > 0 ? activePids : targetPartIds;

  // Sort target parts by range (low to high)
  const partsByRange = [...pidsToUse].sort((a, b) => {
    const pa = getPartById(a), pb = getPartById(b);
    return (pa ? pa.mid : 0) - (pb ? pb.mid : 0);
  });
  const n = sorted.length, p = partsByRange.length;

  if (n >= p) {
    for (let pi = 0; pi < p; pi++) {
      const ni = Math.round(pi * (n - 1) / (p - 1 || 1));
      partNotes[partsByRange[pi]] = sorted[ni];
    }
  } else {
    const base = Math.floor(p / n);
    const remainder = p % n;
    let partIdx = 0;
    for (let ni = 0; ni < n; ni++) {
      const count = base + (ni < remainder ? 1 : 0);
      for (let j = 0; j < count; j++) {
        partNotes[partsByRange[partIdx]] = sorted[ni];
        partIdx++;
      }
    }
  }
}

// Build per-singer assignments from partNotes
function buildSingerAssignments() {
  const assignments = {};
  for (const singer of singers) {
    const note = partNotes[singer.part];
    assignments[singer.id] = note >= 0 ? fitToRange(note, singer.part, singer.range) : -1;
  }
  return assignments;
}

// === Note on/off ===

function noteOn(midi) {
  if (voicingResetTimer) clearTimeout(voicingResetTimer);
  voicingResetTimer = setTimeout(() => { previousVoicing = null; }, 5000);

  if (autoVoicing) {
    const pitchClass = midi % 12;
    const quality = getChordQuality(pitchClass);
    setChord({ root: pitchClass, quality });
    heldNotes.add(midi);
    return;
  }
  heldNotes.add(midi);
  const targetParts = getTargetParts();
  distributeNotes(heldNotes, targetParts);
  if (!sustainMode) {
    for (const pid of getPartIds()) {
      if (!targetParts.includes(pid)) partNotes[pid] = -1;
    }
  }
  updateDisplay();
}

function noteOff(midi) {
  heldNotes.delete(midi);
  if (autoVoicing) {
    if (!sustainMode && heldNotes.size === 0) {
      for (const pid of getPartIds()) partNotes[pid] = -1;
      currentChord = null;
      updateDisplay();
      updateChordDisplay();
      updateStaffDisplay();
    }
    return;
  }
  if (sustainMode) return;
  const targetParts = getTargetParts();
  distributeNotes(heldNotes, targetParts);
  for (const pid of getPartIds()) {
    if (!targetParts.includes(pid)) partNotes[pid] = -1;
  }
  updateDisplay();
}

// === Display ===

function updateDisplay() {
  const assignments = buildSingerAssignments();
  lastAssignments = { ...assignments };

  if (ws && ws.readyState === 1 && singers.length > 0) {
    ws.send(JSON.stringify({ t: 'n', notes: assignments }));
  }

  updateMasterDisplay();

  // Color piano keys by which parts are assigned to each key
  document.querySelectorAll('.key').forEach(k => {
    const midi = parseInt(k.dataset.midi);
    const partsOnKey = [];
    for (const part of activeParts) {
      if (partNotes[part.id] === midi) partsOnKey.push(part);
    }
    if (partsOnKey.length === 0) {
      k.style.background = '';
    } else if (partsOnKey.length === 1) {
      k.style.background = partsOnKey[0].color;
    } else {
      const stops = partsOnKey.map((p, i) => {
        const pct1 = (i / partsOnKey.length * 100).toFixed(1);
        const pct2 = ((i + 1) / partsOnKey.length * 100).toFixed(1);
        return `${p.color} ${pct1}%, ${p.color} ${pct2}%`;
      }).join(', ');
      k.style.background = `linear-gradient(to right, ${stops})`;
    }
  });
}

function updateMasterDisplay() {
  for (const part of activeParts) {
    const note = partNotes[part.id];
    const el = getPartEl(part.id, 'part-note');
    if (el) el.textContent = note >= 0 ? noteName(note) : '';
  }
  updateMasterSyllables();
}

// === Syllable system ===

function getPartSyllable(partId) {
  return syllables[partSyllables[partId] || 0];
}

function anyPartPulsing() {
  return activeParts.some(p => syllables[partSyllables[p.id] || 0].pulse);
}

function setSyllable(index) {
  activeSyllable = index;
  const parts = getTargetParts();
  for (const pid of parts) partSyllables[pid] = index;
  if (syllables[index].percussive) {
    for (const pid of parts) partNotes[pid] = -1;
    updateDisplay();
  }
  updateIndicators();
  sendSyllable();
}

function sendSyllable() {
  const msg = { t: 'syl', perPart: {} };
  for (const part of activeParts) {
    const syl = syllables[partSyllables[part.id] || 0];
    const pd = { text: syl.text };
    if (syl.pulse) { pd.pulse = true; pd.bpm = pulseBpm; }
    msg.perPart[part.id] = pd;
  }
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

function updateMasterSyllables() {
  for (const part of activeParts) {
    const syl = getPartSyllable(part.id);
    const el = getPartEl(part.id, 'part-syllable');
    if (!el) continue;
    if (!syl.pulse) {
      el.style.transition = 'none';
      el.style.opacity = '1';
      el.textContent = syl.text;
    }
  }
}

function startMasterPulse() {
  if (masterPulseTimer) { clearInterval(masterPulseTimer); masterPulseTimer = null; }

  if (!anyPartPulsing()) {
    for (const part of activeParts) {
      const el = getPartEl(part.id, 'part-syllable');
      if (el) {
        el.style.transition = 'none';
        el.style.opacity = '1';
      }
    }
    updateMasterSyllables();
    return;
  }

  const intervalMs = 60000 / pulseBpm;
  const fadeDuration = Math.max(200, intervalMs - 50);

  function doPulseFlash() {
    for (const part of activeParts) {
      const syl = getPartSyllable(part.id);
      const el = getPartEl(part.id, 'part-syllable');
      if (!el) continue;
      if (syl.pulse) {
        el.textContent = syl.text;
        el.style.transition = 'none';
        el.style.opacity = '1';
        void el.offsetWidth;
        el.style.transition = `opacity ${fadeDuration}ms ease-out`;
        el.style.opacity = '0';
      }
    }
  }

  updateMasterSyllables();
  doPulseFlash();
  masterPulseTimer = setInterval(doPulseFlash, intervalMs);
}

function updateIndicators() {
  document.querySelectorAll('.syl-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    btn.classList.toggle('active', idx === activeSyllable);
  });
  document.getElementById('bpmControl').style.display = anyPartPulsing() ? 'flex' : 'none';
  startMasterPulse();
  updateMasterDisplay();
}

// === Volume system ===

function resetVolumes() {
  for (const part of activeParts) {
    partVolumes[part.id] = 50;
  }
  updateVolumeBars();
  sendVolume();
}

function adjustVolume(delta) {
  const parts = getTargetParts();
  for (const pid of parts) {
    partVolumes[pid] = Math.max(0, Math.min(100, (partVolumes[pid] || 50) + delta));
  }
  updateVolumeBars();
  sendVolume();
}

function updateVolumeBars() {
  for (const part of activeParts) {
    const el = getPartEl(part.id, 'vol-bar');
    if (el) el.style.height = (partVolumes[part.id] || 50) + '%';
  }
}

function sendVolume() {
  const msg = { t: 'vol' };
  for (const part of activeParts) {
    msg[part.id] = partVolumes[part.id] || 50;
  }
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

function startVolHold(delta) {
  stopVolHold();
  volHoldDone = false;
  adjustVolume(delta > 0 ? 5 : -5);
  volHoldTimeout = setTimeout(() => {
    volHoldDone = true;
    volHoldInterval = setInterval(() => { adjustVolume(delta > 0 ? 2 : -2); }, 80);
  }, 500);
}

function stopVolHold() {
  if (volHoldTimeout) { clearTimeout(volHoldTimeout); volHoldTimeout = null; }
  if (volHoldInterval) { clearInterval(volHoldInterval); volHoldInterval = null; }
  volHoldDone = false;
}

// === BPM system ===

function adjustBpm(delta) {
  pulseBpm = Math.max(30, Math.min(300, pulseBpm + delta));
  document.getElementById('bpmInput').value = pulseBpm;
  if (anyPartPulsing()) { startMasterPulse(); sendSyllable(); }
}

function startBpmHold(delta) {
  stopBpmHold();
  bpmHoldDone = false;
  bpmHoldTimeout = setTimeout(() => {
    bpmHoldDone = true;
    bpmHoldInterval = setInterval(() => { adjustBpm(delta > 0 ? 1 : -1); }, 80);
  }, 1000);
}

function stopBpmHold(doInitial, delta) {
  if (bpmHoldTimeout) { clearTimeout(bpmHoldTimeout); bpmHoldTimeout = null; }
  if (bpmHoldInterval) { clearInterval(bpmHoldInterval); bpmHoldInterval = null; }
  if (doInitial && !bpmHoldDone) { adjustBpm(delta); }
  bpmHoldDone = false;
}

// === Sustain toggle ===

function toggleSustain() {
  sustainMode = !sustainMode;
  const el = document.getElementById('sustainToggle');
  el.classList.toggle('on', sustainMode);

  if (!sustainMode) {
    const pids = getPartIds();
    if (heldNotes.size === 0) {
      for (const pid of pids) partNotes[pid] = -1;
      updateDisplay();
    } else {
      distributeNotes(heldNotes, pids);
      updateDisplay();
    }
  }

  updateTargetHighlight();
}

// === Auto-voicing system ===

function toggleAutoVoicing() {
  autoVoicing = !autoVoicing;
  document.getElementById('autoVoicingControls').style.display = autoVoicing ? '' : 'none';
  updateTonicControlsVisibility();
  const el = document.getElementById('modeToggle');
  el.classList.toggle('on', autoVoicing);
  // Clear state when switching
  currentChord = null;
  previousVoicing = null;
  for (const pid of getPartIds()) partNotes[pid] = -1;
  heldNotes.clear();
  heldKeyboard.clear();
  updateDisplay();
  updateChordDisplay();
  updateStaffDisplay();
  updatePianoLabels();
}

function toggleQwerty() {
  qwertyShortcuts = !qwertyShortcuts;
  const el = document.getElementById('qwertyToggle');
  if (el) el.classList.toggle('on', qwertyShortcuts);
  updateTonicControlsVisibility();
  updatePianoLabels();
}

function toggleRootInBass() {
  rootInBass = !rootInBass;
  const el = document.getElementById('rootInBassToggle');
  if (el) el.classList.toggle('on', rootInBass);
}

function updateTonicControlsVisibility() {
  const tonicEl = document.getElementById('tonicControls');
  if (tonicEl) tonicEl.style.display = (autoVoicing || !qwertyShortcuts) ? 'flex' : 'none';
}

function getChordQuality(pitchClass) {
  if (chordModifiers.dim) return 'dim';
  if (chordModifiers.aug) return 'aug';
  if (chordModifiers.min) return 'minor';
  if (chordModifiers.maj) return 'major';
  const scale = SCALE_DEGREES[selectedKey.mode];
  for (const entry of scale) {
    if ((selectedKey.tonic + entry.interval) % 12 === pitchClass) {
      return entry.quality;
    }
  }
  return 'major';
}

function selectScaleDegree(degree) {
  const scale = SCALE_DEGREES[selectedKey.mode];
  // Degrees 8 and 9 = degrees 1 and 2 with bass an octave higher
  const bassDegree = degree > 7 ? degree - 7 : degree;
  const entry = scale[bassDegree - 1];
  const root = (selectedKey.tonic + entry.interval) % 12;
  let quality = entry.quality;
  if (chordModifiers.dim) quality = 'dim';
  else if (chordModifiers.aug) quality = 'aug';
  else if (chordModifiers.min) quality = 'minor';
  else if (chordModifiers.maj) quality = 'major';
  setChord({ root, quality, bassOctaveUp: degree > 7 });
}

function setChord(chord) {
  previousVoicing = (currentChord && Object.values(partNotes).some(n => n >= 0))
    ? { ...partNotes } : null;
  currentChord = chord;
  generateVoicing(chord);
  updateDisplay();
  updateChordDisplay();
  updateStaffDisplay();
}

// Select chord by absolute note letter (A-G), always major unless modified
function selectNoteChord(noteName) {
  const NOTE_TO_PC = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
  const root = NOTE_TO_PC[noteName];
  if (root === undefined) return;
  let quality = 'major';
  if (chordModifiers.dim) quality = 'dim';
  else if (chordModifiers.aug) quality = 'aug';
  else if (chordModifiers.min) quality = 'minor';
  else if (chordModifiers.maj) quality = 'major';
  setChord({ root, quality });
}

function getChordIntervals(chord) {
  const base = CHORD_INTERVALS[chord.quality] || CHORD_INTERVALS.major;
  const intervals = [...base];
  // Add extensions from modifiers
  if (chordModifiers.add7) {
    // Dominant 7th (minor 7th interval = 10 semitones)
    intervals.push(10);
  }
  if (chordModifiers.addMaj7) {
    // Major 7th interval = 11 semitones
    intervals.push(11);
  }
  if (chordModifiers.add9) {
    // 9th = 14 semitones (= 2 mod 12)
    intervals.push(14);
  }
  return intervals;
}

function generateVoicing(chord) {
  const intervals = getChordIntervals(chord);
  const chordTones = intervals.map(i => (chord.root + i) % 12);

  // Try all pitch class assignments and pick the overall best voicing
  const allAssignments = getAllPitchClassAssignments(chordTones, chord.root);
  const BEAM_WIDTH = 30;
  let globalBest = null;

  for (const voicePitchClasses of allAssignments) {
    // Generate all valid MIDI notes per part for this assignment
    const candidates = [];
    for (let idx = 0; idx < activeParts.length; idx++) {
      const part = activeParts[idx];
      const pc = voicePitchClasses[part.id];
      if (pc === undefined) { candidates.push([]); continue; }
      let [lo, hi] = part.range;
      const validNotes = [];
      if (chord.bassOctaveUp && idx === 0 && activeParts.length > 1) {
        // Find what the normal bass note would be (closest to midpoint), then go an octave up
        const normalCandidates = [];
        for (let midi = lo; midi <= hi; midi++) {
          if (midi % 12 === pc) normalCandidates.push(midi);
        }
        let normalBass = normalCandidates[0] || lo;
        let bestDist = Math.abs(normalBass - part.mid);
        for (const n of normalCandidates) {
          const d = Math.abs(n - part.mid);
          if (d < bestDist) { bestDist = d; normalBass = n; }
        }
        // Only allow notes at normalBass+12 or higher
        const minMidi = normalBass + 12;
        const extHi = Math.max(hi, minMidi + 12);
        for (let midi = minMidi; midi <= extHi; midi++) {
          if (midi % 12 === pc) validNotes.push(midi);
        }
      } else {
        for (let midi = lo; midi <= hi; midi++) {
          if (midi % 12 === pc) validNotes.push(midi);
        }
      }
      candidates.push(validNotes);
    }

    // Beam search for this assignment
    let beam = [{ notes: {}, score: 0, lastNote: -Infinity }];

    for (let i = 0; i < activeParts.length; i++) {
      const part = activeParts[i];
      const nextBeam = [];

      for (const state of beam) {
        if (candidates[i].length === 0) {
          nextBeam.push({
            notes: { ...state.notes, [part.id]: -1 },
            score: state.score + 100,
            lastNote: state.lastNote
          });
          continue;
        }

        for (const note of candidates[i]) {
          if (i > 0 && note < state.lastNote) continue;
          if (i > 0 && state.lastNote > 0 && note - state.lastNote > 19) continue;

          let score = state.score;
          if (i > 0 && note === state.lastNote) score += 10;

          if (previousVoicing && previousVoicing[part.id] >= 0) {
            score += Math.abs(note - previousVoicing[part.id]) * 2;
            if (note === previousVoicing[part.id]) score -= 3;
          }

          if (i > 0 && state.lastNote > 0) {
            score += (note - state.lastNote) * 0.3;
          }

          score += Math.abs(note - part.mid) * 0.1;

          if (previousVoicing) {
            for (let j = 0; j < i; j++) {
              const pj = activeParts[j];
              const prevJ = previousVoicing[pj.id];
              const prevI = previousVoicing[part.id];
              const newJ = state.notes[pj.id];
              if (prevJ >= 0 && prevI >= 0 && newJ >= 0) {
                const prevInt = Math.abs(prevI - prevJ) % 12;
                const newInt = Math.abs(note - newJ) % 12;
                const bothMoved = prevJ !== newJ && prevI !== note;
                const dir1 = Math.sign(newJ - prevJ);
                const dir2 = Math.sign(note - prevI);
                if (bothMoved && dir1 === dir2 && (newInt === 7 || newInt === 0) && prevInt === newInt) {
                  score += 50;
                }
              }
            }
          }

          nextBeam.push({
            notes: { ...state.notes, [part.id]: note },
            score,
            lastNote: note
          });
        }
      }

      nextBeam.sort((a, b) => a.score - b.score);
      beam = nextBeam.slice(0, BEAM_WIDTH);
      if (beam.length === 0) break;
    }

    if (beam.length > 0 && (!globalBest || beam[0].score < globalBest.score)) {
      globalBest = beam[0];
    }
  }

  if (globalBest) {
    for (const part of activeParts) {
      partNotes[part.id] = globalBest.notes[part.id] !== undefined ? globalBest.notes[part.id] : -1;
    }
  } else {
    // Fallback: assign each part its midpoint-closest note
    for (const part of activeParts) {
      partNotes[part.id] = -1;
    }
  }
}

function getDistinctPermutations(arr) {
  if (arr.length <= 1) return [arr];
  const result = [];
  const used = new Set();
  for (let i = 0; i < arr.length; i++) {
    const key = arr[i];
    if (used.has(key)) continue;
    used.add(key);
    const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
    for (const perm of getDistinctPermutations(rest)) {
      result.push([arr[i], ...perm]);
    }
  }
  return result;
}

function getAllPitchClassAssignments(chordTones, root) {
  const n = activeParts.length;
  if (n === 0) return [{}];

  // Build pool of pitch classes with doublings
  const tones = [...chordTones];
  while (tones.length < n) {
    if (tones.length === chordTones.length) tones.push(root);
    else if (chordTones.length >= 3) tones.push(chordTones[2]);
    else tones.push(root);
  }

  const sortedParts = [...activeParts].sort((a, b) => a.mid - b.mid);
  const assignments = [];

  if (rootInBass && n > 1) {
    // Bass always gets root; permute remaining tones across upper voices
    const remainingTones = [...tones];
    const rootIdx = remainingTones.indexOf(root);
    if (rootIdx >= 0) remainingTones.splice(rootIdx, 1);
    while (remainingTones.length < n - 1) remainingTones.push(root);
    // Trim to exactly n-1
    const upper = remainingTones.slice(0, n - 1);

    const perms = getDistinctPermutations(upper);
    // Cap at 120 permutations for performance
    const maxPerms = perms.slice(0, 120);
    for (const perm of maxPerms) {
      const result = {};
      result[sortedParts[0].id] = root;
      for (let i = 0; i < perm.length; i++) {
        result[sortedParts[i + 1].id] = perm[i];
      }
      assignments.push(result);
    }
  } else {
    // No root-in-bass: permute all tones
    const pool = tones.slice(0, n);
    const perms = getDistinctPermutations(pool);
    const maxPerms = perms.slice(0, 120);
    for (const perm of maxPerms) {
      const result = {};
      for (let i = 0; i < n; i++) {
        result[sortedParts[i].id] = perm[i];
      }
      assignments.push(result);
    }
  }

  return assignments.length > 0 ? assignments : [{}];
}

function updateChordDisplay() {
  const el = document.getElementById('chordDisplay');
  if (!el) return;
  if (!currentChord) {
    el.textContent = '';
    return;
  }
  const rootName = noteNameInKey(currentChord.root);
  const qualLabel = QUALITY_LABELS[currentChord.quality] || '';
  const isMinor = currentChord.quality === 'minor';
  // Build extension suffix
  let ext = '';
  if (chordModifiers.addMaj7 && isMinor) ext += '(maj7)';
  else if (chordModifiers.addMaj7) ext += 'maj7';
  else if (chordModifiers.add7) ext += '7';
  if (chordModifiers.add9) ext += ext ? '(9)' : 'add9';
  el.textContent = rootName + qualLabel + ext;
}

function updateStaffDisplay() {
  const container = document.getElementById('staffContainer');
  if (!container) return;
  if (!autoVoicing) { container.innerHTML = ''; return; }

  const vw = 700, vh = 160;
  const staffTop = 35, lineGap = 12;
  const bottomLine = staffTop + 4 * lineGap;

  let svg = `<svg width="100%" viewBox="0 0 ${vw} ${vh}" style="display:block;" preserveAspectRatio="xMinYMid meet">`;

  for (let i = 0; i < 5; i++) {
    const y = staffTop + i * lineGap;
    svg += `<line x1="10" y1="${y}" x2="${vw-10}" y2="${y}" stroke="#555" stroke-width="1"/>`;
  }

  const clefX = 30, clefY = staffTop + 2 * lineGap;
  svg += `<text x="${clefX}" y="${clefY + 18}" font-size="58" fill="#999" text-anchor="middle" font-family="serif">𝄞</text>`;

  const sig = getEffectiveSig();
  let keySigEndX = 55;

  if (sig > 0) {
    const sharpSteps = [0, 3, -1, 2, 5, 1, 4];
    const sharpGap = 8;
    for (let i = 0; i < sig; i++) {
      const sx = keySigEndX + i * sharpGap;
      const sy = staffTop + sharpSteps[i] * (lineGap / 2);
      svg += `<text x="${sx}" y="${sy + 5}" font-size="16" fill="#ccc" text-anchor="middle" font-family="serif">♯</text>`;
    }
    keySigEndX += sig * sharpGap + 4;
  } else if (sig < 0) {
    const flatSteps = [4, 1, 5, 2, 6, 3, 7];
    const flatGap = 8;
    for (let i = 0; i < -sig; i++) {
      const fx = keySigEndX + i * flatGap;
      const fy = staffTop + flatSteps[i] * (lineGap / 2);
      svg += `<text x="${fx}" y="${fy + 5}" font-size="16" fill="#ccc" text-anchor="middle" font-family="serif">♭</text>`;
    }
    keySigEndX += (-sig) * flatGap + 4;
  }

  const scale = SCALE_DEGREES[selectedKey.mode];
  const degreeNotes = [];
  let baseMidi = 60 + selectedKey.tonic;
  const seventhInterval = scale[6].interval;
  if (baseMidi + seventhInterval > 79) baseMidi -= 12;
  if (baseMidi < 55) baseMidi += 12;

  for (let d = 0; d < 7; d++) {
    const midi = baseMidi + scale[d].interval;
    const pc = (selectedKey.tonic + scale[d].interval) % 12;
    degreeNotes.push({ midi, pc, quality: scale[d].quality, degree: d + 1 });
  }

  const noteStartX = keySigEndX + 20;
  const noteEndX = vw - 30;
  const noteSpacing = (noteEndX - noteStartX) / 6;

  for (let d = 0; d < 7; d++) {
    const nx = noteStartX + d * noteSpacing;
    const ny = midiToStaffY(degreeNotes[d].midi, staffTop, lineGap);

    if (ny > bottomLine + lineGap / 2) {
      for (let ly = bottomLine + lineGap; ly <= ny + 1; ly += lineGap) {
        svg += `<line x1="${nx-10}" y1="${ly}" x2="${nx+10}" y2="${ly}" stroke="#555" stroke-width="1"/>`;
      }
    }
    if (ny < staffTop - lineGap / 2) {
      for (let ly = staffTop - lineGap; ly >= ny - 1; ly -= lineGap) {
        svg += `<line x1="${nx-10}" y1="${ly}" x2="${nx+10}" y2="${ly}" stroke="#555" stroke-width="1"/>`;
      }
    }

    const isActive = currentChord && degreeNotes[d].pc === currentChord.root;
    const fill = isActive ? '#fbbf24' : '#aaa';
    svg += `<ellipse cx="${nx}" cy="${ny}" rx="7" ry="5" fill="${fill}" transform="rotate(-10,${nx},${ny})"/>`;

    const digitY = bottomLine + lineGap * 3.5;
    svg += `<text x="${nx}" y="${digitY}" text-anchor="middle" fill="#ccc" font-size="15" font-weight="bold">${d + 1}</text>`;

    let displayQuality = degreeNotes[d].quality;
    if (chordModifiers.dim) displayQuality = 'dim';
    else if (chordModifiers.min) displayQuality = 'minor';
    else if (chordModifiers.maj) displayQuality = 'major';
    const chordName = noteNameInKey(degreeNotes[d].pc) + QUALITY_LABELS[displayQuality];
    const chordY = digitY + 16;
    svg += `<text x="${nx}" y="${chordY}" text-anchor="middle" fill="#888" font-size="12">${chordName}</text>`;
  }

  svg += '</svg>';
  container.innerHTML = svg;
}

function midiToStaffY(midi, staffTop, lineGap) {
  const naturalPositions = { 0: 0, 2: 1, 4: 2, 5: 3, 7: 4, 9: 5, 11: 6 };
  const semitone = midi % 12;
  const octave = Math.floor(midi / 12) - 1;

  let notePos = naturalPositions[semitone];
  if (notePos === undefined) {
    const sig = getEffectiveSig();
    if (sig < 0) {
      notePos = naturalPositions[semitone + 1];
    } else {
      notePos = naturalPositions[semitone - 1];
    }
  }

  const refPos = 5 * 7 + 3;
  const absPos = octave * 7 + notePos;
  const stepsFromTop = refPos - absPos;
  return staffTop + stepsFromTop * (lineGap / 2);
}

// === Piano label updates ===

function updatePianoLabels() {
  const keys = document.querySelectorAll('.key');
  if (!qwertyShortcuts) {
    // Scale degree mode: show 1-9 (no looping), starting at lowest tonic
    const scale = SCALE_DEGREES[selectedKey.mode];
    // Find the lowest tonic MIDI on the piano
    const allMidis = [...keys].map(k => parseInt(k.dataset.midi)).sort((a, b) => a - b);
    const lowestMidi = allMidis[0] || 48;
    let baseTonic = lowestMidi;
    while (baseTonic % 12 !== selectedKey.tonic) baseTonic++;
    // Map MIDI note → degree label (1-9), each appearing exactly once
    const midiToDegree = {};
    for (let d = 0; d < 9; d++) {
      const actualDegree = d < 7 ? d : d - 7; // 8=1, 9=2
      const interval = scale[actualDegree].interval;
      const midi = baseTonic + interval + (d >= 7 ? 12 : 0);
      if (!midiToDegree[midi]) midiToDegree[midi] = d + 1;
    }
    keys.forEach(k => {
      const midi = parseInt(k.dataset.midi);
      const bindEl = k.querySelector('.keybind');
      if (bindEl) {
        bindEl.textContent = midiToDegree[midi] !== undefined ? midiToDegree[midi] : '';
      }
    });
  } else {
    keys.forEach(k => {
      const midi = parseInt(k.dataset.midi);
      const bindKey = Object.entries(KEY_TO_MIDI).find(([key, m]) => m === midi);
      const bindEl = k.querySelector('.keybind');
      if (bindEl) {
        bindEl.textContent = bindKey ? (bindKey[0] === '\\' ? '\\' : bindKey[0].toUpperCase()) : '';
      }
    });
  }
}

// === WebSocket ===

function createRoom() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ t: 'create' }));
    document.getElementById('status').textContent = 'Connected';
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.t === 'created') {
      document.getElementById('roomCode').textContent = msg.code;
      document.getElementById('singerUrl').textContent = 'Singers go to: ' + msg.ip + ':' + msg.port;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('roomInfo').style.display = '';
      document.getElementById('midiSection').style.display = '';
      document.getElementById('controlsSection').style.display = '';
      document.getElementById('keyboardSection').style.display = '';
      initParts(numParts);
      initMIDI();
      updateIndicators();
    } else if (msg.t === 'r') {
      singers = msg.singers || [];
      updatePartMidpoints();
      if (autoVoicing && currentChord) generateVoicing(currentChord);
      // Update counts in part columns
      const counts = {};
      for (const part of activeParts) counts[part.id] = 0;
      for (const s of singers) counts[s.part] = (counts[s.part] || 0) + 1;
      for (const part of activeParts) {
        const el = getPartEl(part.id, 'part-count');
        if (el) el.value = counts[part.id] || 0;
      }
      updateDisplay();
      updateChoirViz();
    }
  };
  ws.onclose = () => { document.getElementById('status').textContent = 'Disconnected'; };
}

if (new URLSearchParams(location.search).has('test')) {
